body:
  text: 涑水記聞卷十二宋司馬光撰范帥雍在鄜延命李金明士彬分兵守三十六寨勿令敵得入寨其子諫曰敵大舉將入寇宜聚兵以待之兵分則弱不能拒也士彬不從康定元年敵兵大至士彬所部皆潰其子力戰而死彬遂為所擒郭帥云金明既陷安逺塞門二寨在金明之北知延州趙振不能救并移安遠救城中兵民以歸又移書塞門寨主高延政曰可守則守不可守亦救兵民以歸延政守半歲救兵不至遂率衆棄城歸敵據險邀之寨衆皆沒及元昊請降遂割其地以賜之郭帥云寶元元年九月十六日鄜延路都鈐轄司奏今月五日六宅副使金明縣都監新寨解家河盧關路巡檢李士彬申四日戌時男殿直懐寳及七羅寨指揮使引到宥州團練侍者密臧福羅以趙元昊所給告身三道來云山禺令公先在元昊處為樞密元昊數誅諸部大人且盡又欲誅山禺八月二十五日山禺自河外與侍者二人逃歸既濟河集縁河兵斷河津三處二十八日山禺使其弟三太尉者將宥州兵監河津諸屯九月一日告密臧福羅以事狀哭且言曰去年大王弟侍中謀反欲殺大王賴我聞之以告大王大王存至今日我之力也今乃欲殺我汝為我齎此告身三道赴金明導引告延州大人我當悉以黄河以南户口歸命朝廷朝廷欲得質者以我子若我弟皆可也大王來追我自以所部兵拒之汝至南得何語當亟來我别以馬七八百匹獻朝廷更令使者自保安軍驛路告延州我此月三日集宥州監州兵至河上悉發户口歸朝廷也密臧福羅至金明以狀言本司契勘前此元昊所部有叛者為元昊所誅已具奏聞今山禺云欲歸朝廷本司商量令李士彬還其告身諭以元昊職貢無虧難議受其降款遣之還臣等仍恐彼為姦詐已戒縁邊刺候嚴備去訖又奏六日保安軍北番官巡檢殿直劉懷中狀申詗知山禺等于二日起兵有衆二千餘人刦掠村社族帳只在宥州境内尋得保安軍狀云五日寅時山禺及弟二防禦三防禦等將麾下一十五騎至皆被甲執兵告指揮使云欲歸命朝廷臣等已令保安軍詰問山禺等所以來事故勒令北歸仍令縁邊部族首領嚴兵巡邏或更有北來户口皆約遣令還毋得承受别致引惹者詔鄜延路都鈐轄司嚴飭緣邊諸寨及番官等晨夜設備遣人詗候如敵人自在其境互相攻戰即于界首密行托落毋得張皇或更有山禺所部來投告者令李士彬等只為彼意婉順約回務令安靜所詗知事宜節次驛置以聞仍下環慶涇原路部署司麟府路軍馬司準此是時知延州管勾鄜延路軍馬公事刑部郎中天章閣待制郭勸都鈐轄四方館使惠州刺史李渭知保安軍供備庫副使朱吉高繼隆等破後橋寨康定元年五月十八日鄜延環慶路經略使范雍奏洛苑使環慶路鈐轄高繼隆禮賓使環慶路駐泊鈐轄知慶州張崇俊部領兵馬入西賊界打破賊後橋寨先令番官奉職巡檢李明領番部圍寨繼隆崇俊領大軍繼進與賊鬭敵相殺又分擘兵甲令柔遠寨主侍禁閤門祗候武英監押左侍禁王慶東谷寨監押奉職張立左侍禁閤門祗候北路都巡檢郝仁禹攻打寨城其武英先打破寨北門入城又令淮安鎮都監西頭供奉官閤門祗候劉政東谷寨主左侍禁賈慶各部領兵馬入賊界駐泊牽拽䇿應破蕩諸族帳又令入内西頭侍奉官走馬承受公事石全政把截十二盤路口其殿侍軍員兵士及番官使喚得力或斫倒人頭或傷中重係第一等功勞者凡一百一十五人伏乞體驗今來北人往來沿邊作禍正當用人之際特與各轉補名目所貴激賞邊臣及各軍吏効命奉聖旨高繼隆張崇俊于見今使額上各轉七資劉政郝仁禹以下各轉官有差寶元二年二月甲寅保順軍節度使邈州首領唃斯羅案斯羅東都事略作厮囉遣使入貢方物四月辛酉朔癸亥樞密院奏唃斯羅前妻為尼已有二子今再娶喬氏女為妻詔唃斯羅前妻賜紫衣師號及法名今妻賜邑號二子並除團練使寶元二年九月金明都監李士彬捕得元昊偽署環州刺史劉乞􅢞案字書不著􅢞字此與後康定元年秋條神樹􅢞地名竝見送京師斬于都市以元昊令入延州界誘保塞番官故也康定元年三月癸酉韓琦奏昨者夏人寇延州有西路都巡檢使侍禁閤門祗候郭遵從劉平與賊戰有跨馬舞二劍以出大呼云欲鬭將者平問諸將無敢敵者遵獨請行因上馬舞二鐵簡與賊格鬭賊應手腦碎餘衆遂卻頃之遵又横大􅘫刀率百餘人進陷彼陣至其帳而還凡三出三入所殺者幾百人遵馬倒為賊所害聞賊中皆歎服其勇也乞優賜襃贈及錄其子孫詔贈遵果州團練使母妻皆封郡君諸子悉除供奉官侍禁殿直兄弟亦以差拜官丙子黒風自西北起京師晝晦如墨移刻而止丁丑始遣中使隨問劉平石元孫家屬加賜贈案劉平郭遵石元孫禦寇事已見前第四卷第十一卷而所記始末與此詳畧各異互證乃備四月戊子都轉運司奏請令準江南造紙甲三二萬副本路給防城手力詔委逐路州軍以遠年帳籍製造康定元年六月言事者以朝廷發兵戍守西邊恐諸處無備乞于京東西州軍増置弓手辛丑詔天章閣待制高若訥為京西體量安撫使就委㸃集甲辰中書門下奏諸路並宜増置弓手以備盜賊詔除陜西河北河東京西已從差及川陜廣南福建更不㸃外其餘路量户口多少増置戊申三司奏乞下開封府并河北買驢三千頭載軍器輸陜西詔減二千頭仍増京東西南路康定元年四月癸巳秦鳳路部署司奏邈州首領唃斯羅之子摩戩自請奮擊夏人乞朝廷遣使監䕶乃降詔命從之八月辛丑詔屯田員外郎劉渙往秦州至邈州以東勾當公事渙知晉州自請使外國故也康定元年九月丙寅詔河北河東强壯陜西京東京西新添弓手皆以二十五人為團團置押官一員四團為都置正副都頭一人五都為一營指揮使一人教習康定元年秋夏人寇保安軍鎭戎軍九月二十日環慶路部署知慶州任福謀襲夏人白豹城以牽制其勢使東路都巡檢任政華沙寨主胡永錫擊之使鳳川寨監押殿直劉世卿將廣勇神虎二指揮㑹華沙又使淮安鎭都監劉政監押張立將兵趨西谷寨與寨主等共擊近寨諸族期以二十日丑時俱發福以十六日夜閉門後授諸軍甲十七日未明出兵令城門非從兵行無得輒出一人聲言巡邊是夜宿業樂鎮十八日晚入柔遠寨十九日犒諭柔遠諸番部禁止毋得出城密部分諸將使駐泊都監王懐正攻白豹城西斷神樹􅢞來路案此神樹􅢞之􅢞與前寳元二年九月條劉乞􅢞之􅢞不著字書而宋史夏國傳亦有􅢞移等率屬來降之文則􅢞字自非傳寫之誤北都巡檢范全攻其東斷金湯之路柔遠寨主譚嘉震攻其北斷葉市之路供奉官王慶走馬承受石全政攻其南族帳駐泊都監武英主入城門鬭敵福以大軍駐于城南照管䇿應是日引兵柔逺寨置番官等于福馬前而行凡七十里二十日丑時至白豹城各分部令即時攻城卯時克之悉焚其僞署李太尉衙署酒税務糧倉草場及民居室四十里内禾稼聚積諸將分破族帳四十一擒僞署張團練殺首七人斬獲二百五十有餘級虜牛馬羊槖駞七千餘頭器械三百餘事印記六面僞宣敕告身及番書五十通軍士死者一百六十四人以范全及番官巡檢趙明為殿而還康定二年府州奏七月二十三日西賊不知萬數圍逼州城攻擊四日夜乃退尋令鄉兵趙素等探候西賊尚在後河州赤土嶺毛家塢一帶下寨未起去州三十二里州司竊慮西賊虚作退勢誘引大兵追逐别設伏兵奔衝州城見不輟令人探候及申并代部署司乞救應次麟府路走馬承受公事樊玉奏竊見本路軍馬司準麟州公文自七月二十七日被西賊攻圍西城二十八日至九月九日午時其賊拔寨過屈野河西山上白草平一帶下寨去州約十五里其夜當州令通引官魏智及百姓兼千白政等偷路往州東探候建寧寨已為西賊所破賊于周迴下七寨殺獲寨主監押及寨内軍民焚蕩倉場庫務軍營民居敵樓戰棚皆盡其賊亦不輟下屈野河來奔衝州城當州日夜拒守軍民危困今遣百姓李珣飛騎長夜偷路去急乞軍馬司星夜進城發兵救應河東路轉運使文彦博奏昨西賊圍豐州及寧遠寨其并代州都部署通判團練使王元麟府州鈐轄東染院使昭州刺史康德輿只在府州閉壘自守並無出兵救援之意以致八月七日寧逺寨破十九日豐州破二十一日西賊引退已逺麟州路通二十三日元等乃牒府州索隨軍十日糧草計人糧馬料九千石草五萬六千束以二十六日出軍臣尋急令保德火山岢嵐軍人户各備脚乘于府州請搬上件隨軍其王元康德輿只于府州城外五七里下寨作食所搬糧草經三日復將所部兵馬入城亦不先告人户令知其人户等見軍馬入城謂是西賊將至皆倉皇奔竄入城棄所搬糧草腳乘並在野寨明日方令人户搬所餘糧草于倉場回納竊縁人户請搬糧草雇腳乘所費至重臣取得人户雇腳契帖每搬隨軍草一束糧一斗不以逺近日數計錢一貫文如此費耗若一兩次何以任之若或出軍擊賊逺救城寨須要糧草先行雖有重費不可辭勞其如賊退已逺麟州道路已通方領軍馬出城又不前去追襲卻只在府州城外五七里劄寨令人户運糧元輩何以自安方今西事未平捍邊全藉良將若王元康德輿駑下之材如此舉動必致敗事伏乞朝廷明行重典以戒懦夫别擇武臣付以邊事詔昨以西賊圍閉麟州府專差王元及并代州鈐轄供備庫使楊懐志往彼䇿應自部領軍馬到府州並不出兵廣作聲援救應致陷沒豐州及寧遠寨其康德輿係專管勾麟府路軍馬公事亦只在府州端坐不出救應已降敕命王元降右衛將軍陵州團練使楊懐志降供備庫副使康德輿落遙郡軍令逐路都部署司遍行戒飭仍令王元康德輿分析上件因依聞奏知延州范雍奏前月趙元昊悉衆入寇陷金明寨執都監李士彬父子遂攻安遠塞門永平三寨安逺最居極邊賊斫壊兩重門監押侍禁邵元吉遣下軍士斫追賊兵復奪得城門拒守數日賊乃去賊遂合衆屯於州城之北三川口列十餘寨二十三日賊分兵出東西城之後及西城之間呼噪射城上人城上諸軍發矢攻賊死者頗衆遂不敢攻明日賊引兵退其守城將佐鈐轄盧守懃等謹條次其功狀乞超資酬賞以勵後來又奏栲栳寨主殿直高益監押殿直韓遂安逺寨主供奉官蔡詠奉職曹度借職王懿皆死于賊邵元吉及塞門寨主供奉官高延德權監押右侍禁王繼元永平寨主左侍禁郭延珍權監押左侍禁王懿皆有拒守之功詔死事者優與贈官仍賻錢絹録其子孫元吉遷西頭供奉官閤門祗候充安逺寨主李士彬世為屬國邊酋領金明都巡檢使所部十有八寨邊兵近十萬人延州人謂之鐵壁相公夏人素畏之元昊叛遣使誘士彬士彬殺之元昊乃使其民詐降士彬士彬白之延州范雍請徙置南方雍曰討而擒之孰若招而致之乃賞以金帛使隷于士彬于是降者日至分隸十八寨甚衆元昊使其諸將每與士彬遇輒不戰而走曰吾士卒聞鐵壁相公名莫不墜膽于地狼狽奔走不可禁止也士彬益驕又以嚴酷御下或有所侵暴故其下多有怨憤者元昊乃隂以金爵誘其所部往往受之而士彬不知是歲元昊遣衙校賀眞來見范雍自言欲改過自新歸命朝廷雍喜厚禮而遣之凡先所獲俘梟首于市者皆歛而𦵏之官為致祭眞既出境敵騎大入諸降蕃皆為内應士彬時在黄帷寨聞賊至索馬左右以弱馬進賊遂鞚馬以詣元昊士彬使其腹心赤豆軍主以珠帶示母妻使逃母妻䇿馬奔延州范雍猶疑使人詗賊皆為所擒明日騎至城下元昊割士彬耳而不殺後十餘年卒于夏地康定初夏人入寇參知政事宋庠薦供奉官閤門祗候桑懌有勇略今在嶺南請召于西邊任使詔遷内殿崇班充鄜延路駐泊都監頃之徙涇原路駐泊都監屯鎭戎軍至是戰死慶厯元年二月十二日趙元昊寇渭州先遣遊兵數千騎入塞侵掠懐逺寨靜邊寨籠竿城西路都同巡檢常鼎劉肅及諸寨與戰斬獲頗衆于是環慶路部署任福及鈐轄朱觀涇原路都監王珪桑懌渭州都監趙律鎮戎軍都監李簡監押李禹亨等合兵三萬餘人追擊之將作監丞耿傳掌督芻糧亦在軍州賊隂引兵數萬自武延川入據姚家温家好水三川口諸將及士卒貪擄獲分道爭進十四日晨至三川口是時官軍追賊已三日士卒飢疲猝與賊遇懌力戰先死福等兵大敗福與武英王珪趙律李簡李禹亨劉肅耿傳皆死于賊指揮使忠佐死者十五人軍員二百七十一人士卒六千七百餘人亡馬一千三百匹殺人民五千九百餘口熟户一千四百餘口焚二千二百六帳斬賊首五百一十級獲馬一百五十四匹任福字祐之開封人少時頗涉書史咸平中應募補殿前諸班以材力選為列校凡六遷至遙領刺史寳元初夏州趙元昊始絶朝貢朝廷選班直諸校有勇幹者除前班官任以邊事除福莫州刺史充嵐石隰州都巡檢使尋改鳯翔秦鳳階成等路駐泊馬部軍副都部署兼知隴州康定元年遷忻州團練使充鄜延路駐泊兵馬部署尋徙知慶州兼邠寧環慶路兵馬部署安撫使是歲九月福與諸將攻元昊白豹城拔之破其四十餘帳獲其防禦團練使等七人朝廷賞其功遷賀州防禦使兼神龍衛四廂都指揮使月餘又遷侍御親軍都虞候明年春受詔乘傳至涇原與陜西都部署經制邊事二月元昊寇渭州福與諸將出兵合數萬人禦之先戰小利乘勝直進至三川口忽遇夏兵且二十萬官軍大敗矢中福子懐亮之嗌懐亮墜馬援福馬鞅告之福猶趣以疾戰賊擊懐亮墜崖死福乘馬運四刃鐵簡與賊鬭身被十矢頰中二刃乃為賊所殺年六十一上聞而惜之贈武勝軍節度使檢校太尉兼侍中進封其母董氏為隴西郡太夫人妻王氏封瑯琊郡夫人子懐德除供備庫副使懐亮贈率府副率懐譽除供奉官懐謹侍禁孫惟恭惟讓皆除殿直姪懐玉除借職賜田宅􅉠贈甚多王立字誠之維州北海人咸平三年進士及第補寧化軍判官天聖四年為䕫州路轉運使施州徼外蠻夷利得賜物每歲求入貢者甚多所過煩擾為公私患立奏令以貢物輸施州遣還溪洞又城施州通雲安軍道以運鹽朝廷嘉之歴江南東陜西河北東路轉運使并州有羣盜攻刦行旅州縣不能制立行部至并州選巡檢兵士十五人自隨陽云以䕶行裝微詗知盜處掩捕盡獲之五日中獲十八人盜賊遂息自河東徙揚州明道二年以太常少卿為户部副使尋以足疾出知廬州遷右諫議大夫徙知密州秩滿歸卒慶厯初趙元昊圍麟州二十七日城中無井掘地以貯雨水是時水竭知州苗繼宣拍泥以塗藁積備火箭射賊有諜者潛入城中出告元昊城中水已竭不過二日當破元昊望見塗積曰城中無水何暇塗積斬諜者解圍去麟州之圍苗繼宣募吏民有能通信求援于外者通引官王吉應募繼宣問曰須幾人從行吉曰今賊騎百重無所用處請改換衣服手挾弓矢齎糧餉為邊人夜縋而出遇賊問則為蠻語答之兩晝夜然後出賊寨之外走詣府州告急府州遣將兵救之吉復間道入城城中皆呼萬歲及圍解詔除吉奉職本州指使吉嘗從都監王凱及中貴人將兵數千人猝遇賊數萬騎中貴人惶恐以手帛自經吉曰官何患不死何不且令王吉與賊戰若吉不勝死未晚也因使其左右數人守中貴曰貴人有不虞當盡斬若屬因將所部先登射殺賊大將賊衆大奔衆軍乘之賊墜崖死者萬餘人奏上凱自侍禁除禮賓使本路鈐轄吉自奉職除禮賔副使吉嘗與夏人戰其子文宣年十八從行戰罷不見文宣其麾下請入賊中求之吉止曰此王吉子而為賊所獲尚何以求為頃之文宣挈二首以至吉乃喜曰如此真我子也吉每與賊戰所發不過一矢即捨弓肉袒而入手殺數人然後反曰及其張弓挾矢之時直往抱之使彼倉猝無以拒吾則成擒矣吾前後數入其陣未嘗兩矢也時又有張節與吉齊名皆不至顯官而卒慶厯三年正月廣南東路轉運司奏前此温台府巡檢軍士鄂陵殺巡檢使寇掠數十州境亡入占城泉州商人邵保以私財募人之占城取鄂陵等七人而歸梟首廣市乞旌賞詔補殿侍監南劒州酒税初内臣温台巡檢張懐信性苛虐號張列挈康定元年鄂陵等不勝怨忿殺之至是始平焉慶厯四年夏四月壬辰朔丁酉潭州奏山蠻鄧和尚等寇掠衡道永郴州桂陽監先是宜州奏本管環州蠻賊歐希範僭稱桂王歐正辭僣稱桂州牧案宋朝事實作歐希範推歐正辭為桂王與此有異攻環州殺官吏詔以虞部員外杜杞為刑部員外郎直集賢院充廣南西路轉運按察使兼本路安撫委以便宜經略慶厯四年七月梓州路轉運司奏知瀘州侍禁閤門祗候李康伯令教練使史受招諭淯井叛蠻酋長出降乞旌賞及補授殿侍充淯州監一路巡檢李康伯與提㸃刑獄邈州首領唃斯羅有三子曰摩戩轄戩董戩董戩尤桀黠殺二兄而并其衆唃斯羅老國事皆委之董戩秦鳳經略使張方平使人誘董戩入貢許奏為防禦使董戩遣使入貢㑹知雜御史吳中復劾奏方平擅以官爵許戎啟其貪心方平議遂不行契丹以女妻董戩與之共圖夏國夏主諒祚與之戰屢為所敗嘉祐六年秋諒祚遣使請尚公主鄜延經略司奏之朝廷令鄜延勿納其使㑹諒祚舉兵擊董戩屯于古渭州之側古渭州熟户諸酋長皆懼以為諒祚且來併吞諸族皆詣方平訴求救方平懼飾樓櫓為守城之備盡籍諸縣馬悉發下番兵以自救樞密張公云皇祐末古渭州熟户反増秦州戍兵甚多事平文公悉分屯于永興涇原環慶三路期以有警急則召之以省芻糧謂之下番兵關西震聳方平仍驛書言狀乞發京畿禁軍十指揮赴本路樞密使張昪言于上曰臣昔在秦鳳邊人言賊入寇前後甚衆皆無事實今事未可知而發京畿以赴之驚動遠近非計也請少須之上從之數日方平復奏諒祚已引兵西去擊董戩矣諒祚尋復為董戩所敗築堡于古渭州之側而還薛向云涑水記聞卷十二
