body:
  text: 涑水記聞卷四宋司馬光撰叔禮為余言昔通判定州佐王徳用是時契丹主在燕京朝廷發兵屯定州者㡬六萬居逆旅及民家闐塞城市未嘗有一人敢喧譁暴横者將校相誡曰吾輩各當務歛士卒勿令擾我菩薩一旦倉中給軍糧軍士以所給米黑喧譁紛擾監官懼逃匿有四卒以黑米見徳用徳用曰汝從我當自入倉視之乃往召專副問曰昨日我不令汝給二分黑米八分白米乎曰然然則汝何不先給白米此輩見所給米腐黑以為所給盡如是故喧譁耳專副對曰然某之罪也徳用叱從者杖專副人二十又呼四卒謂曰黒米亦公家之物不給與汝曹當棄之乎汝何敢乃爾喧譁四卒相顧曰向者不知有八分白米故耳某等死罪徳用又叱如此欲求決配乎指揮使者拜流汗乃舍之倉中肅然僚佐皆服其能處事翰林學士曽公曰景祐末河東地震京師正月雷上憂災異深自貶損祕書丞國子監直講林瑀上言災異有常數不足憂又依附周易推衍五行隂陽之言上之上素好術數觀瑀書異之欲為遷官參知政事程琳以為不可乃賜緋章服瑀時兼諸王宫教授琳因言瑀所挾多圖緯之言不宜與宗室遊乃罷宫職上每讀瑀書有不解者輙令御藥院批問瑀因是得由御藥院闗說于上大抵皆諂諛之辭緣飾以隂陽上大好之㑹天章閣待制闕講官李淑等薦史館檢討王洙事在中書未行一旦内以瑀充侍讀是時吕夷簡雖惡瑀欲探觀上意用瑀堅否乃曰瑀上所用洙臣下所薦耳不若竝進二名更請上擇之衆以為然明日以洙瑀名進上曰王洙何如夷簡對曰博學明于經術上曰吾已命瑀矣若何夷簡曰請竝用二人乃俱拜天章閣侍講瑀侍上數年専以術數恱上意徐復善易召至闕下拜官不受瑀與撰天文會元圖上之言自古聖帝即位皆乾卦御年若漢髙祖太祖皇帝亦然上以其書問御史中丞賈昌朝對曰臣所不習瑀與昌朝辨于上前由是與昌朝不協上問瑀太祖即位之年直何卦瑀對乾卦又問真宗亦然上由是不樂益厭瑀之迂談昌朝因劾奏瑀為儒士不師聖人之言專挾邪說罔惑上聴不可在近侍有詔落侍講通判歙州後知成州坐事失官遂廢于世傅求曰皇祐二年詔陜西揀閲諸軍及新保捷年五十以上若短小不及格四指者皆免為民議者紛然以為邊事未可知不宜減兵又云停卒一旦失衣糧歸鄉閭間必相聚為盜賊緣邊諸將争之尤甚是時文公執政龐公為樞宻使固執行之不疑是歳陜西所免新保捷凡三萬五千餘人皆歡呼返其家其未免者尚五萬餘人皆悲涕悵已不得去求曰陜西緣邊計一歳費七十貫錢養一保捷是歳邊費凡減二百四十五萬貫陜西之民由是稍蘇又曰慶厯初永叔安道王素俱除諫官君謨以詩賀曰御筆新除三諫官喧然朝野競相歡當年流落丹心在自古忠良得路難必有謨猷禆帝力直須風采動朝端世間萬事俱塵土留取功名久逺看三人以其詩薦于上尋亦除諫官張侍郎曰陳執中以前兩府知青州兼青齊一路安撫使轉運使沈邈陳述古之徒輕之數以事侵執中言以卒數萬餘修青州城民間苦之集賢校理李昭遘上言執中之短詔以昭遘疏示之執中慙恚上疏求江淮小郡詔不許㑹賊王倫起沂州入青州境執中謂青齊捉賊傅永吉曰沂州君所部也今賊發部中又不能獲君罪大矣永吉懼請以所部兵追之自謂必得賊自青齊歴楚泗真揚入蘄黄永吉自後緩兵驅之賊聞後有兵不敢頓舎比至蘄黄疲敝不能進黨與稍散永吉追擊盡殺之上聞之嘉永吉以為能超遷閤門通事舎人又遷閤門使入見許升殿上稱美永吉獲倫之功永吉對曰臣非能有所成也皆陳執中授臣節度臣奉行之幸有成耳因極言陳執中之美上益多永吉之讓而賢執中因問永吉曰執中在青州凡㡬時對曰數歳矣未㡬上謂宰相曰陳執中可為參知政事于是諫官蔡襄孫甫等争上言執中剛愎不才若任以政天下之不幸上不聴諫官争不止上乃命中使齎敕誥即青州授之且諭意曰朕欲用卿舉朝皆以為不可朕不惑人言力用卿耳明日諫官復上殿上作色逆謂之曰豈非論陳執中耶朕已召久矣諫官乃不敢復言中使至青州諭上旨執中涕泣謝恩既至中書是時杜衍章得象為相賈昌朝與執中參知政事凡議論執中多與之立異蔡襄孫甫所言既不用因求出事下中書甫本衍所舉用于是中書共為奏云今諫院闕人乞且留二人供職既奏上頷之退歸即詔吏出劄子令襄甫且如舊供職衍及得𧰼既署吏執劄子詣執中執中不肯署曰曏者上無明旨當復奏何得遽令如此吏還白衍衍取劄子壊焚之執中遂上奏云衍黨顧二人茍欲令其在諫署欺罔擅權及臣覺其情遂取劄子焚之以滅迹懐姦不忠明日衍左遷尚書左丞出知兖州仍即日發遣賈昌朝為相蔡襄知福州孫甫知鄧州頃之得象出知陳州執中遂為相又曰執中之為相也葉清臣為翰林學士草其制誥少所襃美慶厯六年夏清臣以翰林侍讀學士自揚州移知汾州過京師袖麻詞草于上前自陳曰臣代王言不敢虚美當執中為相才徳實無可言執中以是怨臣故盛夏自揚州移臣汾州水陸數千里臣誠無罪惟陛下哀之改知澶州至官未逾月改知青州明年夏資政殿學士程琳自知永興軍府移青州執中復奏移清臣自青州移永興軍清臣官時為户部郎中上命遷諫議大夫執中曰故事兩制自中書郎中遷左右郎今遷諫議大夫太優乞且令兼龍圖閣學士上許之故事新除知永興軍府者當有錫賚執中復曰清臣近已得賜遂不與清臣愈憾過京師復于上前力言執中之短上疏及口陳者不可勝數辭龍圖閣學士不受上命與之錫賚亦不受既而給赴長安上遇執中亦如故或曰往者執中自諫官左遷乗舟東下清臣自兩浙罷官歸道中相遇而争泊舟之地遂相忿詈由是有隙所從來逺矣又曰天章閣待制張昷之為河北都轉運使保州界河巡檢兵士常以中貴人領之與州抗衡多齟齬不相平州常下之其士卒驕悍糧賜優厚雖不出巡徼常廩口食通判石待舉以為虚費申轉運使罷之士卒怨怒遂作亂殺知州通判等梟待舉首于木上每旦射之箭不能容則拔去更射推都監為主不從即以鎗刺之洞心刃出于背又推監押韋貴貴曰若必能用吾言乃可衆許之遂立貴為主貴以言諭之令勿動倉庫及妄殺人且說之以歸順朝廷衆頗聴之㑹朝廷遣知制誥田況齎詔諭之況遣人于城下遥與賊語出詔示之賊終狐疑不聴稍近城則射之不能得其要領有殿直者徑踰濠詣城下謂賊曰我班行也汝下索我欲登城就汝語賊乃下索即援之登城謂賊曰我班行也豈不自愛茍非誠信肯至此乎朝廷知汝非樂為亂由官吏遇汝不以理使至此今赦汝罪又以禄秩賞汝使兩制大臣奉詔書來諭汝尚疑之豈有詔書而不信耶兩制大臣而為誕妄耶辭氣雄辯賊皆相顧動色曰果如此更使一二人登城即復下索召其所知數人登城賊于是信之争投兵下城降即日開門大軍入收後服者一指揮而坑之餘皆勿問殿直加閤門祗候保州城未下之時有中貴人楊懐敏案宋朝事實作張懷敏與張昷之不協在軍中密奏云賊于城上呼云斬張昷之首我當降願賜昷之首以示賊宜可得上從之遣中使奉劍往即軍中斬昷之首以示賊是時參知政事富弼宣撫河北遇之即遣中使復還且奏賊初無此言是必怨讎者為之藉令有之若以一卒之故斷都轉運使頭此後政令何由得行上意乃解昷之落職知虢州王達者屯田郎中李曇僕夫也事曇久親信之既而去曇應募兵以選入軍伍凡十餘年㑹曇子以學妖術妄言事父子械繫御史臺獄上怒甚治獄方急曇平生親友無人敢餉問之者達日夕守臺門不離給飲食候信問者四十餘日曇坐貶南恩州别駕仍即時監防出城諸子皆流嶺外達追哭送之防者遏之達曰我主人也豈得不送之乎曇河朔人不習嶺南水土其從者皆辭去曰某不能從君之死鄉也數日曇感恚自死旁無家人達使母守其屍出為之治䘮事朝夕哭如親父子見者皆為流涕殯于城南佛舎然後去嗚呼達誠隸也非知有古忠臣烈士之行又非矯迹求名以取禄仕也獨能出于天性至誠不顧罪戾以救其故主之急始終無倦如此豈不賢哉嗟乎彼所得于曇不過一飯一衣而已今世之士大夫因人之力或致位公卿已而故人臨不測之患屏手側足戾目窺之猶懼其禍之將及己也若畏猛犬逺避去之或從而擠之以自脫敢望其優恤振救耶彼雖巍然衣冠𩔖君子哉稽其行事則此僕夫必羞之王景曰晉鹽之利唐氏以來可以半天下之賦神功以此法令嚴峻民不敢亂煮煉官鹽大售眞廟以降緩刑罰寛聚斂私鹽多官利日耗章獻時景為選人始建通商之策大臣陳堯咨等多謂不便章獻力欲行之廷謂大臣曰聞外多苦惡鹽信否對曰惟御膳及宫中鹽善耳外間皆是土鹽章獻曰不然御膳亦多土鹽不可食欲為通商則何如大臣皆以為必如是縣官所耗失利甚多章獻曰雖棄數千萬之耗何害大臣乃不敢復言于是命盛度與三司詳定卒行其法詔下各郡之民皆作感聖恩齋慶厯初范傑復建議官自運鹽于諸州賣之八年范祥又請令民入錢于邊給鈔請鹽朝廷從之擢祥為陜西提刑又曰太宗初築塘泊非以限幽薊之民蓋以遏敵人之奔軼使出一塗見易制耳及楊懐敏為水則乃言可以限絶契丹隄塞其北而稍注水益之漫衍而南侵溺民田無有限極其間合處又三十四里而圖畫密相比以朝廷有澶淵之役敵自梁門遂城之間積薪土為甬道而來曽不留行又況冰凍及自西山或不合處過足以明其無益矣去歳河決商胡河朔水災所以甚于往前者以河流入塘泊堰有缺處敏補之水不能水流則愈南侵也案此條有訛缺字句梁寔曰杜杞在廣南誘宜州蠻數千人飲以曼陀羅酒醉而殺之以書詫于寔父自比馬援曰此不足以為吾功力能辦西北顧未得施耳時言事者争言杞為國家行不信于蠻夷獲小忘大朝廷詰杞之所殺蠻數為即洞中誅之耶以金帛召致耶杞不能對亦有隂為之助者故得不坐然杞自虞部員外郎數年位至兩制案杜杞殺五溪蠻事已見前卷此條複出而語句略有不同孫奭字宗古博平人幼好學博通書傳善講說太宗端拱中九經及第再調大理評事充國子監直講太宗幸國子監詔奭説尚書說命三篇奭年少位下然音讀詳明帝稱善因歎曰天以良弼賚商朕獨不耶因以切勵輔臣賜奭緋章服累遷都官員外郎侍諸王講賜紫章服真宗即位令中書門下諭奭欲任以他官奭對不敢辭為諸王侍講頃之自職方員外郎除工部郎中充龍圖待制會真宗幸亳州謁太清宫奭上言切諫真宗不納遂為解疑論以示羣臣俄知密州轉左諫議大夫知河陽還為給事中奭以父年九十乞解官侍養詔知兖州上即位召還以工部侍郎為翰林侍講學士預修先朝實錄丁父憂起復舊官久之改兵部侍郎兼龍圖閣學士奭每上前說經及亂君亡國之事反覆申譯未嘗避諱因以規諷又掇五經切治道者為五十篇號經典徽言上之畫無逸為圖乞施便坐為觀鑒之助時章獻明肅皇太后每五日一御殿與上同聴政奭因言古帝王早暮見未有曠日不朝陛下宜每日御殿以覽萬㡬奏留中不報上與太后雅愛重之每進見常加禮久之上表致仕上與太后御承明殿委曲致諭不聴所請因詔與龍圖閣學士馮元講老子三章禮部尚書晏殊進讀唐史各賜帛二百匹改工部尚書知兖州侍宴太清樓近臣皆預俄出御飛白書賜羣臣中書門下樞密院大字一軸諸學士以下小字各二軸惟奭與太子少傳致仕晁迥大小兼賜焉竝詔羣臣賦詩翌日奭入謝承明殿上令講老子三章賜襲衣金帶銀鞌勒馬及行賜宴于瑞聖園上賦詩餞行竝召近臣賦詩士大夫以為榮耕耤恩改禮部侍郎是歳累表乞致仕病甚戒其子不納婢妾曰無令我死婦人之手年七十有四諡曰宣奭舉動方重議論有根柢不肯詭隨雷同真宗已封禪符瑞屢降羣臣皆歌誦盛徳獨奭正言諫諍毅然有古人風采又定著論語爾雅孝經正義請以孟軻書鏤板復鄭氏所注月令案唐開元中刪定月令李林甫注之刋行至宋景祐初從奭言復舊初五郊從祀不設席尊不施幂時饗飲福用一尊不設三豋登歌不雍徹祀昊天上帝外級止十七位享先農在祈穀之前上丁釋奠無三獻宗廟不備二舞奭皆言其謬闕竝從増改云又建言禮家六天帝止是天之六名實則一帝今位號重複不合典禮冬至宜罷五帝雩祀設五帝不設昊天帝位乞與羣臣議不行撰崇祀錄樂記圖五經節解五服年月傳于時三子瑶虞部員外郎琪衛尉寺丞早卒瑜殿中丞伯京曰馮元孫奭俱以儒素稱馮進士奭諸科及第奭數上疏直諫真宗末侍東宫天聖初皆為侍讀學士十年奭因請老詔不許奭請不已乃遷禮部尚書知兖州上宴太清樓下以餞之又詔兩制三館餞于祕閣奭已辭亟行詔追餞席于瑞聖園先是言兩制者中丞不預王時為中丞恥之曰朝廷盛事也吾不可以不預上疏請行詔許之上又賜御書以寵之卒于兖州元性微吝判國子監公讌日以其家所賜酒充事而取直以歸人以此少之無子死之日家資鉅萬子高曰故事直學士以上皆服金帶孫奭羸老不勝其重詔特聴服犀帶而賜金帶張述晦之曰十一月夏人宼承平砦都轄許懐徳卻之宼曰來月見延州城下范雍懼請濟師十二月以甲五千來留半月寇無聞正月初還屯華沼寇又聲言由保安來懐徳壁承平部署石元孫鈐轄黄徳和屯保安以禦之李奠驕貪士憤之十七日寇聲言取金明砦奠甲以俟逮亥不至釋而寢十八日四鼔寇奄至士叛俘奠騁入延十九日寇及城下先是雍聞寇且至亟呼劉平至自華沼赴難會大雪平兼行過保安元孫徳和以其甲巡夕宿白巾未知寇及郭二十日五鼓平合吏議進師裨將郭遵曰吾未識寇深淺而瞽進必敗請先止此偵而進平叱曰豎子驍決乃爾怯沮吾軍遂呼馬乗去士未徧食踐雪行數十里寇偽為雍使督進且曰寇已至道隘宜單騎引衆平信之遂進屯五龍川據髙自守二十一日寇以羸兵先犯之遵陷陣搏戰俘馘而返已而再至平軍少利比晩復至為兩翼以揜之徳和乃以數千人南遁平軍遂敗寇圍而薙之遵等死二十二日旦呼元孫以殘甲數千自固夜四鼓賊環營呼曰如許殘兵不降何待平旦賊騎自山四出絶官軍為二平與元孫俱被執平不復食沒于興州雍以實狀聞乃斮徳和腰賞平元孫家案宋史劉平傳初徳和言平降賊朝廷發禁兵圍其家文彦博龐藉往訊具得其實遂釋其家徳和坐腰斬而延州吏民亦詣闕訴平戰沒狀遂贈朔方軍節度使兼侍中諡壯武其後降羌多言平在興州未死及石元孫歸乃知平沒于興州所記視此較詳而大略相合初雍辟計用章自副延州被賊圍雍召用章問計對曰惟有死爾尚何言㑹其夜雪大作賊撤城下兵去用章以曽勸雍棄延州詔杖流雍遷知安州案計用章原本脱姓東都事略附范雍傳云臨邛人以進士起家至秘書丞從雍辟雍誣以罪竄雷州其後范仲淹經略延州知用章以忠獲罪奏雪于朝田況亦以為言起監隨州酒後知龔州終都官員外郎此條所記未詳今參攷補注又曰十月一日沿邊部署葛懐敏鈐轄李知和以甲七萬出屯瓦亭裨將劉賀以兵三萬從行留且半月寇攻平定平定守郭固鎮戎守曹瑛案東都事略及宋史葛懐敏傳竝作曹英皆來請援十日進屯鎮戎李知和善郭固請救之懐敏未應知和請曁瑛先進曰君禄盈庫人今能偷安我不能也十日遂以甲進寇以羸胔餌知和吿勝相繼軍中心躍十日知和過平定十里為寇所窘束吿懐敏遂以大軍赴之適至平定知和已敗還軍中憂寇繼至趙珣以數千騎旁出欲邀之寇乃退自是寇每夕出軍後呼噪軍中閉聲滅火旦輒斂去糧道絶十日懐敏諸將皆欲還走珣曰來塗寇必有伏若由籠竿往彼無險且非所意自昏議至四鼓不決珣憤欲斮指衆解之因罷比明中軍已行衆從之寇躡其後為方陣而行及定川寇分為二道自兩旁截之軍絶為三中殱前軍脱者十二三後軍自籠竿盡免案此下脱佚未竟宋史附趙珣于父振傳附懐敏于父霸傳云趙珣葛懐敏曹英李知和王保王文許思純李良臣等皆遇害贈官有差懐敏賜諡忠𨼆西鄙用兵許公吕夷簡當國増兵四十萬及文公彦博為相龐公籍為樞密使減陜西保捷八萬儂智髙破嶺南十四州狄青平之事在朔記文公罷三蕃接伴不使侵擾河北北使大恱趙抃上言陳相不學無術温成葬多過制度翰林學士頓置七員措置顛倒劉湜自江寧移廣州不改待制向傳式自南京移江南遷龍直吳充鞠真卿按舉禮生代置事禮生贖銅充真卿出知軍用邪佞崔澤非次除給事中澤治執中獄依違以酬私恩寄嬖人于周豫之家舉豫為館職酬私隙邵必知常州議決徒刑既自覺舉又更赦宥遷官去官執中以宿嫌自開封府推官降充卲武軍監當汀州石民英勘入使臣賍罪決配廣南牢城本家訴雪悉是虚枉只降民英差遣排斥善良吕景初馬遵吴中復彈奏梁適既得罪馮京言吴充鞠真卿無罪充等尋押出門京亦然很愎任情迎兒方年十二用嬖人張氏之言累行笞撻窮冬髀縛絶其飯食孿囚至死海棠為張氏所捶遍身瘡痕自縊而死又一女僕髠髮自縊而死一月之内三事繼發前後所發亦聞不少家聲狼籍帷簿渾淆信任胥吏貴族宗姻不免飢寒招延十秘執中之門未嘗禮一賢才所與語者苖達劉抃義叟之徒所預坐者普元李賢寧程惟𧰼之輩處台鼎之重測候災變意將奚為等八事涑水記聞卷四
