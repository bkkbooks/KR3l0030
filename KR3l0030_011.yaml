body:
  text: 涑水記聞卷十一宋司馬光撰王罕云儂智高犯廣州罕為轉運使出巡至梅州聞之而還仲簡使人間道以蠟丸告急且召罕罕從者才數十人問曰圍城何由得入城東有賊所不到者可以夜縋而入罕曰不可進至惠州廣民擁馬求救曰賊圍城十縣民皆反相殺掠死傷散野罕曰吾聞之先父曰凡有大事必先詢識者而後行之無人則詢老者也乃召耆老問之對曰某家客户十餘人今復亡為賊矣請各集兵衛其家罕曰賊者多以莊客何以禦之仍召每村三大户與之帖使人募壯丁二百又帖每縣尉募弓手三千人以自衛捕得暴掠者十餘人皆腰斬之又牒知州知縣今皆得擅斬人一夕鄉村肅然罕為募民驍勇者以自隨得二千人船百艘製旌旗鉦鼓長驅而下趣廣州蠻兵數千人來逆戰擊卻之蠻皆斂兵聚于城西乃開南門作樂而入罕不視家登城子死于賊人之手而不哭樹鹿角于南門之西以拒蠻自是南門不復閉矣凡糧用皆自南門而入東關主簿黃固取拋村知新州侍其淵在廣州罕以其忠勇與之共守蠻衆數萬皆所掠二廣之民也使之晝夜攻城為火車順風已焚西門時六月城上不能立軍校請罕下城少休罕欲從之淵奮劍責軍校曰汝曹竭力拒敵則猶可以生若欲潰去縱不為賊所滅朝廷亦當族汝前部亦欲何之罕乃止士氣亦百倍蠻車不能克而退提刑鮑軻率其孥欲過嶺北至雄州蕭勃留之乃日遞一奏又召罕至雄州計事罕不來又奏之諫官李兑奏罕只在廣州端坐及奏罕退走圍解罕降一官信州監稅軻受賞罕不自言黃固當解城時最輸力已而磨勘若有不足者淵亦得罪淵功亦不録罕云王紘云慶厯四年二月庚子供奉陳曙等遷官賞討光化賊之功也先是知光化軍水部員外郎韓綱性苛急失衆士心去年九月羣盜張海等入光化軍境剽劫閭里綱部分宣毅軍士三百餘人被甲乘城凡十餘日城中民高資者獻蒸葫酒肉以享甲士綱以餅肉之半犒士及賜酒人一巵而斥賣其餘欲以其錢市兵器為守禦備軍士營遠者或不時得飲食而綱所給餅常至日旰燥硬不可食時有監押使在軍中所部軍士不以請給歷自隨民又請獻錢以資監押之軍士綱曰本軍之士尚無錢給之何有于監押悉辭不受軍士遂訛傳民獻以資乘城之士而知軍卻之益加怨憤綱又使員僚王德作城內布兵圖久之不成綱怒罵曰我不敢斬汝耶因召劊子令每日執劍待命于庭下十月三日民有入粟得官者駱子中通刺謁綱綱迎語子中不用拜軍士誤聽以為子中獻錢而綱辭不取時方給餅肉貟僚邵興叱軍士起曰汝輩勿食此因出屋外投蒸餅入綱庭中綱怒命執投餅者得數人械繫于獄明日獄司以節狀追捕其黨邵興懼因糾率其衆盜取庫中兵器作亂欲殺綱綱自宅後踰城逃出乘小舟沿漢下數里再宿而後返與官吏皆逃興等遂焚掠居民劫其指揮使李美及軍士三百餘人行趨蜀道李美老不能行于道自經死興獨率其衆與商州巡檢戰殺之員僚趙千及軍百餘人自賊所走還光化軍興所過劫掠民居行旅及敗興元府兵于饒風嶺殺其將興元府員僚趙明以衆降興興聞洋州有虎翼兵畏之乃自州北循山而西州遣捉賊使臣李方將虎翼兵追之二十九日擊破興等于湑水斬興及其黨五十餘人生擒趙明餘黨皆潰州縣逐捕盡誅之陳曙等皆以功遷綱坐棄城除名英州編管監押許士從追三官舒州編管慶厯四年八月乙卯上曰近觀諸路提轉所按舉官吏務為苛刻不存遠大可降詔約束保州雲翼兵士舊有特支口糧通判石待舉以為安坐冗食白轉運司減之軍士怨怒作亂殺知州通判都監以監押韋貴為主閉城拒命詔真定府副都部署李昭亮沿邊都巡檢入內押班楊懷敏知定州皇城使賀州刺史王杲等討之丙辰樞密奏保州城下諸將未有統一詔富弼乘驛詣城下授之節制以便宜從事九月李昭亮楊懷敏命侍禁郭逵以詔書入城招諭亂兵亂兵開城出降有數百後出悉誅庚申河北都轉運使按察使工部郎中知汝州案此下有闕文皆坐減雲翼食及不覺察亂兵也郭逵加閣門祗候逵兄遵以勇力聞從劉平與夏人戰死五龍水案保州兵作亂事見前第四卷作田況齎詔諭降與此所記不同周革曰景德中中國作誓書以授契丹其使者繼之以四言曰孤雖不才敢遵誓約有渝此盟神明殛之慶厯中歲增給二十萬更作誓書亦如之嘉祐初樞密院求誓書不獲又求寧化軍疆境文字亦不獲于是韓稚圭曰樞密院國家戎事之要今文書散落如此不可乃命大理寺丞周革編輯之數年而畢成千餘卷得杜衍祁公手録誓書一本于廢書其正本不復見慶厯中契丹以兵壓境欲復周世宗所取關南之地騰書中國其言周世宗曰人神共怒社稷不延其言太宗曰恃有征之志已定並汾興無名之師直抵幽薊富公之使北也朝廷以三書與之其一增物二十萬其一增十萬其一以公主妻梁王約曰能為我令元昊稱臣納款我歲增二十萬物不能者歲增十萬物契丹曰元昊稱臣納款我頤指之勞耳汝當以二十萬與我然當謂之獻或謂之納然後可至于公主則不必爾也富公固爭獻納之名歸白朝廷慶厯三年十二月八日韓琦奏竊以元昊叛逆朝廷未能誅討欲為守禦之計則莫若修完城寨賊來則堅壁清野以待之使其不戰而困此經久之䇿也臣前至涇原見緣邊堡寨隳損應增置者甚衆合計度修築其山外弓箭手等今年以來役作甚苦又聞來春欲令興修永洛結公二城以通秦州涇原救應之路其間自涇原章川堡至秦州麻穰寨一百三十里並是生户所居只于其中通達一徑須作二大寨十餘小堡乃可通計其土功何啻百萬更須採伐林木作樓櫓營廨又須分正兵三四千人屯守積蓄芻糧所費如此只求一日通進援兵又救應山外比積石儀州黃石河路只省得兩程況劉滬昨已殺降永平路城一帶生户李中和降隴州城一帶蕃部各補署職各充熟户將來若進援兵動不下五六千人小小蕃族安敢為梗則知不須城寨已可往來況今近裏要害城堡尚多闕漏豈暇于孤僻無益之處枉勞軍民事之緩急當有先後伏乞只作朝廷指揮下陜西緣邊四路部署司涇原經略司將涇原路弓箭手等來春且令修築逐地未子堡寨其永洛結公二城權住修築候向來城寨修完了畢别奏取旨如朝廷未以為然乞選差親信中使至涇原秦鳳路詢問文彥博狄青尹洙即知修永洛城便與未便詔如議罷修先是內殿崇班渭州西路巡檢劉滬建䇿修二城陜西四路招討部署鄭戩主其事知秦州文彥博知渭州尹洙等皆不欲修㑹琦自陜西宣撫還奏請罷之又罷四路招討以戩知永興軍因極言築二城之利不可罷遣滬與著作佐郎董士亷依前䇿修之議者紛紜不決詔三司副使魚周詢往視其利害未至洙召滬士亷令罷役蕃部皆遮止滬等請自備財力卒修二城滬士亷亦以熟户既集官物無所以付恐違蕃部之意别致生變遂城之洙以滬士亷違節度命狄青往斬之青囚之以聞于是城中蕃漢之民皆逃潰生户及亡命等爭據其地韓琦又言鄭戩奏乞令臣不預商量臣常患臣僚臨事多避形逃迹或致賞罰間有差誤因退思之臣在西邊及再任宣撫首尾五年只在涇原秦鳳兩路于永洛城事比之他人知之甚詳今若隱而不言復事形迹則是臣偷安不忠有誤陛下委任之意臣是以不避誅責輒陳所見利害凡十三條詔劄與魚周詢等及陜西都轉運使鄭戩等奏二城修之于邊計甚便況永洛城今已修畢惟女牆少許未完棄之可惜誠宜遂令訖役五月十六日詔戩等卒城之琦所論十三條大略言永洛左右皆小小種落不屬大朝今奪取其地于彼置城于元昊未有所損于邊亦無所益一也緣邊禁弓箭手連年借債修葺城寨尚未完備今又修此城堡大小六七計思二年方可得成物力轉見勞敝二也將來修成上件城堡計思分屯正軍不下五千人所要糧草並須入中和糴所費不小三也自來涇原秦鳳兩路通進援兵只為未知得儀州黃石河路所以議者多欲修永洛一帶城寨自近歲修城黃石河路秦鳳兵往涇原並從腹內經過逐城有驛舍糧草若救靜邊寨比永洛只遠一程若救鎮戎德順軍比永洛卻近一程今來永洛勞費如此又多疏虞比于黃石河腹內之路遠近所較不多四也陜西四路自來只為城寨太多分卻兵勢每路正兵不下七八萬人及守城寨之外不過二萬人今涇原秦鳳兩路若更分兵守永洛一帶城寨則兵勢轉弱兼元昊每來入寇不下十餘萬人若分三四千人于山外靜邊章山堡以來出沒則兩路援兵自然阻絶其城寨內兵力單弱必不敢出城不過自守而已如此是枉費功力臨事一無所濟況自來諸路援兵極多不過五六千人至一萬人作節次前來只是張得虛聲若先為賊馬扼其來路必應援不及若自黃石河路則賊隔隴山不能扼截五也自隴川入秦州由故關山阪險隘行兩日方至清水縣水北十里則為麻穰寨自清水又行山路兩日方至秦州由是觀之秦州遠在隴關之外是為孤絶其東路隔限永洛城一帶生户道路不通秦州視之以為籬帳只備西路三都公一帶賊馬來路今若開永洛城一帶道路其城寨之外必漸有人烟耕種蕃部等更不敢當道住坐姦細之人易來窺覘賊若探知此路平快將來入寇分一道兵自麻穰寨扼斷故關及永洛則援兵斷絶秦州必危所以秦人聞言開道皆有憂慮之言不可不知六也涇原路緣邊地土最為膏腴自來常有弓箭手家人及內地浮浪之人詣城寨官員求充弓箭手背後有空閒地土强人為之標占此輩只要官中添置城寨只落奪得蕃部土地耕種又無分毫租稅緩急西賊入寇則和一作私逃入內地事過之後卻來首身所以人數雖多希得其力又商賈之徒各務求囑于新城內射地土居住取便于蕃部交易昨來劉滬下唱和修城之人盡是此輩于官中未見有益七也涇原一路重兵皆在渭州自州至永洛城凡六程若將來西賊以兵圍脅永洛城日夕告急部署司不可不救少發兵則不能前進多發兵則與前來葛懷敏救定川寨覆沒大軍事體一般所以涇原路患見添置城塞者一恐分卻兵馬二恐救應轉難入也議者修永洛城不惟通兩路除熟户外其生有蹉鶻谷者達谷必利城臘家城裊城古渭州龕谷洮河蘭州疊巖州連宗哥青塘城一帶種類莫知其數然族帳分散不相君長故不能為中國之患又謂元昊為草賊素相仇讎不肯服從今永洛城乃其一也朝廷若欲開拓邊境須待西北無事財力强盛之時當今取之實為無用九也今修永洛城本要通兩路之兵其隴成川等大寨須藉秦鳳差人修置今秦州文彥博纍有論奏稱其不便顯是妨礙不合動移十也凡邊上臣僚圖實效者特在于選舉將校訓練兵馬修完城寨安集蕃漢以備寇之至而已貪功之人則不然惟務興事求賞不思國計故昨來鄭戩差許遷等部領兵馬修城又差走馬承受費知微作都大照管名目若修城功畢則皆是轉官酬奬之人不期與尹洙狄青所見不同遂至中輟希望轉官皆不如意今若復修永洛城則隴川等又須相繼興築其逐處所差官員將校人人只望事了轉官豈肯更慮國家向後兵馬糧草之費十一也昨者涇原路抽回許遷等兵馬之時只築得數百步例各二尺以來其劉滬慿恃鄭戩輕視本路主帥一向興工不止及至差官交割又不聽從此狄青等所以收捉送禁奏告朝廷今來若以劉滬全無過犯只是狄青尹洙可罪乃是全不計修永洛城經久利害只聽鄭戩等爭氣加誣則邊上帥臣自此節制不行大害軍事十二也陜西四路惟涇原一路所寄尤重蓋川原平闊賊路最多故朝廷委尹洙狄青以經略之任近西界雖遣人議和自楊守素回後又經月餘寂無消耗環慶等路不住有賊馬入界侵掠今已五月去防秋不遠西賊姦計大未可量朝廷當奬勵逐路帥臣豫作支吾今乃欲以偏裨不受節制為無過而卻加罪主帥實見事體未順十三也更乞朝廷察臣不避形迹論列邊事時與究其利害略去嫌疑處置不差事乃經久靜江軍留後劉平為鄜延邠寧環慶路副部署屯慶州康定元年正月鄜延路都部署范雍聞夏人將自保安軍土門路入寇移牒使平將兵趨土門救應十五日平將所部三千人發慶州十八日至保安軍遇鄜延路副都部署石元孫十九日與元孫合軍趨土門有番官言賊兵數萬已入寨直指金明㑹得范雍牒令平元孫還兵救延州平元孫引兵還明日復至保安軍因晝夜兼行二十二日至萬安鎮平元孫將騎兵先發令兵飯訖繼進夜至三川口西十里許止令騎兵先趨延州奪門是時東染院副使鄜延路駐泊都監黃德和將兵二千餘人屯深安軍北碎金路巡檢万俟政郭遵各將所部分屯他所范雍皆以牒召之使救延州平又使人促之明日平旦平所部步兵尚未至平與元孫還逆之至二十里馬鋪乃遇兵及德和郭遵各所部兵皆㑹凡五將騎合近萬人乃引兵東行且五里平下令諸軍唱殺齊進又行五里至三川口遇賊是時平地有雪五寸許賊于水東為偃月陳官軍亦于水西作偃月陳相向賊稍遣兵涉水為橫陳郭遵及忠佐王信先往薄之不能入既而官軍竝進擊卻之奪其傍牌殺獲溺水者八九百人平左耳後及右脛皆中箭㑹日暮軍士爭挈人頭及斫馬詣平論功平曰戰方急且自記之悉當賞汝也言未究賊引生兵大至直前蕩官軍官軍卻二三十步是時黃德和在陳後先率麾下二三百人走上西南山衆軍顧之皆潰平子侍禁宜孫追及德和執其馬鞚拜之數十日太保且當勒兵還與大人并力卻賊今先去欲何之德和不從宜孫又請遣兵一二人還訪其父德和不與宜孫與德和俱走平使軍校以劍遮士卒近在左右者得千餘人力戰拒賊賊退水東平率餘衆保西南山下立寨自固距賊一里許賊夜使人至寨傍問曰寨內有主將否乎平戒軍士勿應賊又使詐為漢卒傳送文牒軍士知其詐斫殺之至四更賊使人繞寨詬曰幾許殘卒不降何待平使指揮使李康應之曰反賊汝不降我何降也且曰救兵大至汝反賊庸足破乎及明平命軍士整促甲馬再與賊戰賊又使人臨陳呌曰汝肯降乎我當捨爾不則盡殺之平又使李康應曰我來巡邊何者為降汝欲和者當為汝奏朝廷耳賊乃舉鞭麾騎自西山不可勝計合擊官軍死者甚衆至已時平與元孫巡陳東偏賊騎直前衝陳中央陳分為二平與元孫皆為賊所虜平僕夫王信以頡敦負留後印及宣敕從平在陳與平相失賊盡奪其衣并頡敦等信逃竄得免是時黃德和自山中南走出甘泉縣北稍稍收散卒得五六百人緣道縱兵士剽竊民家被寇者貨財及飲酒殺其牛畜食之二十五日至鄜州二十六日虞候張政自戰所脫歸德和問曰汝見劉太尉石太尉乎後來如何政當時實與劉石相失不能知其處道中聞散言劉太尉以亡失多不敢歸已降賊矣因言于德和曰劉太尉二十四日再與賊戰士卒死傷至盡太尉令軍士曰汝曹勿復發箭今日敗矣吾不能庇汝曹當解甲降之耳賊遂執其馬鞚而去德和曰果然吾與汝曹當詭言二十四日不肯降賊力戰得出作奏上之不惟解罪亦可收功汝曹皆有賞矣政出因播其言于市里云平降賊散卒繼至者皆言平降賊以順德和意有蕃落將呂密實見平與元孫為賊所虜并得官軍旗幟收卷以去德和間問之亦順指意言平與元孫降賊賊以紅旗前導而去德和喜命所親吏卒睿作呂密等狀仍增損其語使與己意相傅㑹睿意謂狀中有名者皆應得賞乃更私益兵士曲榮等數人名于其中德和即以密等狀為狀云二十三日賊生兵衝破大陳臣與劉平等阻西山為寨二十四日再與賊戰平以其卒降賊臣等義不受屈與數百人力戰得出㑹平僕夫王信自延州來德和與知鄜州張館使雜問之信私念其主為大將而為賊所擒可醜因紿言賊使李金明來約和親平令李康往答之既而康還言元昊欲與太尉面相約結平乘馬即入賊軍中從者不得入皆見剽剝信獨脫歸德和起詣東廂召信詰曰軍士來者皆言平降而汝獨言平往約和何也信曰此非信之所知也數日德和召信詣其館謂曰汝太尉降賊人人皆知之我已取軍士等狀奏之矣汝今言乃異同朝廷將有制獄汝何能受其榜楚乎我與汝銀叉一枚汝鬻之速去勿留矣信拜受之是時鄜州使人監守信信欲亡不得身無衣寒甚乃為書遺平子曰信從太尉與賊戰不利太尉入賊中約和親今人乃言太尉叛降賊朝廷將有制獄信當以死明太尉忠赤保太尉一家今信衣裝為賊所掠飢寒不可忍願衣裳及錢糧速寄以來有庖人將如慶州信與書寄之鄜延走馬承受薛文仲遇之得其書以聞二月一日德和將其衆歸延州及州城南范雍使人代領其衆遣德和歸鄜州聽朝廷旨尋徙之同州德和始懼奏言臣盡忠于國范雍誣言臣棄軍走又以書抵鈐轄盧守勤及薛文仲云有中貴人至者當力為營護之死生不敢忘守勤等悉上其書十一日朝廷遣殿中侍御史文彥博入內供奉官梁知誠即河中府置獄按之先是有詔平僕人王信乘傳詣闕既而復械送河中府彥博按治德和及信等不能隱皆服其實時河東都轉運使王㳂又奏言訪知延州有金明敗卒二人自夏中逃還云劉平石元孫李士彬皆為賊繫縛而去平在道不食數罵賊云反賊我頭長三尺餘何不速殺我縛我與賊去也彥博牒延州求二卒皆不知處四月十五日具獄以聞中書樞密院共召大理約法准律主將以下先退者斬之又部曲告主者絞二十二日兩府進呈奉聖旨黃德和于河中府腰斬梟其首于延州城下王信杖殺案劉平戰沒事見前第四卷而所記未詳此可與參證趙元昊娶于野利氏生子當為嗣以野利氏兄弟為謨寧令旺榮號野利王剛朗凌號天都王分典左右廂兵貴寵用事知青澗城事种世衡欲離間其君臣遣僧王嵩齎銀龜及書遺旺榮曰汝嚮欲歸附何不速決旺榮見之笑曰种使君年亦長矣乃為此兒戲乎囚嵩于窖中凡歲餘元昊雖屢入寇常以勝歸然人畜死傷亦衆部落甚苦之又歲失賜遺及緣邊交市頗貧乏思歸朝廷而恥先發慶厯三年使旺榮出嵩而問之曰我不曉种使君之意欲與我通和耶即贈之衣服遣教練使李文貴與之偕詣世衡時龍圖閣直學士龐籍為鄜延經略招討使以元昊新寇涇原止之于邊不使前朝廷以厭兵欲赦元昊之罪密詔籍懷之籍上言夏驟勝方驕若中國自遣人說之彼亦偃蹇不可與言乃召文貴詣延州問狀文貴言求請和籍謂之曰汝先王及今王嚮事朝廷甚謹由汝輩羣下妄加之名號遂使得罪于朝廷致彼此之民血塗原野汝民習于戰鬭吾民習于太平故王師數不利然汝豈能保其常勝耶吾敗不害汝敗社稷可憂今若能悔過從善出于款誠名體俱正當相為奏之庶幾朝廷或開允耳案此與前第十卷所記大略相同而文辭或繁或簡各有體裁自不嫌其復因贈遺遣歸文貴尋以旺榮曹偶四人書來用敵國修好之禮籍以其不遜未敢復書請于朝廷朝廷急于休息命籍復書納而勿拒稱旺榮等為太尉且曰元昊果肯稱臣雖仍其僭名可也籍上言僭名理不可容臣不敢奉詔太尉天子上公非陪臣所得稱今方抑止其僭而稱其臣為上公恐彼滋驕不可得臣旺榮等書自稱寧令謨寧令乃彼國之官中國不能知其義可以無嫌臣輒從而稱之旺榮等又請欲用小國事大之禮籍曰此非邊帥所敢知也汝主若遣使者奉表以來當為導致于朝廷耳三年正月元昊遣其伊州刺史賀從勗上書稱男南面邦國令曩霄上書父大宋皇帝籍使謂之曰天子至尊荆王叔父也猶上表稱臣今名體未正不敢以聞從勗曰子事父猶事君也使得至京師而天子不許請更歸議之籍上言請聽從勗詣闕更選使者往至其國以詔旨抑之彼必稱臣凡名稱禮數及求自得之物當力加裁損必不得已乃少許之若所求不違恐元昊之心未易盈厭也朝廷乃遣著作佐郎邵良猶與從勗俱至其國更議之四年五月元昊自號夏國主始遣使稱臣八月朝廷聽元昊稱夏國主歲賜絹茶銀綵合二十五萬五千元昊乃獻誓表十月賜詔答之十二月冊命元昊為國主更名曩霄案自因贈遺遣歸以下與前第十卷所記亦繁簡互異种世衡卒龐籍為樞密副使世衡子詁上諫官錢彥遠書稱吾父離間剛朗凌使元昊誅之由是元昊失其羽翼稱臣請服今龐以吾父功為兩府而吾父無所褒賞彥遠為上言之籍取前後邊奏辨于上前曰元昊稱臣請服之時剛朗凌等方用事文書皆其兄弟所行稱臣後數年自以作亂被誅非因世衡之離間也臣向與韓琦范仲淹俱得旨候西事平除兩府琦與仲淹先為之非攘世衡之功而得之也朝廷猶以世衡有功之故除詁天興尉丞即日勒之官案种詁上書事已見前第九卷而書詞及龐籍奏辨各有不同故當兩存夏國酋長嵬名山部落在故綏州有衆萬餘人其弟夷山先降為熟户青澗城使种諤使人因夷山以誘名山賂以金盂名山小吏李文喜受其賂許以來降名山不知也既而諤大發兵奄至圍其帳名山驚援槍欲鬭夷山呼之曰兄已約降何為如是其姊識其聲曰汝為誰曰夷山也姊曰何以為驗夷山示之手無一指是也姊曰名山我何嘗約降夷山曰兄已受种使君金盂名山曰金盂何在文喜方以示之名山投槍而哭諤遂以兵驅其部落牛羊南還衆多遁亡比至入塞才四千餘人朝廷即除名山諸司使郭帥云种諤之謀取綏州兩府皆不知之及奏得綏州文潞公為樞密使以為趙諒祚稱臣奉貢今忽襲取其地無名請歸之時韓魏公為首相方求出上乃以韓公判永興軍兼陜西四路經略使度其可受可卻以聞韓公至陜西言可受文公以朝旨詰之曰若受之則當饋糧戍之以兵有急當救之此三者皆有備乎韓公對不及饋戍及救彼自有以當諒祚因遺書令勿給糧追還戍兵若諒祚攻嵬名山勿救也時宣徽使郭逵為鄜延經略使以為不可韓公使司封郎中劉航往督責之逵固執不從曰如此則降户無以自存皆潰去矣乃奏請築綏州城置兵戍之命之曰綏德城擇降人壯健刺手給糧以為戰兵得二千餘人郭帥云文公以取綏州為無名請以易安逺塞門于夏國遣祠部郎中韓縝與夏國之臣薛老峯議于境老峯曰茍得綏州請獻安遠塞門寨基縝曰其土田如何老峯曰安有遺人衣而留領袖乎縝信之入奏樞密院劄子下鄜延命追綏德戍人遷其芻糧不盡者焚之經略使郭逵以為夏國心欺紿俟得安遠塞門然後棄綏德未晚匿其劄不行既而遣使交地元昊曰所獻者寨基其四旁土田皆不可得使者以聞上怒甚以讓文公文公亟奏前劄鄜延更不施行時趙卨掌機宜于經略司求前劄不獲甚憂恐逵乃出示之卨驚曰此他人所不敢為也郭帥云涑水記聞卷十一
