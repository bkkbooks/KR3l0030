body:
  text: 涑水記聞卷六宋司馬光撰馮拯河南人其父為趙韓王守第舍拯年少時韓王見之問此為誰其父對曰某男也韓王竒其狀貌曰此子何不使之讀書其父遂使之就學數年舉進士韓王為之延譽遂及第太宗時拯上言請立太子太宗怒謫之嶺南久之以右正言通判廣州事其同官為太常博士署位常在拯下寇萊公素惡拯會覃恩拯遷虞部員外郎其同官遷屯田員外郎以拯素剛讓居其下萊公見奏狀怒下書詰之曰虞部署位乃在屯田之上于法何據趣以狀對于是拯密奏言寇準以私憾專挫辱臣吕端畏怯不敢與爭張洎又準所引用朝廷之事一決于準威福自任縱恣不公皆如此比上看一作省章奏大怒萊公由是出知褒州上又責讓吕端張洎二人皆頓首曰準在中書臣等備員而已真宗即位拯遂被用至宰相今上即位發丁朱崖罪竄之南荒拯之力也拯無文學而性伉直自奉養奢靡官至侍郎聶之美云种放以處士召見拜官真宗待以殊禮名動海內後請歸終南山恃恩驕倨甚王嗣宗時知長安見通判以下羣拜謁放小俯垂手接之而已嗣宗內不平放召其諸姪至出拜嗣宗嗣宗坐受之放怒嗣宗曰向者通判以下拜君君扶之而已此白丁耳嗣宗狀元及第名位不輕胡為不得坐受其拜放曰君以手搏狀元耳何足道也嗣宗怒遂上疏言放實空踈才識無以踰人專飾詐巧盜虛名陛下尊禮放擢為顯官臣恐天下竊盜益長澆偽之風且陛下召魏野野閉門避匿而放隂結權貴以自薦逹因抉摘言放隂事數條上雖不之問而待放之意寖衰齊州進士李冠嘗獻嗣宗詩曰終南處士聲名減邠土妖狐窟穴空王嗣宗不信鬼神疾病家人為之焚紙錢祈禱嗣宗聞之笑曰何等鬼神敢問王嗣宗取枉法贓耶魏舜卿云嗣宗性忌刻多與人相忤世傳嗣宗有恩讎簿已報者則勾之晚年交逰皆入讎簿宋次道云林特本廣南攝官以勤為吏職又善以辭色承上接下官至尚書三司使修昭應宫副使是時丁朱崖為修宫使特一日三見亦三拜之與吏卒語皆煦煦撫慰之由是人皆樂為盡力事無不齊集精力過人常通夕坐而假寢未嘗解衣就枕郝元規云周王母章穆皇后也真宗在藩邸時生景德中從幸永安還得疾薨時年十歲許章穆悲感成疾明年亦崩宋次道云李允則知雄州十八年初朝廷與契丹和親約不修河北城隍允則欲展州城乃置銀器五百兩于城北神祠中或曰城北孤迥請多以人守之允則不許數月契丹數十騎盜取之允則大怒移牒涿州捕賊因且急築其城契丹內慚不敢止也允則為長吏于市中下馬往富民家軍營與婦女笑語無所間然富民犯罪未嘗稍寬假契丹中機密事動息皆知之當時邊臣無有及者董沔云真宗不豫寇萊公與內侍省都知周懷政密言于上請傳位皇太子上自稱太上皇上許之自皇后以下皆不預知既而月餘無所聞二月二日上幸後苑命後宫挑生菜左右皆散去懷政伺上獨處密懷小刀至上所涕泣言曰臣前言社稷大計陛下已許臣等而月餘不決何也臣請剖心以明忠款因以刀劃其胸僵仆于地流血淋漓上大驚因是疾作左右扶輿入禁中皇后命收懷政下獄按問其狀又于宫中索得萊公奏言傳位事乃命親軍校楊崇勳密告云寇準周懷政等謀廢上立太子遂誅懷政而貶萊公寇萊公之貶雷州也丁晉公遣使齎敕往授之以錦囊貯劍揭于馬前既至萊公方與羣官宴飲驛使言狀萊公遣羣官出迎之中使避不見入傳舍中久不出問其所以來之故不答上下皆惶恐不知所為萊公神色自若使人謂之曰朝廷若賜準死願見敕書中使不得已乃以敕示之萊公乃從録事參軍借緑衫著之短才至膝拜受敕于庭升階復宴飲至暮而罷真宗晚年不豫嘗對宰相盛怒曰昨夜皇后以下皆云蜀劉氏置朕于宫中衆知上眊亂誤言皆不應李迪曰果如是何不以法治之良久上悟曰無是事也章獻在幄下聞之由是惡迪初自給事中參知政事除工部尚書平章事既而貶官十餘年歷諸侍郎景祐初復以工部侍郎即入相陸子履云胡順之為浮梁縣令民臧有金者素豪橫不肯出租畜犬數頭里正近其門輒噬之繞垣密植橘柚人不可入每歲里正常代之輸租前縣令不能禁順之至官里正白其事順之怒曰汝輩嫉其富欲使之為仇耳安有王民不肯輸租者耶第往督之及期里正白不能督順之乃使快手繼之又白不能又使押司録事繼之又白不能順之悵然曰然則此租必使令自督耶乃令里正聚藁自抵其居以藁塞門而焚之臧氏人皆逃逸順之悉令掩捕驅至縣其家男子年十六以上盡痛杖之乃召謂曰胡順之無道既焚爾宅又杖爾父子兄弟爾可速詣府自訴矣臧氏皆懾服無敢詣府者自是臧氏租常為一縣先府常使教練使詣縣順之聞之曰是固欲來煩擾我也乃微使人隨之隂記其入驛舍及受驛吏供給之物既至入謁色甚倨順之延與坐徐謂曰教練何官耶曰本州職員耳曰應入驛乎教練使踧踖曰道中無邸店暫止驛中耳又曰應受驛吏供給乎曰道中無芻糧故受又曰應與命官坐乎教練使乃趨下謝罪順之乃收械繫獄置暗室中以糞環其側教練使不勝其苦因順之過獄呼曰令何不問我罪順之笑謝曰教練幸勿訝也今方多事未暇論也繫十日然後杖之二十教練使不服曰我職員也有罪當受杖于州順之笑曰教練使久為職員殊不知法杖罪不送州也卒杖之自是府吏無敢擾縣者雖惡之然亦不能罪也後有青州幕僚發麻氏罪破其家皆順之之力也真宗聞其名召至京師除著作佐郎洪州僉判順之為人深刻無恩至洪州未幾病目惡明常以物帛苞封乃能出若日光所爍則慘痛徹骨由是去官家于洪州專以無賴把持長短憑陵細民殖産至富後以覃恩遷祕書丞又上言得失章獻太后臨朝特遷太常博士又以覃恩遷屯田員外卒于洪州順之進士及第頗善屬文馮廣淵云青州臨淄麻氏其先五代末嘗為本州録事參軍節度使廣納貨賂皆令麻氏主之積至巨萬既而節度使被召赴闕不及取而卒麻氏盡有其財由是富冠四方真宗景德初契丹至澶淵其遊兵至臨淄麻氏率壯夫千餘人據堡自守鄉里賴之全濟者甚衆至今基址尚存謂之麻氏寨兵退麻氏斂器械盡輸官留十二三以衛其家麻溫舒兄弟皆舉進士館閣美官家既富饒宗族橫于齊有孤姪懦弱麻氏家長恐分其財幽餓殺之事覺薑尊為轉運使欲樹名聲因索其家獲兵器及玉圖書小印因奏麻氏大富縱橫臨淄齊人懾服私畜兵刻玉寶將圖不軌于是麻氏或死或流子孫有官者皆貶奪籍沒家財不可勝紀麻氏由是遂衰孟翺云真宗時京師民家子有與人鬭者其母追而呼之不止母顚躓死而會疏決法官處其罪當笞上曰母呼不止違犯教令當徒二年何謂笞也羣臣無不驚服張錫云永興軍上言朱能得天書真宗自拜迎入宫孫奭知河陽上疏切諫以為天且無言安得有書天下皆知朱能所為惟上一人不知耳乞斬朱能以謝天下其辭有云得來惟自于朱能崇信只聞于陛下其質直如此上亦不責頃之朱能果敗真宗將西祀龍圖閣待制孫奭上疏切諫以為西祀有十不可陛下不過欲效秦皇漢武刻石誦德誇耀後世耳其辭有云昔秦多徭役而劉項起于徒中唐不恤民而黃巢因于飢歲今陛下好行幸數賦斂安知天下無劉項黃巢乎上乃自製辨疑論以解之仍遣中使慰諭焉奭子瑜字叔禮云其表千餘言叔禮能口誦之子從求其本再三不肯出也景德初契丹南侵是時寇準畢士安為相士安以疾留京師準從車駕幸澶淵王欽若隂言于上請幸金陵以避其鋭陳堯叟請幸蜀上以問準時欽若堯叟在旁準心知二人所為陽為不知曰誰為陛下畫此䇿者罪可斬也今敵勢憑陵陛下當率勵衆心進前禦敵以衛社稷奈何欲委棄宗廟逺之楚蜀耶且以今日之勢鑾輿回軫則萬衆雲集楚蜀可得至耶上乃止二人由是怨準上在澶淵南殿前都指揮使高瓊固請幸河北曰陛下不幸北城北城百姓如喪考妣馮拯在旁呵之曰何得無禮瓊怒曰君以文章為二府大臣今敵騎充斥如此猶責瓊無禮君何不賦一詩以退敵耶上乃幸北城至浮橋猶駐輦不進瓊以所執撾箠輦夫背曰何不亟行今已至此尚何疑焉上乃命進輦既至登北城門樓張黃龍旗城下將士皆呼萬歲氣勢百倍會契丹大將中弩死其衆遂退他日上命寇準召瓊詣中書戒之曰卿本武臣勿強學儒士作經書語也寇準從車駕在澶淵每夕與楊億痛飲謳歌諧謔喧譁常逹旦上使人覘知之喜曰得渠如此吾何憂矣敵兵既退來求和親詔劉仁範往議之仁範以疾辭乃命曹利用代之利用與之約歲給金繒二十萬敵嫌其少利用復還奏之上曰百萬以下皆許也利用辭去準召利用至幄次與語曰雖有敕旨汝往所許毋得過三十萬過則勿見準準將斬汝利用至敵帳果以三十萬成約而還車駕還自澶淵畢士安迎于半道既入京師士安罷相寇準代為首相以澶淵之功待準至厚羣臣無以為比數稱其功王欽若疾之久之數乘間言于上曰澶淵之役準以陛下為孤注與敵博耳茍非勝敵則為敵所勝非為陛下萬全計也且城下之盟古人之恥今敵衆雲集侵逼畿甸準為宰相不能殄滅強敵卒為城下之盟以免又足稱乎上由是寖疏之王旦疾久不愈上命肩輿入禁中使其子雍與直省吏扶之見于延和殿勞勉數四因命曰卿今疾亟萬一有不諱使朕以天下之事付之誰乎旦謝曰知臣莫若君惟明主擇之再三問不對上曰張詠如何不對又曰馬亮如何不對上曰試以卿意言之旦強起舉笏曰以臣之愚莫若寇準上憮然有間曰準性剛褊卿更思其次旦曰他人臣所不知也臣病囷不任久侍遂辭退旦薨歲餘上卒用準為相直省吏今尚存親為元震言之前數事皆元震聞其先所言也震先人為侍省都知右皆藍元震云真宗晚年不豫寇準得罪丁謂李迪同為相以其事進呈上命除準小處知州謂遂署其紙尾曰奉聖旨除逺小處知州迪曰嚮者聖旨無逺字謂曰與君靣奉德音君欲擅改聖旨以庇準耶由是二人鬭鬩更相論奏上命翰林學士錢惟演草制罷謂政事惟演遂出迪而留謂外人先聞其事制出無不愕然上亦不復省也元震及李子儀云真宗時王文正旦為相賓客雖滿座無敢以私干之者既退旦察其可與言者及素知名者使吏問其居處數月之後召與語從容久之詢訪四方利病或使疏其所言而獻之觀其才之所長密籍記其名他日其人復來則謝絶不復見也每有差除旦先密疏三四人姓名請于上上所用者輒以筆點其首同列皆莫之知明日于堂中議其事同列爭欲有所引用旦曰當用某人同列爭之莫能得及奏入未嘗不獲可同列雖嫉之莫能間也丁謂數毁旦于上上益親厚之曹瑋久在秦州纍求代上問旦誰可代瑋者旦薦樞密直學士李及上即以及知秦州衆議皆謂及雖謹厚有行非守邊之臣不足以繼瑋楊億以衆言告旦不答及至秦州將吏心亦輕之會有屯駐禁兵白晝奪婦人銀叉于市中吏執以聞及方坐觀書召之使前略加詰問其人服罪及不復下吏亟命斬之觀書如故將吏皆驚不日聲譽逹于京師億聞之復見旦具道其事謂旦曰向者相公初用及外廷之議謂及不勝其任及今材器乃如此信乎相公知人之明也旦笑曰外廷之議何其易得也夫以禁軍戍邊白晝為盜于市主將斬之事之常也烏足以為異政乎旦之用及者其意非為此也夫以曹瑋知秦州七年羌人讋服邊境之事瑋處之已盡其宜矣使他人往必矜其聰明多所變置敗壞瑋之成績旦所以用及者但以及重厚必能謹守瑋之規模而已矣億由是益服旦之識度張宗益云真宗既與契丹議和王文正旦問于李文靖沆曰和議何如文靖曰善則善矣然邊患既息恐人主漸生侈心耳文正亦未以為然及真宗晚年多事巡遊大修宫觀文正乃潛嘆曰李公可謂有先知之明矣傅欽文云蘇子容曰王冀公既以城下之盟短寇萊公于真宗真宗曰然則如何可以洗此恥冀公曰今國家欲以力服契丹所未能也契丹之性畏天而信鬼神今不若盛為符瑞引天命以自重契丹聞之庶幾不敢輕中國上疑未決因幸祕閣見杜鎬問之曰卿博通典墳所謂河圖洛書者果有之乎鎬曰此蓋聖人神道設教耳上遂決冀公之策作天書等事故世言符瑞之事始于冀公成于杜鎬云晚年王燒金以幻術寵貴京師妖妄繁熾遂有席帽精事閭里驚擾嚴刑禁之乃止陳恕為三司使上命其以中外錢糧大數以間恕諾而不進久之上屢趣之恕終不進上命執政詰之恕曰天子富于春秋若知府庫之充羡恐生侈心是以不敢進上聞而善之元忠云太宗疾大漸李太后與宣政使王繼恩忌太子英明隂與參知政事李昌齡殿前都指揮使王繼勳知制誥胡旦謀立潞王元佐太宗崩太后使繼恩召宰相吕端端知有變鎖繼恩于閣內使人守之而入太后謂曰宫車已宴駕立嗣以長順也今將何如端曰先帝立太子正為今日今始棄天下豈可遽違先帝之命更有異議乃迎太子立之尋以繼勳為使相赴陳州本鎮昌齡為忠武行軍司馬繼恩為右監門衛將軍均州安置胡旦除名流潯州楊樂道云真宗既于大行柩前即位垂簾引見羣臣宰相吕端于殿下平立不拜捲簾升殿審視然後降階率羣臣拜呼萬歲祖擇之鄭毅夫云真宗嘗謂李宗諤曰聞卿能敦睦宗族不損家聲朕今保守祖宗基業亦猶卿之治家也真宗初即位以工部侍郎郭贄知天雄軍贄辭訴不肯赴職上不許贄退上以問宰相對曰近例亦有已拜而復留不行者上曰朕初即位命贄為大藩而不行後何以使羣臣卒遣之石熙政知寧州上言昨清逺軍失守蓋朝廷素不留意因請兵三五萬真宗曰西邊事吾未嘗敢忘之蓋熙政逺不知耳周瑩等曰清逺失守將帥不才也而熙政敢如此不遜必罪之上曰羣臣敢言者亦甚難得茍其言可用用之不可用置之若必加罪後誰敢言者因賜詔書褒嘉焉真宗東封還羣臣獻歌頌稱贊功德者相繼惟進士孫籍獻言封禪帝王之盛事然願陛下慎于盈成不可遂自滿假上善其言即召試中書賜同進士出身秦國長公主嘗為子六宅使世隆求正刺史真宗曰正刺史係朝廷公議不可魯國長公主為翰林醫官使趙自庀求尚良使兼醫官院事上謂王繼英曰雍王元份亦嘗為自庀求遙郡朕以遙郡非醫官所領此固不可也駙馬都尉石保吉自求見上言僕夫盜財乞特加重罪上曰有司自有常法豈肯以卿故亂天下法也又請于私第決罰亦不許真宗即位每旦御前殿中書樞密院三司開封府審刑院及請對官以次奏事辰後入宫上食少時出坐後殿閲武事至日中罷夜則詔侍讀學士詢問政事或至夜分還宫其後率以為常真宗嘗讀易召大理評事馮元講泰卦元曰泰者天氣下降地氣上騰然後天地交泰亦猶君意接于下下情逹于上無有壅蔽則君臣道通向若天地不交則萬物失宜上下不通則國家不治上大恱賜元緋衣真宗重禮杜鎬鎬直龍圖閣上嘗因沐浴罷飲上尊酒封其餘遣使賜鎬于閣下鎬素不飲得賜酒飲之至盡因動舊疾忽僵不知人上聞之驚步行至閣下自調藥飲之仍召其子津入侍疾少頃鎬蘇稍見至尊在欲起上撫令臥鎬疾平然後入宫方鎬疾亟時上深自咎責以為由己賜酒致鎬疾也种放隱于終南山豹林谷講誦經籍門人甚衆太宗聞其名召之放辭以母老不至詔每節給錢物供養其母咸平元年母卒真宗賜錢二十萬帛三十匹米三十斛以葬明年復賜錢五萬詔本府禮遣亦辭疾不至五年又遣供奉官圭賫詔至山召之仍賜錢十萬絹百匹放應命至闕上喜見放便殿賜坐與語即坐拜司諫直昭文館賜居第什器御厨給膳明年放上表請歸山上令暫歸三兩月復來赴闕因拜起居舍人宴餞于龍圖閣上賦詩送之命羣臣皆送景德三年遷右諫議大夫祥符元年遷給事中從祀汾隂拜工部侍郎真宗祀汾隂召河中府處士李瀆劉巽巽拜大理評事致仕乃賜緋瀆以疾辭又召華山鄭隱敷永李寧對于行宫隱賜號正晦先生又召陜州魏野亦辭疾不應命右皆出聖政録先朝命郭后真宗后諡章穆觀奉宸庫后辭曰奉宸國之寶庫非婦人所當入陛下欲惠賜六宫願量頒之不敢奉詔上為之止李貴云涑水記聞卷六
