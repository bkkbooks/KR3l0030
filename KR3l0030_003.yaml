body:
  text: 洓水記聞卷三宋司馬光撰太祖時趙韓王普為宰相車駕因出忽幸其第時兩浙王錢俶方遣使致書及海物十瓶于韓王置左廡下會車駕至倉卒出迎不及屏也上顧見問何物韓王以實對上曰此海物必佳即命啓之皆滿貯𤓰子金也韓王惶恐頓首謝曰未發書實不知上笑曰但取之無慮彼謂國家事皆由汝書生耳因命韓王謝而受之韓王東京宅皆用此金所修也富公云曹彬攻金陵垂克忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所能愈惟須諸公共發誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日稱愈及克金陵城中皆安堵如故曹翰克江州忿其久不下屠戮無遺彬之子孫貴盛至今不絶翰卒未至十年子孫有乞匄于海上者矣程熙云彬入金陵李煜來見彬給五百人使為之運宫中珍寶金帛惟意所取曰明日皆籍為官物不可復得矣時煜方以亡國憂憤無意于蓄財所取不多故比諸降王獨貧彬克江南入見詣閤門進牓子云敕差往江南勾當公事回時人美其不伐王禹偁濟州人生十餘歳能属文太平興國八年進士及第補成武主簿改大理評事知長洲縣太宗方奨拔文士聞其名召拜右拾遺直史館賜緋故事賜緋者給銀帶上特命以文犀帶賜之禹偁獻端拱箴以為誡尋以左司諫知制誥上嘗稱之曰王禹偁文章當今天下獨步判大理寺散騎常侍徐鉉為奴巫道安所誣謫官禹偁上疏訟之請反坐奴罪由是貶商州團練副使無禄種蔬自給徙解州團練副使上思其才復召為左正言仍命宰相以剛直不容物戒之加直昭文館以父老求外補出知單州遭父喪起復至道初召為翰林學士知通進司多所封駁孝章皇后崩喪禮頗不備禹偁上書論之坐出知滁州徙知揚州出宋次道所為神道碑王禹偁為諫官上禦戎十䇿大旨以為外任人内修徳則可以弭之外則合兵勢以重將權罷小臣詗邏邊事行間諜以離其黨遣趙保忠折御卿率所部以張掎角下詔感勵邊人取燕薊舊疆蓋弔晉遺民非貪其土地内則省官以寛經費抑文士以激武夫信用大臣以資其謀不貴虚名以戒無益禁游惰以厚民力端拱冬旱禹偁上疏請節用省役薄賦緩刑出神道碑真宗即位召王禹偁于揚州復知制誥修太宗實錄執政疑禹偁輕重其間落職出知黄州州境有二虎鬭食其一冬雷羣雞夜鳴禹偁上疏引洪範傳陳戒且自劾上以問司天官對以守臣任其咎上乃命知蘄州尋詔還朝禹偁已卒卒于咸平四年五月戊子出宋次道所為神道碑太宗末王禹偁上言請明數繼遷罪状募健兒殺之真宗即位詔羣臣論事禹偁上疏陳五事一曰謹邊防通盟好因嗣統之慶赦繼遷罪復與夏臺彼必感恩内附且使天下知屈己而為人也二曰減宂兵併宂吏使山澤之饒稍流于下開寶前諸國未平而財賦足兵威强由所養之兵鋭而不衆所用之將專而不疑設官至簡而事皆舉興國後増員太宂宜皆經制之三曰艱𨕖舉使入官不濫先朝登第近萬人宜糾以舊制還舉場于有司至吏部銓擇官亦非帝王躬親之事宜依格敕注擬四曰澄汰僧尼使疲民無耗罷度人修寺一二十載容自消鑠亦救弊之一端五曰親大臣逺小人使忠良謇諤之士知進而不疑姦憸傾巧之徒知退而有懼其後潘羅支射死繼遷西夏款附卒如禹偁䇿而歳限度僧尼之數及病囚輕繫得養治于家至今行之太宗時禹偁為翰林學士嘗草繼遷制遺馬五十匹以備濡潤禹偁以狀不如式卻之及出守滁州閩人鄭襃徒步來謁禹偁愛其儒雅及别去為買一馬或言買馬虧價者太宗曰彼能卻繼遷五十馬顧肯虧此價哉禹偁之卒諫議大夫戚綸誄曰事上不回邪居下不諂佞見善若已有疾惡過仇讎世以為知言祥符中真宗觀書龍圖閣得禹偁章奏歎美切直因訪其後宰相稱其子嘉言以進士第為江都尉即召對擢大理評事皇祐中其曽孫汾第進士甲科以免解例當降仁宗閱其世次曰此王禹偁孫也令無降等面問其子孫仕者㡬人汾具以對及汾改京官又命優進其秩出次道所撰碑張洎為舉人時張佖在江南已通貴洎每奉謁求見稱從表姪孫既及第稱弟及秉政不復論中表矣以庶僚遇之佖怨洎入骨髓國亡俱仕中國洎作錢俶諡議云亢而無悔佖奏駁之洎廣引經傳自辨乃得解事見國史張洎與陳喬皆為江南相金陵破二人約效死于李煜之前喬既死洎白煜曰若俱死中國責陛下久不歸命之罪誰為陛下辨之臣請從陛下入朝遂不死太宗時洎為員外郎判攷功宼萊公判流内銓年少倨貴每入省洎常立于省門磬折候之萊公悅引與語愛其博辯遂薦于太宗欲用之而聞潘佑因洎而死薄其為人太宗好琴棋琴棋待詔多江南人洎皆厚撫之太宗嘗從容問佑之死于待詔曰人皆言張洎譖之何如待詔對曰李煜自忿佑言切直而殺之非執政之罪也萊公又數為上言洎學術該富智識宏敏上亦自愛其才久之遂與萊公皆參知政事洎女嫁楊文僑公倨不事姑或效其姑語以為笑後終出之由是兩家不相能故文僑公修國史為洎傳極言其短王嗣宗汾州人太祖時舉進士與趙昌言争状元于殿前太祖乃命二人手搏約勝者與之昌言髮秃嗣宗毆其幞頭墜地趣前謝曰臣勝之上大笑即以嗣宗為狀元昌言次之初為泰州司理參軍路沖知州事嘗以公事忤沖意怒械繫之㑹有獻新果一盒者沖召嗣宗謂曰汝為我對一句詩當脱汝械嗣宗請詩沖曰佳果更將新合合嗣宗應聲曰惡人須用大枷枷沖悅即捨之太宗時嗣宗以祕書丞知横州上遣武徳辛之嶺南詗察民間事嗣宗執而杖之械送闕下因奏曰陛下不委任天下賢俊而猥以此輩為耳目竊為陛下不取上大怒命械送嗣宗詣京師既至上怒解喜嗣宗直節遷太常博士通判澶州後知汾州事州有某王廟巫祝假之以惑百姓歴年甚久舉州信重前後長吏皆先謁奠乃敢視事嗣宗毁其廟熏其穴得狐數十頭盡皆殺之韓欽聖云張開封云梅侍讀詢晩年尤躁于禄位嘗退朝過閣門見箱中有錦軸云胡則侍郎致仕吿身同列取視之詢逺避之而過曰幣重而言甘誘我也何以視時人多笑之孫器之云詢年七十餘又病足常撫其足而詈之曰是中有鬼令我不至兩府者汝也所有愛馬每夜令五人相代牽之將馬不繫于柱恐其繫絆或傷之也又夜中數自出視之嘗牽馬將乗撫其鞍曰賤畜吾已薄命矣汝豈無分被繡韉耶龔伯建云詢與孫何盛度丁謂真宗時俱在清貫詢好潔衣服裒以龍麝其香數步襲人何性落拓衣服垢汙度體充壯居馬上前如仰後如俯謂吴人面如刻削時人為之語曰梅香孫臭盛肥丁痩渝州曰何性落拓而酷好古文為轉運使頗尚苛峻州縣吏患之乃求古碑字磨滅者紙本數聮釘于館中何至則讀其碑辨識文字以爪搔髮垢而嗅之遂往往至暮不復省錄文案云器之曰何為轉運使令人負礓礫自隨所至散之地吏應對小誤則于地倒曳之故從者憑依其威妄為寒暑所至騷擾人不稱賢度雖肥拜起輕捷為翰林學士時嘗自前殿出宰相在後度初不知忽見趨而避之行百餘步乃得直舍𨼆于其中翰林學士石中立見其喘甚問之度吿其故中立曰相公問否度曰不問别去十餘步乃悟罵曰奴乃以我為牛也謂貌睢盱若常寒餓者而貴震天下相者以為真猴形云中立性滑稽嘗與同列觀南御園所畜獅子主者云縣官日破肉五觔以飼之同列戲曰吾儕反不及此獅子耶中立曰然吾輩官皆員外郎借聲為園外狼也敢望園中獅子耶衆大笑朝士上官闢嘗諫之曰公名位非輕奈何談笑如此中立曰君自為上官闢借聲為鼻何能知下官口及為參知政事日或謂曰公為兩府談諧度可止矣中立取除書視曰敕命我可本官參知政事餘如故奈何止也嘗墜馬左右驚扶之中立起曰賴爾石參政也嚮若瓦參政虀粉久矣中立為參知政事無他材能時人或以鄭綮方之未㡬罷為資政殿學士不復用老于家先朝時鎖㕔舉進士者時有一人以為竒異試不中皆以責罰為私罪其後詔文官聴應兩舉武官一舉不中者不獲罰景祐四年鎖㕔人最盛開封府投牒者至數百人國子監及諸州者不在焉是時陳堯佐為宰相韓億為樞宻院副使既而解牒出堯佐子博古為解元億子孫四人皆無落者衆議喧然作河滿子以嘲之流聞達于禁中殿中侍御史蕭定基時掌謄錄因奏事上問河滿子之詞定基因誦之先是天章閣待制范仲淹坐言事左遷饒州王宫待制王宗道因奏事自陳為王府官二十年不遷詔改除龍圖閣學士權三司使王博文言于上曰臣老且死不復得望兩府之門因涕下上憐之數日遂為樞宻副使當時輕薄者取張祜詩益其文以嘲之曰天章故國三千里學士深宫二十年殿院一聲河滿子龍圖雙淚落君前于是詔今後鎖㕔應舉人與白衣别試各十人中解三人在外者衆試于轉運司恐其妨白衣解額故也慶厯中又詔文武鎖㕔試者不復限以舉數故事鎖㕔及第注官者皆升一甲今不復升之宋静曰景祐五年御試進士上以時議之故密詔陳博古韓氏四子及兩家門下士范鎮宋静試卷皆不得預攷官奏鎮静實有文久在場屋有名聲非附兩家之勢得之乃聴攷而降其等級故事省元及第未有在第二甲雖近下猶升之省元及第二甲自鎮始鎮字景仁成都人與兄鎡皆以詞賦著名自吴育歐陽修為省元殿前唱第三過三人則疾聲自言鎮獨黙然時人以是賢之静字子鎮眉州人廬州曽紹齊言其鄉里數十年之間吏治簡易民俗富樂有女不肯以嫁官人云恐其往他州縣難相見也嫁娶者宗族競為飲宴以相賀四十日而止傷今不然慶厯五年正月一日見任兩制以上官同中書門下平章事賈昌期陳執中樞密使同中書門下平章事王貽永參知政事工部侍郎丁度給事中宋庠樞密副使諫議大夫龐籍吳育節度使中書門下平章事軍知陳州章得象軍知澶州王徳用軍北軍留守夏竦王貽永見上尚書刑部晏殊節度使軍知永興軍程琳資政殿大學士知并州鄭戬端明殿大學士翰林學士承旨兼龍圖閣王堯臣李淑翰林學士王堯臣見上判官院孫抃同判楊察三司使張方平資政殿學士侍郎西京留守張觀給事中知揚州韓琦諫議大夫知鄧州范仲淹知曹州任中師南京留守王舉正知鄆州富弼翰林侍讀學士判農寺楷知青州葉清臣判三班院栁植知秦州梁適知鄭州王拱辰提舉諸司宋祁龍圖閣學士王堯臣宋祁並見上樞宻直學士知鎭州明鎬知杭州蔣堂知益州文彦博知許州李昭直龍圖閣直學士知秦州孫祖徳知徐州張奎給事中知開封府張存劉沆知滑州張錫田况居憂御史中丞髙若訥尚書左丞知杭州徐衍給事中知亳州髙覿諫議大夫知廣州魏瓘知江寧李宥知制誥知滁州歐陽修國信使王祺同判楊偉彭乘趙槩判流内銓錢明逸天章閣待制知處州張昷之知杭州方偕知渭州程戡知延州孫沔知慶州沈邈知河中府王子融知蘇州滕宗諒楊安國陜西都轉運使夏安期河北都轉運使魚周詢前兩府致仕太傳張士遜太子太師張耆太子太傅李迪太子少傅李若谷太子少保任布前兩制致仕侍郎郎簡張安夀曰吕申公夷簡平生朝會出入進止皆有常處不差尺寸慶厯中為上相首冠百僚起居誤忘一拜而起外間讙言吕相失儀是天奪之魄殆將亡矣後十四日忽感風疾遂致仕以至不起又曰彭内翰乗往在三館時嘗預釣魚宴故事天子未得魚臣雖先得魚不敢舉竿是時上已得魚左右以紅絲網承之侍座者畢賀已而乗同列有得魚者欲舉之左右止之曰侍中未得魚學士未可舉也侍中曹鄆公利用也乗固已怪之頃之宰輔有得魚者左右以白網承之及利用得魚復用紅網利用亦不止之乗出謂人曰曹公權位如此不以逼近自嫌而安于僭禮難以久矣未㡬而敗景休曰夏竦字子喬父故錢氏臣歸朝為侍禁竦幼學于姚鉉使為水賦限以萬字竦作三千字以示鉉鉉怒不視曰汝何不于水之前後左右廣言之則多矣竦又益之凡得六千字以示鉉鉉喜曰可教矣年十七善屬文為時人所稱舉進士開封府解者以百數竦為第五貢院奏名第四㑹其父死于邊竦以死事者子補奉職貢院奏竦所試詩賦優于省元陳堯佐以其幼故抑之未舉請免省試詔許之竦以奉職行父䘮服終換丹陽主簿舉賢良方正及第拜大理評事通判台州秩滿遷光禄寺丞直史館頃之奉詔修史俄知制誥時年二十七又曰宋興以來御試制科人無登第三等者惟吳育第三等下自餘皆四等上竝為及第降此則落魯平曰宋初以來至真宗方設制科陳越王曙為之首其後夏竦等數人皆以制科登第既而中廢今上即位天聖六年始復置其後每開科場則置之有官者舉賢良方正無官者舉茂材異等餘四科多不應皆自投牒獻所著文論差官攷校中者召詣閣下試論六首及中選則于殿前試䇿一道五千字以上其中選者不過一二人然數年之後即為美官慶厯六年賈昌朝為政議欲廢之吴育參知政事與昌朝争論于上前由是賈吴有隙乃詔自今後舉制科者不聴自投牒皆兩制舉乃得攷校原叔曰趙槩與歐陽修同直館及同修起居注槩性重厚寡言修意輕之及修除知制誥是時韓范在中書以槩為不文乃除天章閣待制槩淡然不以屑意及韓范出乃復除知制誥㑹修甥嫁為修從子城妻與人淫亂事覺時修為龍圖閣直學士河北都轉運使疾韓范者皆欲文致修罪云與甥亂上怒獄急羣臣無敢言者槩獨上書言修以文章為近臣不可以閨房曖昧之事輕加汚衊臣與修踪跡踈修之待臣亦薄所惜者朝廷大體耳書奏上不悅人皆為之懼槩亦淡然如平日久之修坐降為知制誥知滁州執政私曉譬令槩求去乃知蘇州遭喪去官服闋除翰林學士槩復表讓以歐陽修先進不可超越為學士奏雖不報時論美之龐公曰先帝時龍圖閣待制皆更直祕閣下夜召入禁中訪以外事近歳直者惟申牒託疾而已李受曰淳化中趙韓王出鎮太宗患中書權太重且事衆宰相不能悉領理向敏中時為諫官上言請分中書吏房置審官院刑房置審刑院初皆以兩制重臣領之其審刑詳議官皆自臺諫館閣為之近歳用人頗輕清流皆恥為之凡天下獄事有涉命官者皆以其獄上請先下審刑院既令詳議官投均分之略觀大情即日下大理寺詳斷官復投均分之抄其節目以法處之皆手自書槩定覆上審刑院詳議官再觀之重抄節目貼黄六人通觀署定乃奏其有不當則駁下更正之故大理寺常畏事審刑院小属吏凡有事審刑院用頭子下大理寺大理寺申狀原叔曰陸參少好學淳謹獨與母居鄰家失火母急呼參不應蹴之墮牀下良久束𢃄火將至曰大人嚮者呼參未束帶故不敢應及長舉進士及第嘗為縣令有刼盜繫甚急參愍之呼謂曰汝迫于飢寒為是耳非性不善也命緩其縛一夕逸之吏急以吿參參命捕之歎曰我仁惻緩汝汝乃忍負參如此脱復捕得胡顏見參又有訟田者判其狀尾而授之曰汝不見虞芮之事乎訟者齎以示所司皆不能解復以見參參又判其後曰嗟乎一縣之人曽無深于詩者人皆傳以為笑蔡文忠公以為有淳古之風薦之朝廷官員外郎遷史館檢討著蒙書十卷師道曰張昪音便自知雜左遷知潤州司諫陳旭數言其梗直宜在朝廷上曰吾非不知昪賢然言詞不擇輕重旭請其事上曰頃論張堯佐事云陛下勤身克己欲致太平奈何以一婦人壞之乎旭曰此乃直言人臣所難也上曰又論楊懷敏茍得志所為不減劉季述何至于此旭曰昪志在去惡言之不激則聖聴不回亦不可深罪也皇祐二年昪以天章閣待制代杜杞知慶州又曰杜杞字偉長為湖南轉運副使五溪蠻反杞以金帛官爵誘出之因為設宴飲以曼陀羅酒昬醉盡殺之凡數千人因立大宋平蠻碑自擬馬伏波上疏論功朝廷劾其棄信專殺之状既而舎之官至天章閣待制皇城使宋安道故名國昌始以醫進景祐初累遷藥局奉御職上藥是時尚楊二美人方有寵每夕竝侍上寢上體為之敝或累日不進食中外憂懼皆歸罪二美人保慶楊太后亟以為言未能去入内内侍省都知閻文應日夕侍上言之不已上不勝煩乃許文應召氈車載之出二美人涕泣辭說不肯行文應批其頰罵曰宫婢尚復何云即載送别宫明日下詔以尚氏為女冠楊氏為尼立曹后道梓曰景祐初内寵頗盛上體多疾司諫滕宗諒上疏曰陛下日居深宫留連荒宴臨朝則多倦色政事如不挂聖懐坐是出知信州又曰吕許公見上體不安故擢允讓管勾宗室聴换西班官皆公之䇿也故時自借職十遷至諸司副使及換西班官自率府副使四遷為遥郡刺史俸禄十倍于舊國再益廣于今為遷案此下似有闕文又曰范諷性倜儻好直節不拘細行自在場屋與鞠詠滕宗諒遊已有軒輊之名及為中丞力擠張士遜援吕夷簡意夷簡引已至二府夷簡忌其剛伉久之不敢薦引諷憤激求出知兖州將行謂上曰陛下朝中無臣一旦紀綱大壊然始召臣將無益夷簡愈惡之故尋被譴謫吕相在中書奏令參知政事宋綬編例又曰自吾有此例使一庸夫執之皆可為相矣涑水記聞卷三
