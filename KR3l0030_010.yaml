body:
  text: 涑水記聞卷十宋司馬光撰文潞公知益州喜遊宴嘗宴鈐轄廨舍夜久不罷從卒輒拆馬廄為薪不可禁遏軍校白之座客股栗公曰天實寒可拆與之神色自若飲宴如故卒氣沮無以為變楊希元云故相劉沆薨贈侍中知制誥張瓌草誥詞頗薄其為人其子瑾詣闕纍章訟冤稱瓌挾私怨至詆瓌云祖奸父贓母穢妻濫瓌洎之孫父方洄嘗以贓抵罪母妻之謗出于錢晦所訟一門萃衆醜一身備百惡又帥兄弟父母衰絰詣待漏院哭訴執政褒贈乃朝廷恩典瓌不當加貶黜之詞五月戊子或云四月庚午瓌左遷知黃州然瑾竟亦不敢請諡張密學奎張客省亢母宋氏白之族也其夫好黃白術宋氏伺其夫出取其書并燒煉之具悉焚之夫歸怒之宋氏曰君有二子不使就學日見君燒煉而效之他日何以興君之門夫感其言而止宋氏不愛金帛市書至數千卷親教督二子使讀書客至輒于窗問聽之客與其子論文學政事則為之設酒殽或閒談諧謔則不設也僑居常州胡樞密宿為舉人有文行宋氏以為必貴亢少跅弛宋氏常藏其衣冠不聽出惟胡秀才召乃給衣冠使詣之既而二子皆登進士第仕至顯官景公云張密學奎少嗜酒嘗有酒失母怒欲笞之遂不復飲至終身崔公孺諫議大夫立之子韓魏公夫人之弟也性亮直喜面折人魏公執政用監司有非其人者公孺曰公居陶鎔之地宜法造化為心造化以蛇虎者害人之物故置蛇于藪澤置虎于山林公今乃置之通衢使為民害可乎魏公甚嚴憚之范仲淹字希文早孤從其母適朱氏因冒其姓名與朱氏兄弟俱舉學究少尫瘠嘗與衆客同見諫議大夫姜遵遵素以剛嚴著名與人不款曲衆客退獨留仲淹引入中堂謂其夫人曰朱學究年雖少竒士也他日不惟為顯官當立盛名于世參坐置酒待之如骨肉人莫測其何以知之也年二十餘始改科舉進士堯夫云晏丞相殊留守南京仲淹遭母憂寓居城下晏公請掌府學仲淹嘗宿學中訓督學者皆有法度勤勞恭謹以身先之夜課諸生讀書寢食皆立時刻往往潛至齊舍詗之見有先寢者詰之其人紿云適疲倦暫就枕耳仲淹問未寢之時觀何書其人亦妄對仲淹即取書問之其人不能對乃罰之出題使諸生作賦必先自為之欲知其難易及所用意使學者準以為法由是四方從學者輻輳其後宋人以文學有聲名于場屋朝廷者多其所教也服除至京師上宰相書言朝政得失民間利病凡萬餘言王曽見而偉之時晏殊亦在京師薦一人為館職曽謂殊曰公知范仲淹捨不薦而薦斯人乎已為公置不行宜更薦仲淹也殊從之遂除館職頃之冬至立仗禮官定議欲媚章獻太后請天子帥百官獻壽于庭仲淹奏以為不可晏殊大懼召仲淹怒責之以為狂仲淹正色抗言曰仲淹受明公誤知常懼不稱為知己羞不意今日更以正論得罪于門下也殊慙無以應黃晞閩人好讀書客遊京師數十年不歸家貧謁索以為生衣不蔽體得錢輒買書所費殆數百緡自號聱隅子石守道為直講聞其名使諸生如古禮執羔鴈束帛就里中聘之以補學職晞固辭不就故歐陽永叔哭徂徠先生詩云羔羊聘黃晞晞驚走鄰家是也著書甚多至和中或薦于朝除試太學助教月餘未及具緑袍遇疾暴卒一子甚愚魯所聚及自著書皆散無存者好謙云杜祁公衍杭州人父早卒遺腹生公其祖愛之幼時祖父脫帽使公執之㑹山水暴至家人散走其姑投一竿與之使挾以自從公一手挾竿一手執帽漂流久之救得免而帽竟不濡前母二子不孝悌其母改適河陽錢氏祖父卒公年十五六其二兄以為母私財以適人就公索之不得引劍斫之傷腦走投其姑姑匿之重一橑上出血數升僅而得免乃詣河陽歸其母繼父不之容往來孟洛間貧甚傭書以自資嘗至濟源富民相里氏竒之妻以女由是資用稍給舉進士殿試第四及貴其長兄猶存待遇甚有恩禮二兄及錢氏姑子孫受公廕補官者數人仍皆為婚嫁崔甥云慶厯三年九月丁卯上幸天章閣召中書樞密院官朝拜太祖太宗御容觀內庫瑞物因問安邊大略移刻而罷慶厯四年四月戊戌上與執政論及朋黨事參知政事范仲淹對曰方以類聚物以羣分自古以來邪正在朝未嘗不各為一黨不可禁也在聖鑒辨之耳誠使君子相朋為善其于國家何害慶厯四年五月己巳詔特徙右司諫直集賢院知滑州兼涇原路部署尹洙知慶州先是資政殿學士鄭戩兼陜西四路招討經略都部署內殿崇班渭州西路巡檢劉滬建䇿以為秦渭兩路有急發兵相援路去隴坻之內回遠恐不及事請募熟户于山外築永洛結公二城以兵戍之緩急以通援兵之路戩以狀聞命滬及著作郎董士濓董其役㑹樞密院使韓琦陜西宣撫還奏罷四路招討以戩知永興軍又言山外多熟户恐城未畢而寇至請罷之戩因極言築二城之利不可輒罷詔三司副使魚周詢往視其利害未至尹洙召滬士濓令還滬士濓以熟户既集官物無所付請遂城之洙怒以滬士濓違部署司節制命涇原路部署狄青往斬之青械繫滬士濓于德順軍及魚周詢還言二城利害與戩議同乃徙洙于慶州滬降二官士濓徙他路官特支修城禁軍弓箭手等錢有差慶厯四年六月范希文宣撫陜西河東自知權要惡之者多上益厭之乃上章乞罷政事除一郡上欲聽其請章郇公言于上曰仲淹素有重名今一請而罷之恐天下皆謂陛下黜賢臣不若且賜詔不允若仲淹即有表謝則是挾詐要君乃可罷上從之希文果奉表謝上曰果如章得象言遂罷知邠州既而杜丞相富彥國韓稚圭歐陽永叔俞希道稍稍皆以事得罪矣始平公云慶厯六年八月甲戌以諫議大夫參知政事吳育為樞密副使丁度為參知政事是時宰相賈昌朝陳執中議罷制科育以為不可爭論于上前退而上章求解政務故有是命龐籍為樞密副使在度前籍女嫁參知政事宋庠因言于上以親戚共事為嫌故度得先之通泰海州皆濱海舊日潮水皆至城下土田斥鹵不可稼穡范文正公監西溪倉建白于朝請築捍海隄于三州之境長數百里以衛民田朝廷從之以文正為興化令專掌役事又以發運使張倫兼知泰州發通泰楚海四州民夫治之既成民至于今享其利興化之民往往以范為姓野利王旺榮天都王剛朗凌者皆元昊妻之昆弟也與元昊族人嵬名山等四人為謨寧令共掌軍國之政而剛朗凌勇健有智謀尤用事种世衡知青澗城曰始平公遣土僧王嵩遺剛朗凌書案遣王嵩事已見前第九卷作遺書旺榮與此互異元昊囚嵩而使剛朗凌麾下教練使李文貴詣世衡所陽為不喻曰前者使人以書來何意也豈欲和親耶公以其言妄止文貴于青澗城後數月元昊寇涇源葛懷敏戰沒案前第四卷記葛懷敏禦寇定川事而失載其戰沒此可與參證㑹梁適使契丹契丹主謂適曰元昊欲歸款南朝而未敢若南朝以優禮懷來之彼必洗心自新矣于是密詔公招懷元昊元昊茍肯稱臣雖仍其僭稱亦不害若改稱單于可汗則固大善公以為若此間使人往說之則元昊益驕不可與言乃自青澗城召李文貴謂之曰汝之先王及今王之初奉事朝廷皆不失臣節汝曹忽無故妄加之名使汝主不得為朝廷臣紛紛至今使彼此之民肝腦塗地皆汝羣下之過也汝犯邊之初以國家承平日久民不習戰故屢與汝勝今邊民亦習戰汝之屢勝豈可常耶我國家富有天下雖偏師小䘐未至大損汝兵一敗社稷可憂矣天之立天子者將使溥愛四海之民而安定之非欲殘彼而取快也汝歸語汝主若誠能悔過從善降號稱臣歸款朝廷以息彼此之民朝廷之所以待汝者禮數賞錫必優于前矣文貴頓首曰此固西人日夜之願也龍圖能為言之朝廷使彼此息兵其誰不受賜公乃厚待而遣之頃之文貴復以剛朗凌等遺公書來言和親之意用鄰國抗敵之禮公上之朝廷為還書草稱剛朗凌等為太尉使公報之公曰方今抑其僭名而稱其臣已為三公則元昊可降屈耶不若稱其西徼官謨寧令非中國之所諭無傷也朝廷善而從之剛朗凌又以書來欲仍其僭稱公不復奏即日答之曰此非邊臣之所敢知也若名號稍正則議易合耳于是元昊使伊州刺史賀從朂上書稱男曩霄上書父大宋皇帝從勗至京師朝廷遣趙良佐張安奭等復往議定名號及每歲所賜之物及他盟約使稱臣誓表上之至和三年春仁宗寢疾不能言兩府以設道場為名皆宿禁中專決庶政有禁卒詣開封府告大校謀為變者府中夜封上之時富公以疾謁告惟潞公劉相王伯庸案王堯臣字伯庸居中旦日潞公召三帥問大校平日所為如何三帥言其謹願潞公秉筆欲判其狀斬告變者伯庸揑其膝乃請劉相判之案文彥博請劉沆判狀事已見前第五卷較此倍詳惟未及王堯臣之揑膝此不載劉沆譖彥博以呈判乃解則揑膝意未明必合兩條參證始悉端委仁宗寢疾兩府雖宿禁中數日不知上起居潞公召內侍都知等詰之曰主上疾有增損皆不令兩府知何也對曰禁中事不敢漏泄潞公怒曰天子違豫海內寒心彥博等備位兩府與國同安危豈得不預知也何謂漏泄顧直省官曰引都知等至中書令供狀今後禁中事如不令兩府知甘伏軍令諸內侍大懼日暮皇城諸門白下鎖都知曰汝自白兩府我當他劍不得由是禁中事兩府無不知者樞密使王德用開便門入中書潞公執守門親事官封府撻之明日謂同列曰昨日悔不斬守門者天子違豫禁中門户豈得妄開也案詰取內侍都知等供狀亦見前第五卷而敘述異辭故不嫌復出先是詔周後柴氏每遇親郊聽奏補一人充班行至是或上言皇嗣未生蓋以國家未如古禮封二王後二月癸酉詔擇柴氏族人最長一人除京官已在班行則換文資仍封崇義公于河南鄭州境內與應入差遣更給公田十頃其周室陵廟委之管勾歲時祭享至如知州資序即與他處差遣更取以次近親襲爵受官承替案東都事略及宋史封柴氏後為崇義公在嘉祐四年四月癸酉此作二月癸酉而未繫年當是傳寫有脫訛嘉祐七年正月辛未學士院奏定郊祀天地宜止以一帝配佑溫成皇后廟請去扁榜自今不復命兩制祠止令本廟使臣行禮嘉祐七年五月辛未樞密副使包拯薨車駕臨幸其第拯字希仁廬州人進士及第以親老侍養不仕宦且十年人稱其孝後歷監察御史為天章閣待制知諫院遷龍圖閣直學士知瀛州又遷樞密直學士知開封府為人剛嚴不可干以私京師為之語曰關節不到有閻羅包老吏民畏服遠近稱之歷御史中丞三司使樞密副使薨拯為長吏僚佐有所關白喜面折辱人然其所言若中于理亦幡然從之剛而不愎亦人所難也尹師魯謫官監復州酒時范希文知鄧州師魯得疾即擅去官詣鄧州以後事屬希文希文日往視其疾師魯曰今日疾勢復增幾分可得幾日一旦遣人招希文甚遽既至師魯曰洙今日必死矣人言將死者必見鬼神此不可信洙並無所見但覺氣息奄奄漸欲盡耳隱几與希文語久之謂希文曰公可出洙將逝矣希文出至廳事已聞其內號哭希文竭力送其喪及妻孥歸洛陽黃好謙云余靖本名希古韶州人舉進士未預解薦曲江主簿王同善遇之為干知韶州者舉制科知州怒以為玩也按其罪無所得惟得與希古接坐同坐違敕停任希古杖臀二十同遂閒居處州不復仕進希古更名靖字安道取他州解及第景祐中為館職為范文正訟寃獲罪由是知名范公入參大政引為諫官祕書丞茹孝標喪服未除入京師私營身計靖上言孝標冒哀求仕不孝孝標由是獲罪深憾靖靖遷龍圖閣直學士王同數以書干靖求貸靖不能應其求孝標聞靖嘗犯刑詐匿應舉乃自詣韶州購求其案得之時錢子飛為諫官方攻范黨孝標以其事語之子飛即以聞詔下處州王同靖隂使人諷同令避去同辭以貧不能出靖置銀百兩于茶篚中託人餉之所託者怪其重開視竊銀而致茶于同同大怒詔至州勘官同對當日接坐者余希古今不知所在同不從對稱希古即靖是也靖竟坐以左屯衛將軍分司伯淳云余靖初及第歸韶州州吏嘗鞫其獄者往見之靖不為禮吏恨之乃取靖案裹以緹油置于梁上吏病且死囑其子曰此方今達官之案他日朝廷必來求之汝謹掌視愼勿失去及茹孝標求其案人以為事在十年前必不在孝標訪于吏子竟得之伯達云丁度字公雅開封祥符人祖顗盡其家資聚書至八千卷為大室以貯之曰吾聚書多雖不能讀必有好學者為吾子孫矣父逢吉以醫事真宗于藩邸官至將作監丞致仕度以祀汾隂歲舉服勤詞學第二人登科解褐大理評事通判通州事遷太子中允直集賢院今上即位度上書請博延儒臣勸講道誼增置諫官切劘治體墾闢荒蕪安集流竄以為州縣殿最章獻皇后善之遷太常博士賜緋俄出知湖州事徙京西轉運使以祠部員外郎知制誥遷翰林學士久之兼侍讀學士又加承旨又兼端明殿學士國朝故事中書制民政樞密專兵謀及趙元昊逆命朝廷事多度建言古之號令皆出于一今二府分兵民之政若措置異同則下無適從非為國體于是始詔軍旅重務二府通議度在兩禁十五年性寬厚若不修威儀流輩多易之上嘗從容問度用人資序與才器孰先度對曰天下無事則循守資序有事則簡拔才器上甚善之㑹諫官有言度乘間求進者上以度言諭執政且曰度侍從十五年而應對如是不自為地真淳厚長者也尋以為工部侍郎樞密使副使逾年參知政事頃之衛士為變事連宦官楊懷敏樞密使夏竦言于上請使御史與宦官同于禁中鞫其獄不可滋蔓使反側者不自安度曰宿衛有變事關社稷此可忍孰不可忍因請付外臺窮治黨與自旦爭至食時上卒從竦議未幾度求解政事時初置紫宸殿學士以度為之兼侍讀學士尋以紫宸稱呼非宜改為觀文殿學士後數年薨贈吏部尚書諡文簡度早喪妻晚年學修養之術嘗獨居靜室左右給使惟老卒一二人而已文彥博知永興軍起居舍人母湜鄂人也至和中湜上言陜西鐵錢不便于民乞一切廢之朝廷雖不從其鄉人多知之爭以鐵錢買物賣者不肯受長安為之亂民多閉肆僚屬請禁之彥博曰如此是愈使惑擾也召絲絹行人出其家縑帛數百匹使賣之曰納其直盡以鐵錢勿以銅錢也于是衆曉然知鐵錢不廢市肆復安拓跋諒祚之母密臧氏本野利旺榮之妻曩霄通焉有娠矣曩霄初娶野利氏生子寧令將納剛朗凌女為婦旺榮與剛朗凌謀因成婚之夕邀曩霄至其帳伏兵殺之事泄族誅密臧氏削髮為尼而生諒祚慶厯八年正月辛未寧令弒曩霄國人討誅之立諒祚邢佐臣云涑水記聞卷十
