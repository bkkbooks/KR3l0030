body:
  text: 涑水記聞卷五宋司馬光撰明道二年四月己未吕夷簡罷為武勝軍節度使同平章事判陳州上與吕夷簡謀以夏竦等皆莊獻太后之黨悉罷之案宋史吕公綽傳初諡真宗五后皆曰莊以公綽言真宗諡章聖而后曰莊非禮乃更為章此書稱莊獻稱章獻前後不一今悉仍原文退告郭后郭后曰夷簡獨不附太后耶但多機巧善應變耳由是并夷簡罷之是日夷簡押班聞唱其名大駭不知其故夷簡素與內侍副都知閻文應相結使為中詗久之乃知事由郭后十月戊午張士遜罷吕夷簡復入相上以張士遜等在相位多不稱職復思吕夷簡㑹上莊獻太后諡還過樞密使楊崇勳飲酒致班慰失時罷士遜為左僕射崇勳河陽節度使同平章事復以夷簡為門下侍郎兼吏部尚書平章事初莊獻太后稱制郭后恃太后勢頗驕橫後宫多為太后所禁遏不得進太后崩上始得自縱適美人尚氏陽氏尤得幸尚氏父自所由除直殿賞賜無算恩寵傾京師郭后妒屢與之忿爭尚氏嘗於上前有侵后不遜語后不勝忿起批其頰上自起救之后誤批上頰上大怒閻文應勸上以爪痕示執政大臣而謀之上以示吕夷簡且告之故夷簡因密勸上廢后上疑之夷簡曰光武漢之明主也郭后止以怨懟坐廢況傷乘輿乎廢之未損聖德上未許外人籍籍頗有聞之者左司諫祕閣校理范仲淹因登對極陳其不可且曰宜早息此議不可使有聞於外也夷簡將廢后奏請敕有司無得受臺諫章奏十二月乙卯稱皇后請入道賜號淨妃居别宫有諫議大夫權御史中丞孔道輔怪閣門不受章奏遣吏詗之始知其事未降詔書丙辰與范仲淹帥諸臺諫詣閣門請對閣門不為奏道輔欲自宣祐門入趨內東門宣祐監宦者闔扉拒之道輔拊門銅環大呼曰皇后被廢奈何不聽我曹入諫宦者奏之須臾有㫖令臺諫欲有所言宜詣中書附奏道輔等悉詣中書論辨喧譁夷簡曰廢后自有典故仲淹曰相公不過引漢光武勸上耳此漢光武失德又何足法耶其餘廢后皆昏君所為主上躬堯舜之資而相公更勸之效昏君所為乎夷簡拱立曰兹事明日請君更自登對力陳之道輔等退夷簡即為敕狀貶出道輔等故事中丞罷須有告詞至是直以敕除之道輔等始還家敕尋至遣人押出城十一月戊午故后郭氏薨后之獲罪也上直以一時之忿且為吕夷簡閻文應所譖故廢之既而悔之后出居瑶華宫章惠太后亦逐楊尚二美人而立曹后久之上遊後園見郭后故肩輿悽然傷之作慶金枝詞遣小黃門賜之且曰當復召汝夷簡文應聞之大懼㑹后有小疾文應使醫官故以藥發其疾疾甚未絶文應以不救聞遽以棺斂之王伯庸時為諫官上言郭后未卒數日先具棺器請推按其起居狀上不從但以后禮葬于佛舍而已始平公自鄆徙并過京師謁上時上特用文富為相以為得人謂公曰朕新用二相如何公曰二臣皆朝廷高選陛下拔而用之甚副天下之望上曰誠如卿言文彥博猶多私至於富弼萬口同詞皆曰賢相也始平公曰文彥博臣頃與之同在中書詳知所為實無所私但惡之者毁之耳況前者被謗而出今當愈畏愼矣富弼頃為樞密院副使未執大政朝士大夫有與之為恩者故交口譽之冀其進用而已有所利焉若富弼以陛下之爵祿樹私恩則非忠臣何足賢也若一以公議槩之則向之譽者將轉為謗矣比陛下既知二臣之賢而用之則當信之堅任之久然後可以責成功若以一人之言進之未幾又以一人言疑之臣恐太平之功未易可致也上曰卿言是也慶厯四年三月癸亥朔丁卯上曰楊安國趙師民皆醇儒乃昔時遵度之比久侍經筵各宜進職于是安國加直龍圖閣仍賜紫又以安國新除母服家貧賜金百兩師民充天章閣侍讀仍賜緋吕許公疾病仁宗剪髭為藥以賜之又手詔以問羣臣可任兩府者其親遇如此文公為相龐公為樞密使以國用不足同議省兵于是揀放為民者六萬餘人減其衣糧之半者二萬餘人衆議紛然以為不可施昌言李昭亮尤甚皆言衣食于官久不願為農又皆習弓刀一旦散之閭閻必皆為盜賊上亦疑之以問二公公曰今公私困竭上下皇皇其故非他正由蓄養冗兵太多故也今不省去無由蘇息萬一果有聚為盜賊者二臣請以死當之既而昭亮又奏兵人揀放所以如是多者大抵皆縮頸曲膕詐為短小以欺官司耳公乃言兵人茍不樂歸農何為詐欺如此上意乃決邊儲由是稍蘇後數年王德用為樞密使許懷德為殿前都指揮使復奏選廂軍以補禁軍增數萬人狄青既破儂智高平雍州上甚喜欲以為樞密使同平章事宰相龐籍曰昔太祖時慕容延釗將兵一舉得荆南湖南之地方數千里兵不血刃不過遷官加爵邑賜金帛不用為樞密使也曹彬平江南李煜欲求使相太祖不與曰今西有河東北有幽州汝為使相那肯復為朕死戰耶賜錢二十萬貫而已祖宗重名器如山嶽輕金帛如糞壤此陛下所當法今青奉陛下威靈殄戮凶醜克稱聖心誠可褒賞然方于延釗與彬之功則不逮逺矣遂用為樞密使同平章事則青名位極矣寇盜之警不可前知萬一他日青更立大功欲以何官賞之哉且樞密使高若訥無過若之何罷之不若且為之移鎮加檢校官賜之金帛亦足以酬青之功矣上曰向者諌官御史言若訥舉胡恢書石經恢狂險無行又若訥前導者毆人致死可謂無過乎龐公曰今之庶僚舉選人充官未遷官者猶不坐況若訥大臣舉恢以本官書石經未嘗有所遷也奈何以此解其樞務哉若訥居馬上前導去之里餘不幸毆人致死若訥尋執之以付開封正其法若訥何罪哉且諫官御史上言之時陛下既已赦若訥不問矣今乃追舉以為罪無乃不可乎參知政事梁適曰王則止據貝州一城文彥博攻而拔之還為宰相儂智高擾亂廣南兩路青討平之為樞密使何足為過哉籍曰貝州之賞當時論者已嫌其太重然彥博為參知政事若宰相有缺次補亦當為之況有功乎又國家文臣為宰相出入無常武臣為樞密使非有大罪不可罷也且臣不欲使青為樞密使者非徒為國家惜名器亦欲保全青之功耳青起于行伍驟擢為樞密副使中外洶洶以為朝廷未有此比今青立大功言者方息若又賞之太過是復召衆言也爭之纍日上乃從之曰然則更與其諸子官何如籍曰昔衛青有功四子皆封侯此固有前世之比無傷也于是以青為護國軍節度使河中尹加檢校太傅諸子皆超遷數官賞賜金帛甚厚後數月兩府奏事上顧籍笑曰卿前日商量除狄青官深合事宜可謂深逺之慮矣是時適意以若訥為樞密使位在已上宰相有缺若訥當次補青武臣雖為樞密使不妨巳塗轍故于上前爭之既不能得退甚不懌乃密為奏言狄青功大賞之太薄無以勸後又密令人以上前之語告青又使語內侍省押班石全斌使于禁中自訟其功及言與孫沔褒賞太薄許為外助上既日日聞之不能無信頃之上忽對兩府謂籍曰平蜀之功前日賞之太薄今以狄青為樞密使孫沔為樞密副使石全斌先給觀察使俸更候一年除觀察使高若訥優遷一官加遷上學士置之經筵又言張堯佐亦除宣徽使聲色俱厲籍錯愕對曰容臣等退至中書商議明日再奏上曰勿往中書只于殿門閣內議之朕坐于此以候之也若訥時為户部侍郎籍乃與同列議於閣內以若訥為尚書左丞加觀文殿學士兼侍讀其餘皆如聖㫖入奏之上容色乃和遂下詔行之始平公定州歸朝既入見退詣中書白執政以求致仕執政曰康寧如是又主上意方厚而求去如此之堅何也始平公曰若待筋力不支人主厭棄然後去乃不得已也豈得為止足哉因退歸私第堅卧不起自青州至是三年凡七上表其劄子不勝數朝廷乃許之以太保致仕是時論者皆謂公精力克壯未必肯決去至是乃服嘉祐元年正月甲寅朔上御大慶殿立仗朝㑹前夕大雪至壓宫架折上在禁庭跣禱於天及旦霽百官就列既捲簾上暴感風眩冠冕欹側左右復下簾或以指抉上口出涎乃小愈復捲簾趣行禮而罷戊午宴契丹使者于紫宸殿平章事文彥博奉觴詣御榻上壽上顧曰不樂耶彥博知上有疾猝愕無對然尚能終宴己未契丹使者入辭置酒紫宸殿使者入至庭中上疾呼曰趣召使者升殿朕幾不相見語言無次左右知上疾作遽扶入禁中文彥博遣人以上㫖諭契丹使者云昨日宫中飲酒過多今不能親臨宴遣大臣就驛賜宴仍授國書彥博與兩府俟于殿閣久之召內侍都知史志聰鄧保吉等問上至禁中起居狀志聰對以禁中事嚴密不敢泄彥博怒叱之曰主上暴得疾係社稷之安危爾曹出入禁闥不令宰相知天子起居欲何為耶自今疾勢增損必一一見白仍命直省官引至中書取軍令狀志聰等素謹願及夕諸宫門白下鎖志聰曰汝曹自白宰相我不任受其軍令庚辰兩府詣東閣小殿門起居上自禁中大呼而出曰皇后與張茂則謀大逆語極紛錯宫人扶侍者皆隨上而出謂宰相曰相公且為天子肆赦消災兩府退始議下赦茂則內侍也上素不喜聞上語即自縊左右救解得不死文彥博召茂則責之曰天子有疾譫言耳汝何遽如是汝若死使中宫何所自容耶令常侍上左右毋得輒離曹后以是亦不敢輒近上左右諸宫主最長案諸宫主當是周陳國公主時已病心初不知上之有疾更無至親在上側者惟十閣宫人侍奉而已既不能省事兩府但相與議定稱詔行之兩府謀以上躬不寧欲留宿宫中而無名辛酉文彥博建議設醮祈福于大慶殿兩府晝夜焚香設幄于殿之西廡史志聰等白故事兩府無留宿殿中者彥博曰今何論故事也壬戌上疾小間暫出御勤政殿以安衆心癸亥賜在京諸軍月支錢兩府求請詣殿見上史志聰等難之平章事富弼責之志聰等不敢違是日兩府始入福寧殿卧內奏事兩制近臣日詣內東門起居百官五日一入甲子赦天下知開封府王素夜叩宫門求見執政白事文彥博曰此際宫門何可夜開詰旦素入白有卒告都虞候欲為變者執政欲收捕搜治彥博曰如此則張皇驚衆乃召殿前都指揮使許懷德問之曰都虞候某甲者何如人懷德曰在軍職中最為謹良彥博曰可保乎曰可保彥博曰然則此卒有怨於彼誣之耳當亟誅以靖衆衆以為然彥博乃請平章事劉沆判狀尾斬于軍門及上疾愈沆譖彥博于上曰陛下違豫時彥博擅斬告反者彥博以沆判呈上上意乃解先是富弼用朝士李仲昌策自澶州商胡河穿六漯渠入橫隴故道北京留守賈昌朝素惡弼隂結內侍右班副都知武繼隆令司天官二人候兩府聚處于大慶殿庭執狀抗言國家不當穿河于北方致上體不安文彥博知其意有所在未有以制也後數日二人又上言請皇后同聽政亦繼隆所教也史志聰等以其狀白宰執彥博視而懷之不以示同列同列問不以告既而召二人而語曰汝今日有所言乎對曰然彥博曰天文變異汝職當言也何得輒預國家大事汝罪當族二人懼色變彥博曰觀汝直狂愚耳未欲治汝罪自今無得復爾二人退彥博乃以狀示同列皆憤怒曰奴敢爾妄言何不斬之彥博曰斬之則事彰灼中宫不安衆皆曰善既而議遣司天官定六漯于京師方位彥博復遣二人武繼隆白請留之彥博曰彼不敢輒妄言有人教之耳繼隆默不敢對二人至六漯恐治前罪乃更言六漯在東北非正北無害也戊辰以後上神思寖清寧然終不語羣臣奏事大抵首肯而已壬申罷醮兩府始分番歸第者各宿其二府二月癸未朔甲申詔惟兩府近臣候問于內東門餘悉罷之甲辰上始御延和殿自省府官以上及宗室皆入參丙午百官奏賀康復貢父曰章獻劉后本蜀人善播鼗蜀人宫美案李攸宋朝事實及宋史后妃傳竝作龔美擕之入京美以煆銀為業時真宗為皇太子尹開封美因煆得見太子語之曰蜀婦人多才慧汝為我求一蜀姬美因納后于太子見之大恱寵幸專房太子乳母惡之太宗嘗問乳母太子近日容貌瘦瘠左右有何人乳母以后對上命去之太子不得已置于殿侍張耆之家耆避嫌遂不敢下直未幾太宗宴駕太子即帝位復召入宫劉貢父曰真宗將立劉后參知政事趙安仁以為劉后寒微不可以母天下不如沈德妃出于相門上雖不樂而以其守正無以罪也他日上從容與王冀公論方今大臣誰最為長者冀公欲擠安仁乃譽之曰無若趙安仁上曰何以言之冀公曰安仁昔為故相沈義倫所知案宋史沈倫傳舊名義倫以與太宗名下字同止名倫此仍作義倫當是因太宗于太平興國二年改名炅有詔舊名二字今後不須回避也至今不忘舊德常欲報之上默然明日安仁遂致政事王旦太尉薦寇萊公為相萊公數短太尉于上前而太尉專稱其長上一日謂太尉曰卿雖稱其美彼專談卿惡太尉曰理當然臣所以重凖也上由是益賢太尉萊公在藩鎮嘗因生日搆山棚大宴又財用僭侈為人所奏上怒甚謂太尉曰寇凖每事欲效朕可乎太尉徐對曰準誠能無如騃何上意遽解曰然此正是騃耳遂不問及太尉疾亟上問以後事惟對以早宜召寇準為相𡊮默云錢資元曰真宗末王冀公每奏事或懷數奏出其一二其餘皆匿之既退以意稱聖㫖行之嘗與馬知節俱奏事上前冀公將退知節目之曰懷中奏何不盡出之張乖崖常言使寇公治蜀未必如詠至如澶淵一擲詠不敢為也深歎服之富公云邢惇雍州人以學術稱鄉曲家居不仕真宗末以布衣召對問以治道惇不對上問其故惇曰陛下東封西祀皆已畢矣臣復何言上因除試四門助教遣歸惇衣服居處一如平日鄉人不覺其有官也既卒人見其敕與廢紙同束屋梁間滕元發云涑水記聞卷五
