body:
  text: 涑水記聞卷九宋司馬光撰景祐三年正月詔御史中丞杜衍沙汰三司吏吏疑衍建言己亥三司吏五百餘人詣宰相第諠譁又詣衍第詬詈亂挾瓦礫詔捕後行三人杖脊配沙門島因罷沙汰壬申以翰林學士户部郎吳奎為左司郎中權知開封府翰林侍讀學士權知開封府王素充羣牧使初素與歐陽修數稱富弼于上前弼入相素頗有力焉弼既在相位素知開封府冀弼引己以登兩府既不如志因詆毁弼又求外官遂出知定州府徙知益州復還知開封府愈鬱鬱不得志厭倦煩劇府事多鹵莽不治數出遊宴素性驕侈在益州定州皆以賄聞為人無志操士大夫多鄙之開封府先有散從官馬千馬清善督察盜賊累功至班行府中賴之或謂素二馬在外威福自恣大為姦利素悉奏逐之逺方于是京師盜賊累發求捕不獲臺官言素不才亦自乞外補朝廷因而罷之大理寺丞楊忱監蘄州酒税仍令御史臺即日押出城忱故翰林侍讀學士偕之子少與弟慥俱有俊聲忱治春秋慥治易棄先儒舊説務為高竒以欺駭流俗其父甚竒之與人書曰天使忱慥力扶周孔忱為文尤怪僻人少有能讀其句者忱常言春秋無襃貶與人談流蕩無涯岸要取不可勝而已性輕易喜傲忽人好色嗜利不修操襝謫貶江淮間以口舌動搖監司及州縣得其權力以侵刻細民江淮間甚苦之至是除通判河南府事待闕京師弟慥掌永興安撫司機宜卒于長安忱不徃視日遊處于娼家㑹有告其販紗漏税者忱自言與權三司使蔡襄有宿隙乞下御史臺推鞫朝廷許之獄成以贖論仍衝替忱尚留京師御史中丞王疇劾奏忱曰忱口談道義而身為沽販氣凌公卿王禹玉曰包希仁知廬州即鄉里也親舊多乘勢擾官府有從舅犯法希仁戮之自是親舊皆屏息李公明曰孔中丞道輔初以太常博士知仙源縣諸孔犯法無所容貸案曲阜改仙源在大中祥符五年至金太宗天㑹七年始復稱曲阜故此書與宋史孔道輔傳皆書仙源乃束都事略則云道輔知曲阜縣當是後人追改非南宋時原文附識于此章獻太后臨朝内侍省都知江德元權傾天下其弟德明奉使過杭州時李及知杭州待之一如常時中人奉使者無所加益僚佐皆曰江使者之兄居中用事當今無比榮祜大臣如反掌耳而使者精鋭復不在人下明公待之禮無加者明公雖不求福獨不畏其禍乎及曰及待江使者不敢慢亦不敢過如是足矣又何加焉既而德明謂及僚佐曰李公髙年何不求一小郡以自處而久居餘杭繁劇之地豈能便耶僚佐走告及白果然江使者之言甚可懼也及笑曰及老矣誠得小郡以自逸庸何傷待之如前亦無所加既而德明亦不能傷也時人服其操守郭后既廢京師富民陳子誠者因保慶楊太后納女入宮太后許以為后也已至掖庭將進御勾當御藥院閻士良聞之遽見上上方披百葉圖擇日士良曰陛下讀此何為上曰汝何問焉士良曰臣聞陛下欲納陳氏為后信否上曰然士良曰陛下知子誠是何官上曰不知也士良曰子誠是大臣家奴僕之官也陛下若納奴僕之女為后豈不愧見公卿大臣也上遽命出之孫器之云士良自言先是趙元昊每遣使奉表入貢不過稱教練使衣服禮容皆如牙吏寳元元年十二月丙寅鄜延路奏元昊遣使戴金冠衣緋佩蹀躞奉表納旌節告敕其表略曰臣祖宗本出帝胄當東晉之末運創後魏之初基曩者臣祖繼遷心知兵要手握乾符大舉義旗悉降諸部臨河五郡不旋踵而歸沿邉七州悉差肩而克又曰臣父德明嗣奉世基勉從朝命真王之號夙感于頒宣尺土之封顯蒙于割裂又曰稱王則不喜朝帝乃是從輻輳屢期山呼齊舉伏願以一垓之土地建為萬乘之邦家于時再讓靡遑羣情又迫事不得已順而行之遂以十月十一日郊壇備禮為世祖諡始文本武興法建禮仁孝皇帝國稱大夏年號天授禮法延祚伏望皇帝陛下睿哲成人寛慈及物許以西郊之地冊為南面之君敢竭愚庸常敦歡好魚來鴈往任傳鄰國之音地久天長永鎭西邉之患至誠瀝懇仰俟帝俞寳元二年六月壬午詔元昊在身官爵並宜削奪仍除屬籍中外之人有能捕斬元昊者即除靜難軍節度使仍賜錢榖銀絹元昊所部之人能歸順者並等第推賞丙戌詔河東安撫司牒北朝安撫司以趙元昊背叛河東緣邉㸃集兵馬慮北朝驚疑寳元二年五月壬子以定國軍節度使知樞密院事王德用充武寧軍節度使發赴徐州本任癸丑德用獻所居第以益芳林園詔給其直八月庚辰朔或云壬午武寧節度使王德用自陳所置馬得于馬商陳貴契約具在非折繼宣所賣詔德用除右千牛衛將軍徙知隨州仍増置隨州通判一員九月丁未折繼宣授諸衛將軍徙知内地以其弟代之案宋史王德用傳云有言德用市馬于府州者上其劵乃市于商人言者猶不已又折御卿傳子惟忠知府州既卒以子繼宣嗣川事寶元中繼宣坐苛虐黜為左監門衛將軍此條不著德用因人言降徙繼宣坐苛虐罷黜端委似傳寫有缺佚寶元二年十二月乙丑鄜延環慶路都部署司奏夏人寇掠保安軍及延州駐泊鈐轄六宅使盧守懃等將兵擊卻之各以功大小受賞有差散直狄青最多超四資除殿直癸酉雨木冰己卯昭遠受詔宰猗氏案昭遠不著姓似上文有缺佚孔道輔卒于澶州契丹乘西鄙用兵中國疲敝隂謀南侵朝廷聞之十月始修河北諸州城又籍民為壯强以備之又籍陜西河東民為鄉兵弓手時天下久承平忽聞㸃兵民情驚擾敕諭以今籍民兵止令守衛慮有不逞之徒妄相驚煽云官欲文面為兵發之戍邊有為此言者聽人告捕當以其家財充賞案此條十月上脱繫年據宋史慶厯元年十月修河北城池二年正月契丹大發兵屯幽薊間先使其宣徽南院使蕭英翰林學士劉六符奉書入見己巳邊吏以聞朝廷為之旰食壬申以右正言知制誥富弼假中書舍人充接伴康定初夏人寇延州永平寨主監押欲引兵匿深山俟其去復歸指揮使史吉帥所部數百人遮城門立于馬前曰寨主監押欲何之二人以其謀告吉曰如此兵則完矣如城中百姓芻糧何此往還之迹何可掩異日為有司所劾吉為指揮使不免于斬頭願先斬吉于馬前不然不敢以此兵從行也寨主監押慚懼引轡而返㓂至圍城吉率衆拒守數日而㓂去朝廷以寨主監押完城功各遷一官吉曰幸不失城寨吾豈論功乎後官至團練使女為郭逵夫人亦有明識逵善治生家甚富夫人常規之曰我與公俱老所衣食幾何子孫皆有官公位望不輕胡為多藏以敗名也章郇公得象之髙祖建州人仕王氏為刺史號章太傅其夫人練氏智識過人太傅嘗出兵有二將後期欲斬之夫人置酒飾美姬進之太傅歡甚迨夜分練夫人密摘二將使去二將奔南唐將兵攻建州破之時太傅已卒夫人居建州二將遣使厚以金帛遺夫人且以二白旗授之曰吾將屠此城夫人植旗于門吾以戒士卒勿犯也夫人返其金帛并旗勿受曰君幸思舊德願全此城之人必欲屠之吾家與衆俱死耳不願獨生二將感其言遂止不屠太傅十三子其八子夫人所生也及宋興子孫及第至達官者甚衆餘五房子孫無及第者惟章衛狀元及第其父亦八房子孫繼五房耳黄好謙云初周王將生詔選孕婦朱氏以備乳母已而生男眞宗取視之曰此兒豐盈亦有福相留宮中娛皇子皇子七歲薨眞宗以其兒賜内侍省都知楊景宗為養子名曰茂實及長累歴軍職至馬軍副都指揮使有軍人繁用其父嘗為張氏僕用幼聞父言茂實生于宮中或言先帝之子于上屬為兄用冀幸恩賞即為表具言其事于中衢邀茂實以表逞之茂實銜之以用屬開封府以用妄言杖之配外州下軍然事遂流布衆庶讙然于是言事者請召用還察實詔以嘉慶院為制獄案之至和元年八月嘉慶院制獄奏軍人繁用素病心妄對張茂實陳牒稱茂實為皇親案署茂實得狀當奏擅送本衙取勘臺諫官劾茂實當上言而不以聞擅流配卒夫不宜典兵馬獄成知諫院張擇行録問駁繁用非心病詔更驗定繁用配廣南牢城所連及者皆釋之茂實先巳内不自安求出除寧遠軍節度使知滁州樞密直學士明鎬討貝州久未下上深以為憂問于兩府參知政事文彦博請自往督戰八年正月丁丑以彦博為河北宣撫使監諸將討貝州時樞密使夏竦惡鎬所奏請多從中沮之惟恐其成功彦博奏今在軍中請得便宜從事不從中覆上許之閏月庚子朔克貝州擒王則初彥博至貝州與明鎬督將築距闉以攻城旬餘不下有牢城卒董秀劉炳請穴地以攻城彦博許之貝州城南臨御河秀等夜于岸下潛穿穴棄土于水晝匿穴中城上不之見也久之穴城自教場中出秀等以褐袍塞之走白彦博選敢死士二百命指揮使將之銜枚自穴中入有帳前虞候楊遂請行許之遂曰軍中有病欬者數人此不可去請易之從之既出穴登城殺守者垂絙以引城下之人城中驚擾賊以火牛突登城者登城者不能拒頗引卻楊遂力戰身被十餘創援鎗刺牛牛卻走踐賊賊遂潰王則張巒卜吉與其黨突圍走至村舍官軍追圍之則猶著花幞頭軍士爭趣之部署王信恐賊死無以辨以身覆其上遂生擒之巒吉死于亂兵不知所在彦博請斬則于北京夏竦奏言所獲賊魁恐非眞遂檻車送京師剮于馬市董秀劉炳並除内殿崇班初趙元昊既陷安逺塞門朝廷以延州堡塞多徒分兵力其逺不足守者悉棄之而夏益内侵為邊患大理寺丞僉署保大軍節度判官事种世衡建言州東北二百里有故寛州城修之東可通河東運路北可扼夏要衝詔從之命世衡帥兵董其役且城之城中無井鑿地百五十尺始遇石而不及泉土人告不可鑿衆以為城無井則不可守世衡曰安有地中無水者即命工鑿石而出之得石屑一器酬百錢凡過石數重水乃大發既清且甘城中牛馬皆足自是邊城之無井者效之皆得水詔名其城曰青澗以世衡為内殿承制知城事出希文所作墓志衆亦云世衡字仲平放兄之子世衡少尚氣節以䕃將作監主簿累遷太子中舍嘗知武功縣用刑嚴峻杖人使自凭闌立甎上受箠足或落甎則更從一數之人亦服其威信或有追呼不使人執帖下鄉村但以片紙榜縣門云追某人期某日詣縣庭其親識見之驚懼走告之皆如期而至于志寜云後通判鳳州知州王蒙正章獻太后姻家也嘗以私干世衡不從乃誘王知謙使詣闕訟冤而隂為之内助世衡坐流竇州章獻崩龍圖閣直學士李鉉奏雪其罪補衛尉寺丞墓志云後知澠池縣葺館舍設什器乃至砧臼匙筯無不畢備客至如歸由是聲譽大振縣旁山上有廟世衡葺之其梁重大衆不能舉世衡下令校手搏傾城人隨往觀之世衡謂觀者曰汝曹先為我致廟梁然後觀手搏衆欣然下山共舉之須臾而上其權數皆如此𩔖初至青澗城逼近夏境守備單弱芻糧俱乏世衡以官錢貸商旅使致之不問所出入未幾倉廩皆實又教吏民習射雖僧道婦人亦習之以銀為射的中者輒與之既而中者亦多其銀重輕如故而的漸厚且小矣或爭徭役優重亦使之射射中者得優處或有過失亦使之射射中則釋之由是人皆能射士卒有病者常使一子視之戒以不愈必笞之撫養羌屬親入其帳得人歡心爭為之用寇至屢破之部落待遇如家人有功者或解所服金帶或撤席上銀器遺之比數年青澗城遂成富强于延州諸寨中獨不求益兵運芻糧衆云亦出墓志洛苑副使知青澗城种世衡為屬吏李戎以擅用官物諸不法事訐訟按驗有狀鄜延經略使龐公奏世衡披荆􅁄立青澗城若一一拘以文法則邊將無所措手足詔勿問頃之世衡徙知環州將行别龐公拜且泣曰世衡心腸鐵石今日為公下淚也潁公云慶厯二年春范文正公巡邊至為環慶經略使環州屬羌多懐二心密與元昊通公以世衡素得屬羌心而青澗城已完固乃奏徙世衡知環州以鎮撫之有牛努額者素崛强未嘗出見州官聞世衡與約明日當至其帳慰勞部落是夕雪深三尺左右曰努額凶詐難信且道險不可行世衡曰吾方以信結邊人可失期耶遂冒雪而往既至努額尚寢世衡蹴起之努額大驚曰吾世居此山漢官無敢至者公乃不疑吾耶率部落羅拜皆感激心服出墓志羌酋慕恩部落最强世衡皆撫而用之嘗夜與慕恩飲出侍姬以佐酒既而世衡起入内潛于壁隙窺之慕恩竊與侍姬戲世衡遽出掩之慕恩慙懼請罪世衡笑曰君欲之耶即以遺之由是得其死力諸部有貳心者使慕恩討之無不克生羌歸附者百餘帳納所得元昊文券袍帶無復貳心世衡令諸族各置烽火元昊掠之更相救常敗去遂不敢犯郭固云世衡嘗以罪怒一番落將杖其背僚屬為之請莫能得其人被杖已奔趙元昊甚親信之得出入樞密院歲餘盡詢得其機事以歸衆乃知世衡用以為間也衆云環原之間屬羌敏珠密臧康諾三種最大素號横猾撫之驕不可制攻之則險不可入常為原州患其北有三川通于西夏三川之間有古細腰城慶厯四年參知政事范文正公宣撫陜西命世衡與知原州蔣偕共城之世衡先遣人説誘西夏以故未出兵爭之世衡以錢募戰士晝夜版築旬月而成乃召三種酋長諭以官築此城為汝禦寇三種既出其不意又援路已絶因而服從世衡在役所得疾明年正月甲子卒屬羌朝夕聚哭柩前者數日青澗環州吏民及屬羌皆畫像事之八子詁診詠諮諤記誼出墓志名案此所記八子之原缺其一初洛苑副使种世衡在青澗城欲遣僧王嵩入趙元昊境為間與之飲謂曰彼若得汝拷掠求實汝不勝痛當以實告耶嵩曰誓死不言世衡曰先試之乃縛嵩于庭而掠之數百嵩不屈世衡曰汝眞可也時元昊使其妻之兄弟旺榮及剛朗凌分將左右廂兵用事世衡使嵩為民服齎書與旺榮曰嚮者得書知有善意欲背僭偽歸款朝廷甚善事宜早發狐疑變生且遺之棗及銀龜旺榮以聞于元昊鎖嵩囚地牢中且半歲㑹元昊欲復歸中國而恥先自言乃釋嵩囚使旺榮遺邊將書遣剛朗凌麾下教練使李文貴送嵩還曰向者种洛苑書意欲求通和耶邊將送文貴及嵩詣延州時龐公為經略使己奉朝旨招納元昊始遣文貴往來議其事奏嵩除三班借職衆云及自見東染院使种世衡長子詁初抗志不仕慕叔祖放之為人既而人莫之省皇祐中詣闕自言父世衡遣王嵩入夏國離間其用事臣旺榮兄弟皆被誅元昊由是勢衰稱臣請服經略使龐籍掩臣父子之功自取兩府龐公時為樞密使奏稱嵩入夏境即被囚元昊委任旺榮如故及元昊請服之時先令旺榮為書遺邊將元昊妻即旺榮妹元昊黜其妻旺榮兄弟怨望元昊既稱臣後二年旺榮謀因元昊子娶婦之夕作亂殺元昊事覺族誅非因嵩離間而死臣與范仲淹韓琦皆豫受中書劄子候西事平除兩府既而仲淹琦先除臣次之非臣專以招懐之功得兩府文書具在皆可攷驗朝廷知詁妄言猶以父功特除詁天興主簿令御史臺押出城趣使之官嘉祐七年拓跋諒祚始請稱漢官以伶人薛老峰為副使稱左司郎中兼侍御史知雜事又請尚主及乞國子監所印書釋氏經一藏并譯經僧及幞頭工人伶官等詔給國子監書及釋氏經并幞頭尚主辭以昔嘗賜姓其餘皆託辭以拒之夏當遣使者賜諒祚生辰禮物初命内殿承制余允臺官上言允本庖人更乞擇使者乃命供備庫副使張宗道初入境夏館宗道于西室逆者曰主人居先禮之常也天使何疑宗道曰僕與夏主比肩以事天子若夏主自來當相為賓主爾陪臣也安得為主人當循故事僕居上位事久不决逆者曰君有幾首乃敢如此宗道大笑曰有一首耳來日已别家人今日欲取宗道首則取之宗道之死得其所矣但恐夏國必不敢爾逆者曰譯者失辭某自謂有兩首耳宗道曰譯者失辭何不斬譯者乃先宗道自云兩國之歡如魚水宗道曰然則天朝水也水可無魚魚不可無水于内帑借錢一百二十萬紬絹七十萬銀四十萬錦綺二十萬助十分之七案此條上文有缺佚汴張鞏大興狹河之役使西俱闊百五十尺所修自京東抵南京以東已狹不更修也今歲所修止于開封境王臨云亦案此條原委未明似有脱誤夏英公為南京留守杖人好潛加其數提㸃刑獄馬洵美武人也劾奏之曰夏竦大臣朝廷寄任非輕罪有難恕者明施重刑可也何必欺罔下人潛加杖數乎詔取戒勵當時文臣皆為英公恥之滕宗諒知涇州用公使錢無度為臺諫所言朝廷遣使者鞫之宗諒聞之悉焚公使歴使者至不能案朝廷落職徙知岳州君貺云滕宗諒知岳州修岳陽樓不用省庫錢不斂于民但牓民間有宿債不肯償者獻以助官官為督之民負債者爭獻之所得近萬緡置庫于廳側自掌之不設主典案籍樓成極雄麗所費甚廣自入者亦不鮮焉州人不以為非皆稱其能君貺云諫議大夫李宗詠昔侍中崧之孫也父粲崧之庶子崧之遇禍粲猶在襁褓其母投之牆外由是獨得免崧于故相昉為從叔世居深州饒陽墳墓夾道崧在道東謂之東李昉在道西謂之西李故宗詠猶與宗諤聨名治臣云黄庠洪州人文學精贍取國子監進士解貢院奏名皆第一聲譽赫然天下之士皆服為之下及就殿試病不能執筆有詔復舉就殿試未及期而卒楊寘字審賢兩為國子解元貢院奏名殿廷唱第皆第一未除官而卒馮京字當世鄂州人府解貢院殿廷皆第一自見歐陽修字永叔吉州人舉進士國子補監生發解禮部奏名皆第一人天聖八年及第嘉祐七年三月乙卯以參知政事孫抃為觀文殿學士同郡牧制置使樞密副使趙槩為參知政事翰林學士左司郎中權知開封府吳奎為樞密副使抃以進士高第累官至兩制惟淳厚無他材上以久任翰林擢為樞密副使多病昬忘醫官自陳勞績求遷吏以文書白抃抃見吏衣紫誤以為醫官因引手案上謂曰抃數日來體中不佳君試為診之聞者傳以為笑及在政府百司白事但對之拱黙未嘗開一言是時樞密使恐必不勝任殿中侍御史韓縝因進見極言其不才當置之散地抃初不知後數日中書奏事退宰相韓琦曾公亮獨留身在後抃下殿謂參知政事歐陽修曰丞相留身何也修曰豈非奏君事也抃曰抃有何事修曰御史韓縝言君君不知也抃乃頓足摘耳曰不知也因移疾請退朝廷許之涑水記聞卷九
