body:
  text: 涑水記聞卷十四宋司馬光撰茂州舊領羈縻九州皆蠻族也蠻自推一人為州將治其衆州將常在茂州受處分茂州居羣蠻之中地不過數十里舊無城惟植鹿角蠻人屢以昏夜入茂州剽掠民家六畜及人茂州輒取貨于民家遣州將往贖之與之講和而誓習以為常茂州民甚苦之熙寧八年屯田員外郎李琪知茂州民投牒請築城琪為奏之乞如民所請築城繞民居凡八百餘步朝廷下成都路鈐轄司度其利害時龍圖閣直學士蔡延慶領都鈐轄李琪已罷去大理寺丞范百常知茂州延慶下百常檢度百常言其利朝廷遂令築之既而蠻酋羣訴于百常稱城基侵我地乞罷築百常不許訴者不已百常以梃驅出九年三月二十四日始興築才丈餘靜州等羣蠻數百奄至其處茂州兵才二百人百常帥之拒擊殺數人蠻乃退百常率遷民入牙城明日蠻數千人四面大至悉焚鹿角及民廬舍引梯衝攻牙城矢石雨下百常率衆乘城拒守至二十九日其酋長二人為櫑木所殺蠻兵乃退既而四月初屢來攻城皆不克而退然其衆猶遊繞四山城中人不敢出茂州南有箕宗關路通永康軍北有隴東路通綿州皆為蠻所據百常募人間道詣成都及書百牌數百投江中告急求援于是蜀州駐泊都監孫清將數千人自箕宗關入蠻伏兵擊之清死而士卒死殺不多又有王供備等將數千人自隴東道入時州蠻請降從者殺其二子蠻怒密告靜州等蠻使遮其前而自後驅之壅溪上流官軍既涉而決之殺溺殆盡既而鈐轄司命百常與之和誓蠻人稍定蔡延慶乞奏朝廷遣近上內臣共經制蠻事朝廷命押班王中正專制蠻事中書院樞密劄子皆云奉聖旨講和而中正自云受御前劄子掩襲叛蠻其年五月中正將兵數千自箕宗關入經恭州蕩州境乘其無備掩擊之斬首數百級虜掠畜産焚其廬舍皆盡既而復與之和誓至七月又襲擊之又隨而與之和誓乃還奏云事畢始蔡帥兵恐監司不肯應給軍需故奏乞近上內臣共事中正受宣命凡軍事皆與都鈐轄司商議中正將行奏云茂州去成都逺若事大小一與鈐轄司商議恐失事機乞委臣專決關鈐轄司知有旨依奏中正既至軍事進止皆一已出蔡不復得預聞事既施行但關知而已監司皆附之遂奏蔡延慶區處失宜致生邊患又延慶既與和誓而臣引兵入箕宗關蠻渝約出兵拒戰蔡由是徙知渭州以資政殿學士馮京代之又奏范百常築城侵蠻地生邊患坐奪一官勒停隴西田肥美靜州等蠻時引生羌據其地中正不能討北路遂絶故事與蠻為和誓者蠻先輸貨謂之抵兵又輸求和物官司乃籍所掠人畜財物使歸之不在者增其價然後輸誓牛羊豕棘耒耜各一乃縛劍門于誓場酋家皆集人人引于劍門下過刺牛羊豕血瘞之掘地為坎及縛羌婢坎中加耒耜及棘于上人投一石擊婢以上埋之巫師詛曰有違誓者當如此婢及中正和誓初不令輸扺兵求和等物亦不索其所掠自備誓具買羌婢以氊蒙之經宿而失中正先自劍門過蠻皆怨而輕之自是剽掠不絶狄鎔范百常云王中正在河東令轉運司勾押吏與陳安石同坐計度軍糧吏曰都運在此不敢坐中正叱曰此中何論都運司事辦奏汝班行不辦有劍加汝先是种諤上言乞不受王中正節制㑹諤有破米脂城功天子許之明日詔書至諤不復見中正引兵先趨夏州時河東夫見鄜延夫言此去綏德城甚近兩日中亡歸者二千餘人河東轉運判官莊公嶽等斬之不能禁初王中正在河東奴視轉運使又奏提舉常平倉趙成管勾隨軍運糧草凡有所需索不行文書但遣人口傳指揮轉運使楊思不敢違公嶽等以口語無所憑從容白中正云太尉所指揮事多恐將命者有所忘誤乞記之于紙筆自後始以片紙書之公嶽等白中正軍出境應備幾日糧中正以為鄜延受我節制前與鄜延軍遇彼糧皆我有也乃書片紙云止可備半月糧公嶽等恐中道乏絶隂更備八日糗糧及种諤既得詔不受中正節制委中正去鄜延糧不可復得人馬漸乏食乃遣官屬引民夫千餘人索邊人所窖粥糜發之得千餘石庚午至夏州已降种諤中正軍于城東城中居民數十家時朝旨禁入賊境抄掠賊亦棄城邑皆走河北士卒無所得皆憤悒思戰諸將皆言于中正曰鄜延軍先行所獲功甚多我軍出境近二旬所獲才三十餘級何以復命于天子且食盡矣請襲取宥州聊可藉口中正從之癸酉至宥州城中有民五百餘家遂屠之斬首百餘級降者十餘人獲馬牛百六十羊千九百軍于城東二日殺得馬牛羊以充食甲戌畿內將官張缺知府州折克行引兵二千餘人發糜窖遇夏千餘人與戰敗之斬首九百餘丙子至牛心亭食盡丁丑至奈王井遇鄜延掌機宜景思義得其糧遂引兵趨保安軍順寧寨己卯王中正軍于歸娘嶺下不敢入寨遣官屬請糧于順寧軍夫凍餒僵仆于道路未死衆已剮其肉食之十一月丙戌得朝旨班師乃歸延州計士卒死亡者近三萬人夫逃歸者大半死者近三千餘人隨軍入寨者萬千餘人馬二千餘匹死者幾半驢三千餘頭無還者初上令王中正种諤皆趨靈州興州中正不習軍事入夏境望空而行無嚮導斥堠性畏怯所至逗留恐夏知其營柵之處每夜二更輒令軍士滅私火後軍飯尚未熟士卒食之多病又禁軍中驢鳴及食盡士卒怨憤流言當先殺王昭宣及莊趙二漕歸中正頗聞之乃于衆中揚言必竭力前進死而後已隂令走馬承受金安石奏轉運司糧運不繼故不能進軍今且于順寧寨境上就食莊公嶽亦奏本期得鄜延糧因朝廷罷中正節制故糧乏上怒命械繫公嶽等于隰州獄治其罪公嶽等急乃奏臣等在麟府本具四十日糧王中正令臣等只備半月糧片紙為驗臣等隂備八日糗糧今出寨二十餘日始至宥州糧不得不乏上乃命脫械出外答款中正恐公嶽復有所言甚懼及還朝過隰謂公嶽等各降一官職事皆如故案謂公嶽句意義未明疑有脫誤初河東發民夫十一萬中正減糧數止有六萬餘人餘皆令待命于保德軍既而朝旨令餘夫運糧自鄜州出踵中正軍凡四萬餘人遣晉州將官訾虎將兵八千護送之虎等奏兵少夫多不足護送乞益兵出塞及不知道所從出又不知中正何所之有詔夫還更令隰州趨延州餉中正㑹天章閣待制趙卨領江東轉運使奏冬氣已深水凛草枯饋運難通乃罷之王中正既還延州分所部兵屯河東諸州山東兵往往百千為羣擅自潰歸朝命所在招撫給劵遣歸本營土兵亦有擅去者㑹高遵裕靈州失利詔中正自延州引所部兵救之中正移書召河東分兵屯石州趙宗本將州兵屯隰州士卒不肯行集庭下喧譁呼萬歲宗本父子閉門相保又有山東將官王從丕部兵亦不肯發從丕曉諭數日乃行㑹遵裕已至慶州詔中正引還宗本從丕各降二官士卒不問元豐三年瀘州蠻乞第犯邊詔四方館使韓存寶將兵討之乞第所居曰歸來州距瀘州東南七百里十月存寶出兵久雨四十餘日出塞才六十餘里留屯不進遣人招諭乞第有文書服罪請降軍中食盡存寶引還自發瀘州至此凡六十餘日朝廷責其不待詔擅引兵還命知雜御史何正臣就按斬之更命林廣將存寶部兵及環慶兵黔南兵合四萬人以四年十二月再出擊之離瀘州四百餘里即是深篟七薦切竹茂也皆髙阪險絶竹木茂密華人不能入蠻所恃以自存者也蠻逆戰于篟外廣擊敗之蠻走廣伐木開道引兵踵之又二百餘里至歸來州乞第逆戰又敗乃率其衆竄匿五年正月己丑廣入歸來州惟茅屋數十間分兵搜捕山篟皆無所獲所齎食盡得蠻所儲粟千餘斛數日亦盡饋運不繼先是有實封詔書在走馬承受所題云至歸來州乃開至是開之詔云若至歸來討捕乞第必不可獲聽引兵還是役也頗得黔南兵皆土丁遇出征日給米二升餘無廪給諸州民夫負糧者既輸糧官不復給食以是多餒死不還有名籍可知者四萬人其家人輔行及送資裝者不預焉軍士屯瀘州歲餘罹疫物故者六七千人所費約緡錢百餘萬元豐四年冬朝廷大舉討夏國十一月環慶都總管髙遵裕出旱海皇城使涇原副使總管劉昌祚出葫蘆河共趨靈州詔昌祚受遵裕節制昌祚上言軍事不稱旨上賜遵裕書云昌祚所言迂闊必若不任事者宜擇人代之遵裕由是輕昌祚既而昌祚先至靈武城下或傳昌祚已克靈武城遵裕在道聞之即上賀表曰臣遣昌祚進攻已克其城既而所傳皆虛遵裕至靈武城以為城朝夕可下使昌祚軍于閒地自以環慶兵攻之時軍中皆無攻具亦無知其法者遵裕旋令採木造之皆細小朴拙不可用又造土囊欲以填塹又欲以軍法斬昌祚衆共解之昌祚憂患成疾涇原軍士皆憤怒轉運判官范純粹謂遵裕曰兩軍不協恐生他變力勸遵裕詣昌祚營問疾以和解之遵裕又使呼城上人曰何不亟降其人曰我未嘗敗何謂降也徐禧在鄜延乘勢使氣常言用此精兵破羸卒左縈右拂直前斬之一步可取三級諸將有獻䇿者禧輒大笑曰妄語可斬夏人未出高永能請擊之禧曰王者之師豈可以狙詐取勝耶由是取敗髙遵裕既敗歸元豐五年李憲請發兵自涇原築寨稍前直抵靈州攻之先是朝廷知陜西困于夫役下詔諭民更不調夫至是李憲牒都轉運司復調夫饋糧以和雇為名官日給錢二百仍使人逼之云受密詔若軍乏糧斬都運使以下民間騷然出錢百緡不能雇一夫相聚立柵于山澤不受調吏往輒毆之解州加知縣以督之不能進命巡檢縣尉逼之則執梃欲鬭州縣無如之何士卒出前寨凍餒死者十五六存者皆憚行無鬭志倉庫蓄積皆竭羣臣莫敢言獨西京留守文潞公上言師不可再舉天子巽辭謝之樞密副使吕晦叔亦言其不可上不懌晦叔因請解機務即除知定州㑹內侍押班李舜舉自涇原來為上泣言必若出師關中必亂上始信之召晦叔慰勞之舜舉退詣執政王禹玉禹玉迎見以好言恱之曰朝廷以邊事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而邊事屬二內臣可乎內臣亦止宜供禁庭灑掃之職耳豈可當將帥之任耶聞者代禹玉發慚六月詔罷涇原之役更命鄜延修六寨以包橫山之地遣舜舉與承議郎直龍圖閣徐禧往視之乃命禧節制軍事八月禧舜舉與鄜延經略使沈括轉運使李稷將步騎四萬及諸路役兵始修永洛與米脂綏德皆在無定川中永洛北倚山南臨無定河三面皆絶崖地險要賊騎數來爭之皆敗去先是夏賊發國人十丁取九以為兵近二十萬人齎百日糧屯于涇原之北候官軍出塞而擊之既聞城永洛即引兵趨鄜延邊人來告者前後數十禧等皆不之信且曰賊若大來是吾立功遷官之秋也上賜禧等黃旗曰將士立功受賞當倍于米脂禧等恐沈括分其功乃曰城略已就矣與存中歸延安九月乙酉留李稷及步兵三萬餘人于永洛括偕禧舜舉以八千人還米脂是日永洛遣人走告賊騎且至丙戌禧括留屯米脂舜舉復如永洛丁亥賊騎至城下禧命鄜延總管曲珍領城中兵陳于崖下水際禧舜舉稷植黃旗坐于城上臨視之賊自未明引騎過陳前至食時未絶禆將髙永能曰吾衆寡不敵宜及其未成陳衝擊之庶幾可破不從賊與官軍夾水而陳前後無際將士皆有懼色曲珍曰今衆心已搖不可復戰戰必敗請收兵入城禧曰君為大將奈何遇敵不戰先自退耶俄而賊鳴笛于陳賊騎爭湧水犯官軍先是選軍中勇士良馬謂之選鋒使居陳前戰未幾選鋒先敗退走蹂踐後陳賊騎乘之官軍大潰偏裨死者數人士卒死及棄甲南走者幾丰曲珍與殘兵萬餘人入城崖峻道狹騎兵棄馬緣崖而上喪馬八千餘匹賊遂圍之時樓堞皆未備水寨為賊所據城中乏水至絞馬糞食死人腦被圍纍日曲珍度城必不能守白禧請率衆突圍南走猶愈于坐而待死禧怒曰君已敗軍又欲棄城耶戊戌夜大雨城遂陷珍帥衆數百人踰城走免禧舜舉稷皆沒命官死者三百餘人士卒得免者十無一二沈括聞曲珍敗永洛被圍退保綏德遂歸延州時有詔令李憲將環慶兵數萬救永洛比至延州永洛已陷矣永洛既失守夏國以書繫矢射于環慶境上經略使盧秉棄之賊乃更遣所得俘囚齎書移牒以遺秉秉不敢不以聞其詞曰十一月八日夏國西南都統嵬名濟乃謹裁書致于安撫經略麾下伏審統戎方面久向英風應慎撫綏以副傾注昨于兵役之際提戈相軋今以書問贄信非變化曲折之不同蓋各忠于所事不得不如此耳夫中國者禮義之所從出必動止猷為不失其正茍聽誣受間肆詐窮兵侵人之土疆殘人之黎庶是乖中國之體豈不為西人之羞哉昨朝廷暴驅甲兵大行侵討蓋天子與邊臣之議謂夏國方守先誓宜出不虞五路進兵一舉可定遂有去年靈州之役今秋永洛之戰較其勝負與前日之議為何如哉且中國祖宗之世于夏國非不經營之五路窮討之䇿既嘗施之矣諸邊肆橈之謀亦嘗用之矣知僥幸之無成故終歸樂天事人之道兼夏國提封一萬里帶甲數十萬西邊于闐作我歡鄰北有大燕為我强援今與中國乘隙伺便角力競鬭雖十年豈得休息哉即念天民無辜被兹塗炭之苦孟子所謂未有好殺能有志于天下也况夏國主上自朝廷見伐之後夙宵興念謂自祖宗之世事中國之禮無或虧貢聘不敢怠而邊吏幸功上聰致惑祖宗之盟既阻君臣之分不交豈不惜哉至于魯國之憂不在顓臾隋室之變生于楊感此皆明公得于胸中不待言而後喻今天下倒垂之望正在英才何不進讜言闢邪議使朝廷與夏國歡好如初生民重見太平豈獨夏國之幸乃天下之幸也案宋史夏國傳涇原總管劉昌祚上其書神宗喻答之與此作經略使盧秉以聞有異孔㬙于鬼切魯山處士􅌈之弟也為順陽令有虎來至城南㬙令吏卒往逐之㬙最居其前虎據山大吼吏卒皆失弓槍偃仆虎來搏㬙有小吏執硯趨當其前虎銜以去㬙取獵户毒矢挺身逐之左右諫不可㬙曰彼代我死吾何忍不救之逐虎入山十餘里竟射中虎奪小吏而還小吏亦不死王輔之為河北以輕躁得罪勒令分司久之除知處州到官日上表云清時有味白首無成又曰插筆有風空囹無日或解之曰杜牧詩云清時有味是無能閒愛孤雲靜愛僧欲把一麾江海去樂遊原上望昭陵屬意怨望有旨復令分司趙閲道抃熙寧中以資政殿大學士知越州兩浙旱蝗米價踴貴餓死者十五六諸州皆榜衢路立賞禁人增米價閲道獨榜衢路令有米者任增價糶之于是諸州米商輻輳米價更賤民無餓死者閲道治民所至有聲在成都杭越尤著張濟云趙閲道為人清素好養生知成都獨與一道人及大龜偕行後知成都并二侍者無矣蜀人云至和中范景仁為諫官趙閲道為御史以論陳恭公事有隙熙寧中介甫執政恨景仁數訐之于上且曰陛下問趙抃即知其為人他日上以問閲道對曰忠臣上曰卿何以稱其忠對曰嘉祐初仁宗不豫鎮首請立皇嗣以忠社稷豈非忠乎既退介甫謂閲道曰公不與景仁有隙乎閲道曰不敢以私害公范景仁云曽布為三司使與吕嘉問爭市易事介甫主嘉問布坐左遷詔命使出朝士多未之知布字子宣嘉問字望之或問劉貢甫曰曾子避席又問望之何如曰望之儼然介甫聞之不喜由是出貢父知曹州公佐云馮當世孫和叔吕晦叔薛師正同知樞密府三人屢于上前爭論晦叔獨默不言既而上顧問之晦叔方為之開析可否語簡而當上嘗納之三人亦不能違已出則未嘗語人皆譏晦叔循默不副衆望晦叔亦不辨也同僚或為辨之伯淳云上好與兩府議論天下事嘗謂晦叔曰民間不知有役矣對曰然上户昔日以役多破家今則飽食安居誠幸矣下户昔無役今索錢則苦矣上曰然則法亦當更矣伯淳云晦叔與師正並命入樞府師正事晦叔甚恭久之晦叔亦稍親之議事頗相左閣門副使韓存寶將陜西兵討瀘戎蠻拔數柵斬首數百級上欲優進官秩以勸立功者師正曰瀘戎本無事今優賞存寶後有立功大于此者何以加之晦叔曰薛尚書言是也乃除四方館使伯淳云市易司法聽人賖貸縣官貨財以田宅或金帛為抵當三人相保則給之皆出息十分之二過期不輸息外每月加罰錢百分之一貧人及無賴子弟多取官貸不能償積息罰愈滋囚繫督責徒存虛數實不可得刑部郎中王居卿初提舉市易司奏以田宅金帛抵當者減其息抵當徒相保者不復給自元豐二年正月七日以前本息之外所負罰錢悉蠲之凡數十萬緡負本息者延期半年衆議頗以為愜楊作云李南公知長沙縣有鬭者甲强乙弱各有青赤南公召使前以指揑之乙真甲僞也詰之果服蓋方有櫸柳以葉塗膚則青赤如毆傷者剝其皮橫置膚上以火尉之則如棓傷者水洗不落南公曰毆傷者血聚而硬悶僞者不然故知之有一村多豪户稅不可督所差户長輒逃去南公曰此村無用户長知縣自督之書其村名帖之于柱豪右皆懼是歲初限未滿此村稅最先集又諸村多詭名稅存户亡每歲户長代納亦不可督南公悉召其村豪右謂之曰此田不過汝曹所典買耳與汝期一月為我推究不則汝曹均輸之及期盡得冒佃之人使各承其稅河北提㸃刑獄有班行犯罪下獄按之不服閉口不食百餘日獄吏不敢栲訊甚患之南公曰吾力能使之食引出問曰吾欲以一物塞石鼻君能終不食乎其人懼即食且服罪人問其故南公曰彼必善服氣者以物塞鼻則氣結故懼元豐元年正月十五日張燈太皇太后以齒疾不能食不出觀故上于閏月十五日夜于禁中張燈露臺妓樂俱入太皇太后疾尚未平酒數行而起李偕臣云其年冬太皇太后得水疾御醫不能愈㑹新知邠州薛昌期亦病水疾得老兵王麻胡療之數日而愈上聞之遣中使召麻胡入禁中療太皇太后疾亦愈上喜即除麻胡翰林醫官賜金紫仍賜金帛直數千緡岐王夫人馮侍中拯之曽孫也失愛于王屏居後閣者數年元豐二年春岐王宫遺火尋撲滅夫人聞有火遣二婢往視之王見之詰其所以來二婢曰夫人令視大王耳王乳母素憎夫人與王二嬖人共譖之曰火殆夫人所為也王怒命內知客鞫其事二婢不勝拷掠自誣云夫人使之縱火王杖二婢而且哭于太后曰新婦所為如是臣不可與同處太后怒謂上必斬之上素知其不睦必為左右所陷徐對曰彼公卿家子豈可遽爾俟按驗得實然後議之乃召二婢使宫官鄭穆問鞫于皇城司數日獄具無實又命宫官馮誥録問上乃以其獄白太后因召夫人入禁中夫人大懼欲自殺上遣中使慰諭曰汝無罪勿恐且命徑詣太皇太后宫太皇太后亦慰存之太后與上繼至詰以火事夫人泣拜謝罪乃曰縱火則無之然妾小家女福薄誠不足以當岐王伉儷幸赦其死乞削髮出外為尼太后曰聞汝詛罵岐王有諸對曰妾乘忿或有之上乃罪乳母及二嬖人命中使送夫人于瑶華宫不披戴舊俸月錢五十緡更增倍之厚加資送曰候王意解當復迎之君貺云涑水記聞卷十四
