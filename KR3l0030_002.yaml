body:
  text: 涑水記聞卷二宋司馬光撰吕蒙正相公不喜記人過初參知政事入朝堂有朝士于簾內指之曰是小子亦參政耶蒙正佯為不聞而過之其同列怒令詰其官位姓名蒙正遽止之罷朝同列猶不能平悔不窮問蒙正曰一知其姓名則終身不能復忘固不如無知也不問之何損時皆服其量太祖末關中羣盜有馬四十匹常有怨于富平人志必屠之驅略農人使荷畚鍤隨之曰吾克富平必夷其城郭富平人恐羣詣荆姚見同州巡檢侯舍人告急舍人素有威名率衆伏于邑北羣盜聞之捨富平不攻而去舍人引兵于邑西邀之令士皆傅弩戒勿妄發曰賊皆有甲不可射射其馬無具裝又劫掠所得非素習戰也射之必將驚潰既而合戰衆弩俱發賊馬果驚躍散走縱兵擊之俘斬殆盡餘黨散入他州巡檢獲之自以為功送詣州邑盜固稱我非此巡檢所獲乃侯舍人所獲也巡檢怒自詣獄責之曰爾非我所獲而何盜曰我昔與君遇于某地君是時何不擒我耶我又與君遇于某地君是時棄兵而走何不擒我耶我為舍人所破狼狽失據為君所得此所謂敗軍之卒舉帚可撲豈君智力所能獨辦耶巡檢慙而退至道中國家征西夏調發陜西芻粟隨軍至靈武陜西騷動民皆逃匿賦役不肯供給有詔督運者皆得便宜從事不牽常法吏治率皆峻急而京兆府通判水部員外郎楊談大理寺丞林特尤甚長安人歌之曰楊談見手先教鎖林特逢頭便索枷長安多大豪及有蔭户尤不可號令有見任知某州妻清河縣君者不肯運糧談鎖而杖之于是莫敢不趨令談時令民每驢負若干每人擔若干仍齎糧若干官為封之須出塞乃聽食怨嗟之聲滿道既而京兆最為先辦民無逃棄者諸州皆稽留不能比事畢人畜死者十八九由是人始復稱之二人以是得顯官談終諫議大夫特至尚書三司使李順作亂于蜀詔以參知政事趙昌言監護諸將討之鳳翔是時寇準知州密上言趙昌言素有重名又無子息不可征蜀授以利柄太宗得疏大驚曰朝廷皆無忠臣言莫及此賴有寇準憂國家耳案原本太宗訛太祖憂訛有今據李攸宋朝事實改正乃詔昌言行所至即止專以軍事付王紹宣案紹宣宋朝事實作繼恩罷知政事以工部侍郎知鳳翔府召寇準參知政事昌言自鳳翔歷秦陜永興三州入為御史中丞真宗咸平五年翰林學士王欽若直館洪湛知貢舉京師豪族有奏名至及第者既而其家分居爭財出其錢簿有若干貫遺知舉洪學士上怒下御史臺窮治連及王欽若亦有所受是時欽若被眷遇上大怒以昌言操意巇險誣陷大臣昌言自户部尚書兼御史中丞貶安州司馬自是不獲省録十餘年更屢赦量移放還至祥符中乃復敘為户部侍郎西祀恩遷吏部侍郎卒李順反太宗命參知政事趙昌言為元帥昌言為人辨智于上前指畫破賊之䇿上恱之恩遇甚厚既行時有峩眉山僧茂貞以術得幸謂上曰昌言折頞貌有反相不宜委以蜀事上悔之遽遣使者追止其行以兵付諸將留少兵令昌言駐鳳州為後援事平罷參知政事知鳳翔府王原叔云錢若水為同州推官知州某性褊急數以胸臆決事不當若水固爭不能得輒曰當陪奉贖銅耳既而果為朝廷及上司所駁州官皆以贖論知州愧謝已而復然前後如此數矣有富民家小女奴逃亡不知所之奴父母訟于州命録事參軍鞫之録事嘗貸錢于富民不獲乃劾富民父子數人共殺女奴棄尸水中遂失其尸或為元謀或從而加功罪皆應死富民不勝箠楚自誣服具上州官審覆無反異皆以為得矣若水獨疑之留其獄數日不決録事詣若水廰詬之曰若受富民錢欲出其死罪耶若水笑謝曰今數人當死豈可不少留熟觀其獄詞耶留之且旬日知州屢趣之不得上下皆怪之若水一旦詣州屏人言曰若水所以留其獄者密使人訪求女奴今得之矣知州驚曰安在若水因密使人送女奴于知州乃垂簾引女奴父母問曰汝今見汝女識之乎對曰安有不識也因從簾中推出示之父母泣曰是也乃引富民父子悉破械縱之其人號泣不肯去曰微使君之賜則某滅族矣知州曰推官之賜也非我也其人趨詣若水廰事若水閉門拒之曰知州自求得之我何預焉其人不得入繞垣而哭傾家資以飯僧為若水祈福知州以若水雪冤死者數人欲為之奏論其功若水固辭曰若水但求獄事止人不冤死耳論功非其本心也且朝廷若以此為若水功當置録事于何地耶知州歎服曰如此尤不可及矣録事詣若水廰叩頭愧謝若水曰獄情難知偶有過誤何謝也于是逺近翕然稱之未幾太宗聞之驟加晉擢自幕職半歲中為知制誥二年中為樞密副使李繼隆與轉運使盧之翰有隙欲陷之罪乃檄轉運使期八月出塞令辦芻粟轉運司調發方集繼隆復為檄言隂陽人狀國家不利八月出師當更取十月轉運司遂散芻粟既而復為檄云得保塞軍偵候狀言賊且入塞當以時進兵芻粟即日取辦是時民輸挽者適散倉卒不可復集繼隆遂奏轉運司乏軍興太宗大怒立召中使一人付三函令乘驛騎取轉運使盧之翰竇玭及某人首丞相吕端樞密使柴禹錫皆不敢言惟樞密副使錢若水爭之請先推驗有狀然後行法上大怒拂衣起入禁中二府皆罷若水獨留廷中不去上既食久之使人偵視廷中有何報云有細瘦而長者尚立焉上出詰之曰爾以同州推官再期為樞密副使朕所以擢任爾者為賢爾乃不才如是耶尚留此安候對曰陛下不知臣無能使得待罪二府固當竭其愚慮不避死亡補益陛下以報厚恩李繼隆外戚貴重莫比今陛下據其一幅奏書誅三轉運使雖彼有罪天下何由知之鞫驗事狀明白乃加誅亦何晚焉獻可替否死以守之臣之常分臣未獲死故不敢退上意解乃召吕端等奏請如若水議先令責狀許之三人皆黜為行軍副使既而敵欲入塞事皆虛繼隆坐貶招討知秦州王居日云案李攸宋朝事實載此有互異字句而大略相同曹侍中將薨真宗親臨視之問以後事對曰臣無事可言固問之對曰臣二子璨與瑋才器可取皆堪為將上問其優劣對曰璨不如瑋已而果然瑋知秦州嘗出巡城以城上遮箭板太髙召主者令卑之主者對曰舊如此者久矣瑋怒曰舊固不可改也命牽出斬之僚佐以主者老將諳兵事罪小宜可赦皆諫瑋瑋不聽卒誅之軍中懾伏西蕃犯塞候騎報敵將至瑋方飲啖自若頃之報敵去城數里乃起貫戴以帛纒身令數人引之身停不動上馬出城望見敵陳有僧奔馬徑來于陳前檢校瑋問左右曰彼布陳乃用僧耶對曰不然此敵之貴人也瑋問軍中誰善射者衆言李超瑋即呼超指示之曰汝能取彼否對曰憑太保威靈願得五十騎裹送至敵陳前可以取之瑋以百騎與之勑曰不獲而返當死遂進至敵陳前騎左右開超射之一發而斃于是敵鳴笳而遁瑋以大軍征之敵衆大敗出塞窮追俘斬萬計改邊鑿濠西邊由是懾服至今不敢犯塞每言及瑋則加手于額呼之為父云全昭云瑋在秦州有士卒十餘叛赴敵中軍吏來告瑋方與客奕棋不應軍吏亟言之瑋怒叱之曰吾固遣之去汝再三顯言耶敵聞亟歸告其將盡殺之伯康云曹侍中彬為人仁愛多恕平數國未嘗妄斬人嘗知徐州有吏犯罪既立案逾年然後杖之人皆不曉其意彬曰吾聞此人新娶婦若杖之彼其舅姑必以婦為不利而惡之朝夕笞罵使不能自存吾故緩其事而法亦不赦也其用意如此張錫云楊徽之建州浦城人少好學善屬文有志節是時福建屬江南亦置進士科以延士大夫徽之恥之乃間道詣中朝應舉夜浮江津周世宗時及第為拾遺是時太祖已為時望所歸徽之上書言之及太祖即位將殺徽之太宗時為晉王力救之曰此周室忠臣也不可殺其後左遷為峨眉令十餘年不得調太宗即位始召之用為太子諭德侍講官至兵部侍郎贈僕射徽之性介特人罕能入其意者雖親子弟不肯奏以為官平生獨奏外孫宋綬族人自誠徽之疏族也徙居建昌自誠子偉仕至翰林學士從父弟儀今為祕閣校理黃希云光祿寺卿王濟刑部詳覆官屢上封事是時諸道置提舉茶鹽酒稅官朝廷因令訪察民間事吏之能否甚重其選會京西道缺太宗問左右刑部有好言者為誰左右以濟對上即以授之魏廷式為益州路轉運使入奏事太宗令以事先詣中書廷式曰臣乘傳來三千七百里之外所奏事固望陛下宸斷決之非為宰相來也奈何詣中書上悅即非時出見之賜錢五十萬遣還官兖王宫翊善姚坦好直諫王嘗作假山所費甚廣既成召官屬置酒共觀之衆皆褒歎其美坦獨俯首不視王強使視之坦曰坦見血山耳安得假山王驚問其故坦曰坦在田舍時見州縣督稅峻急里胥臨門捕人父子兄弟送縣鞭笞血流滿身此假山皆民租賦所出非血山而何太宗聞是言時亦為假山案此上二十一字原本脫去今參證王稱東都事略補入亟命毁之王每有過失坦未嘗不盡言規正宫中自王以下皆不喜左右乃教王詐稱疾不朝太宗日使醫視之逾月不瘳召王乳母入宫問王疾增損狀乳母曰王本無疾徒以翊善姚坦檢束起居不得自便王不樂故成疾耳上怒曰吾選端士為王僚屬者固欲輔佐王為善耳今王不能用規諫而又詐疾欲使朕逐去正人以自便何可得也且王年少未知出此必爾輩為之謀耳因命杖之數十召坦慰諭曰卿居王宫為羣小所嫉大為不易卿但能如此毋患讒言朕必不聽田錫好直諫太祖或時不能堪錫從容奏曰陛下日往月來養成聖性上悅亦重之右出聖政録王禹稱字元之濟州人少善屬文舉進士及第為大理評事知長洲縣太宗聞其名召為右正言直史館才周歲遂知制誥禹稱性剛狷數忤權貴宦官尤惡之上纍命執政召至中書戒諭之禹稱終不能戒禹稱為翰林學士上優待之同列莫與比上嘗曰當今文章惟王禹稱獨步耳王禹稱子嘉言為館職平時若愚騃獨寇萊公知之喜與之語萊公知開封府一旦問嘉言曰外人謂劣丈云何嘉言曰外人皆云丈人旦夕入相萊公曰于吾子意何如嘉言曰以愚觀之丈人不若未相為善相則譽望損矣萊公曰何故嘉言曰自古賢相所以能建功業澤生民者其君臣相得皆如魚之有水故言聽計從而功名俱美今丈人負天下重望相則中外有太平之責焉而丈人之于明主能若魚之有水乎此嘉言所以恐譽望之損也萊公喜起執其手曰元之雖文章冠天下至于深識逺慮則不能勝吾子也始平公云保安軍奏獲李繼遷母太宗甚喜是時寇準為樞密院使吕端為宰相上獨召準與之謀退自宰相幕次前過不入端使人邀之曰嚮者主上召君何為準曰議邊事耳端曰陛下戒君勿言于端乎準曰不然端曰若邊鄙常事樞密院之職端不必預知若軍國大計端備位宰相不可以莫之知也準以獲繼遷母告端曰君何以處之準曰準欲斬于保安軍北門之外端曰陛下以為何如準曰陛下以為然令準之樞密院行文書耳端曰必若此非計之得者也願君少緩其事文書勿亟下端將入覆奏之即召閣門吏役奏宰相臣呂端請對上召入之端見具道準言且曰昔項羽得太公欲烹之漢髙祖曰願遺我一杯羮夫舉大事者固不顧其親況繼遷本悖逆之人哉且陛下今日殺繼遷之母繼遷可擒乎若不然徒樹怨讎而堅其叛心也上曰然則奈何端曰以臣之愚請直置于延州使善養視之以招徠繼遷雖不能即降終可以繫其心而母生死之命在我矣上撫髀稱善曰微卿幾誤我事即用端䇿其母後病死于延州繼遷尋亦死其子德明竟納降請命張宗益云魏王德昭太祖之長子從太宗征幽州軍中夜驚不知上所在衆議有謀立王者會知上處乃止上微聞銜之不言時上以北征不利久不行河東之賞議者皆以為不可王乘間入言之上大怒曰待汝自為之未晚也王惶恐還宫謂左右曰帶刀乎左右辭以禁中不敢帶王因入茶果閣門推户取割果刀自刎上聞之驚悔往抱其尸大哭曰癡兒何至此耶王宜父云蘇王元偓太祖遺腹子太宗子養之楊樂道云太宗時寇準為員外忤上旨拂衣起欲入禁中準手引上衣令復坐決其事然後退上由是嘉之太宗器重準嘗曰朕得寇準猶唐文皇之得魏鄭公也準以虞部員外郎言事召對稱旨太宗謂宰相曰朕欲擢用寇準當授以何官宰相請用為開封推官上怒曰此官豈所以待準者宰相請用為樞密直學士上沈思良久曰且使為此官則可也陸子云李穆字孟雍陽武人幼沈謹溫厚好學聞酸棗王昭素先生善易往師之昭素喜其開敏謂人曰觀李生才能氣度他日必為卿相昭素先時著易論三十三篇祕不傳人至是盡以授穆穆由是知名舉進士翰林學士徐台符知貢舉擢之上第除鄂州軍事判官遷汝州防禦判官周世宗即位求文學之士或薦穆擢拜左拾遺太祖登極洊殿中侍御史屢奉使偽國平蜀之初通判洋州又通判陜州坐有罪復免一官久之召為中允尋以左拾遺知制誥太宗即位屢遷至中書舍人宰相盧多遜得罪穆坐與之同年登進士第降授司封貟外郎上惜其才尋命之考校貢院及御試進士上見其顏色憔悴憐之復以為中書舍人職任皆如故尋命知開封事有能名遂擢參知政事穆性至孝母病纍年惡暑而畏風穆身自扶持起居能適其志或通夕不寐未嘗有倦惰之色母卒哀毁過人朝命起復固辭不得已視事然終不飲酒食肉未終喪而卒年五十七上甚惜之謂宰相曰李穆國之良臣奄爾淪沒非穆之不幸乃國之不幸也穆贈工部尚書出穆行狀錢氏在兩浙置知機務如知樞密院通儒院學士如翰林學士唐子方云周仁冀事錢俶首建歸朝之策吳越丞相沈虎子者錢氏骨鯁臣也俶為朝廷攻拔常州虎子諫曰江南國之藩蔽今大王自撤其藩蔽將何以衛社稷乎俶出虎子為刺史以仁冀代為丞相仁冀説俶曰主上英武所向無敵今天下事勢已可知保族全民䇿之上者也俶深然之太祖時自明州海道入朝太祖禮而遣之太平興國三年仁冀復隨俶入朝盧多遜説上留之勿遣俶朝禮畢數日欲去不獲命又不敢辭君臣恐懼莫知所為仁冀曰今朝廷意可知大王不速納土禍將至矣俶左右固爭以為不可仁冀厲聲曰今已在人掌握中去國千里雖有羽翼不能飛出耳遂定速納兩浙地圖請效土為內臣上一再辭讓遂受之改封俶淮海國王俶子惟濬淮南軍節度使兼侍中以仁冀為副俶辭又更除鄧州案宋史錢俶傳端拱元年春徙封鄧王以仁冀為鴻臚卿案宋史錢俶傳太平興國三年三月來朝賔佐崔仁冀等賜金銀帶器幣鞍馬有差將校孫承祐沈承禮並為節度使不别著周仁冀姓名疑即崔仁冀而傳寫互異卒之不遷官蓋太宗心亦薄之也子方云孫何丁謂舉進士第未有名翰林學士王禹稱見其文大賞之贈詩云三百年來文不振直從韓栁到孫丁如今便好合修史二子文章似六經二人由此詩名大振盧多遜父有髙識深惡多遜所為聞其與趙中令為仇曰彼元勳也而小子毁之禍必及我得早死不及見其敗幸也竟以憂卒未幾多遜敗富公云韓王將營西宅遣人于秦隴市良材以萬數盧多遜隂以白上曰普身為元宰乃與商賈競利及宅成韓王時為西京留守已病矣詔詣闕將行乘小車一遊第中遂如京師捐于館不復再來矣張藏英燕人父為人所殺藏英尚幼稍長擒讎人生臠割以祭其父然後食其心肝鄉人謂之報讎張孝子契丹用為蘆臺軍使逃歸中國從世宗征契丹藏英請不用兵先往説下瓦橋關乃單騎往城下呼曰汝識我乎我張蘆臺也因陳世宗威德曰汝非敵也不下且見屠藏英素為燕人所信重契丹遂自北門遁去城人開門請降張文裕云洓水記聞卷二
