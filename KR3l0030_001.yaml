body:
  text: 涑水記聞卷一宋司馬光撰建隆元年正月辛丑朔鎮定奏契丹與北漢合勢南侵太祖時為歸徳軍節度使殿前都㸃檢受周恭帝詔將宿衛諸軍禦之癸夘發師宿陳橋將士隂相與謀曰主上幼弱未能親政今我輩出死力為國家破賊誰則知之不若先立㸃檢為天子然後北征未晩也甲辰將士皆擐甲執兵仗集於驛門讙譟突入驛中太祖尚未起太宗時為内殿祗候供奉官都知入白太祖太祖驚起出視之諸將露刃羅立于庭曰諸軍無主願奉太尉為天子太祖未及答或以黄袍加太祖之身衆皆拜于庭下大呼稱萬歳聲聞數里太祖固拒之衆不聼扶太祖上馬擁逼南行太祖度不能免乃繫轡駐馬謂將士曰汝輩自貪富貴强立我為天子能從我命則可不然我不能為若主也衆皆下馬聴命太祖曰主上及太后我平日北面事之公卿大臣皆我比肩之人也汝曹今日毋得輒加不逞近世帝王初舉兵入京城皆縱兵大掠謂之夯市汝曹今毋得夯市及犯府庫事定之日當厚賚汝不然當誅汝如此可乎衆皆曰諾乃整飭隊伍而行入自仁和門市里皆安堵無所驚擾不終日而帝業成焉明道二年先公為利州路轉運使光侍食于蜀道驛中先公為先言太祖不夯市事且曰國家所以能混一海内福祚延長内外無患由太祖以仁義得之故也天平軍節度使同平章事侍衛親軍馬步軍副都指揮使韓通為京城巡檢案宋史韓通傳作京城内外都巡檢剛愎無謀時人謂之韓瞠眼其子少病傴號韓槖駝頗有智略以太祖得人望嘗勸通為不利通不以為意及太祖勒兵入城通方在内閤聞變遑遽奔歸軍士王彦昇遇之于路躍馬逐之及于其第第門不及掩遂殺之并其妻子太祖以彦昇專殺甚怒欲斬之以受命之初故不忍然終身廢之不用太祖即位贈通中書令以禮葬之自韓氏之外不戮一人而得天下周恭帝之世有右拾遺直史館鄭起上宰相范質書言太祖得衆心不宜使典禁兵質不聴及太祖入城諸將奉登明徳門太祖命將士皆釋甲還營太祖亦歸公署釋黄袍俄而將士擁質及宰相王溥魏仁溥等皆至太祖嗚咽流涕曰吾受世宗厚恩今為六軍所逼一旦至此慙負天地將若之何質等未及對軍校羅彦環按劍厲聲曰我輩無主今日必得天子太祖叱之不退質頗誚讓太祖且不肯拜王溥先拜質不得已從之且稱萬歳請詣崇元殿召百官就列周帝内出制書禪位太祖就龍墀北面再拜命宰相扶太祖登殿易服于東序還即帝位羣臣朝賀及太祖即位先命溥致仕盖薄其為人也嘗稱質之賢曰惜也但欠世宗一死耳鄭毅夫云太祖將受禪未有禪文翰林學士承旨陶穀在旁出諸懐中進之而曰已成矣太祖由是薄其為人周恭帝幼沖軍政多決于韓通通愚愎太祖英武有度量多智略屢立戰功由是將士皆愛服歸心焉及將北征京師間諠言出軍之日當立㸃檢為天子富室或挈家逃匿于外州獨宫中不之知太祖懼宻以吿家人曰外間洶洶若此將如之何太祖姊或云即魏氏長公主面如鐵色方在厨引麫杖逐太祖擊之曰丈夫臨大事可否當自決胷懐乃來家間恐怖婦女何為耶太祖黙然而出王衍粹云太祖之自陳橋還也太夫人杜氏夫人王氏方設齋于定力院聞變王夫人懼杜太夫人曰吾兒平生竒異人皆言當極貴何憂也言笑自若太祖即位是月契丹北漢皆自還太祖初即位亟出㣲行或諫曰陛下得天下人心未安今數輕出萬一有不虞之變其可悔乎上笑曰帝王之興自有天命求之亦不能得拒之亦不能止萬一有不虞之變其可免乎周世宗見諸將方面大耳者皆殺之然我終日侍側不能害我若應為天下主誰能圖之不應為天下主雖閉户深居何益也由是微行愈數曰有天命者任自為之我不汝禁也于是衆心俱服中外大安詩稱武王之徳曰上帝臨女無貳爾心又曰無貳無虞上帝臨女漢髙祖罵醫曰命乃在天雖扁鵲何益乃知聰明之主生知之性如合符矣此亦得之先公云太祖嘗見小黄門有損畫壁者怒曰豎子可斬也此乃天子廨舍汝豈得敗之耶始平公云太祖將親征軍校有獻手撾者上曰此何以異于常撾而獻之軍校宻言曰陛下試引撾首視之撾首即劍柄也有刃韜于中平居可以為杖緩急以備不虞上笑投之于地曰使我親用此物事將何如當是時此物固足恃乎魏舜卿云太祖嘗罷朝坐便殿不樂者久之内侍行首王繼恩請其故上曰爾謂天子為容易耶早來吾乗快指揮一事而誤故不樂耳孔子稱如知為君之難也不㡬乎一言而興邦乎太祖有焉太祖平蜀孟昶宫中物有寶装溺器遽命碎之曰自奉如此欲求無亡得乎見諸侯大臣侈靡之物皆遣焚之太祖初即位頗好畋獵墜馬怒自㧞佩刀刺馬殺之既而嘆曰我耽逸樂乗危走險自取顛困馬何罪焉自是遂不復獵開寶元年羣臣請上太祖尊號曰應天廣運一統太平聖神文武明道至徳仁孝皇帝上曰幽燕未定何謂一統遂郤其奏太祖嘗謂左右曰朕每因宴㑹乗歡至醉經宿未嘗不自悔也太祖親征澤潞中書舍人趙逢憚涉山險稱墜馬傷足止于澤州及師還當草制復稱疾上怒謂宰相曰逢人臣乃敢如此遂貶房州司户太祖遣曹彬伐江南臨行謂之曰克之還必以使相為賞彬平江南而還上曰今方隅未平者尚多汝為使相品位極矣豈肯復力戰耶且徐之更為我取太原因宻賜錢五十萬彬怏怏而退至家見布錢滿室乃歎曰好官亦不過多得錢耳何必使相也太祖重惜爵位不肯妄與人如此孔子稱惟器與名不可以假人君之所司也太祖嘗彈雀于後園有羣臣稱有急事請見太祖亟見之其所奏乃常事耳上怒詰其故對曰臣以尚急于彈雀上愈怒舉柱斧柄撞其口墮兩齒其人徐俯拾齒置懐中上罵曰汝懐齒欲訟我耶對曰臣不能訟陛下自當有史官書之上恱賜金帛慰勞之太祖幸西京將徙都羣臣不欲留時節度使李懐忠乗間諫曰東京有汴渠之漕坐致江南之粟四五千萬以贍百萬之軍陛下居此將安取之軍府重兵皆在東京陛下誰與此處乎上乃還右皆出石介三朝聖政録潞州節度使李筠謀反其長子涕泣切諫不聴使其長子入朝且詢朝廷動静太祖迎謂曰太子汝何故來其子以頭擊地曰此何言必有讒人搆臣父耳上曰吾亦聞汝數諫諍老賊不汝聴耳汝父使汝來者不復顧惜使吾殺之耳吾今殺汝何為汝歸語汝父我未為天子時任自為之我既為天子汝獨不能少讓之耶其子歸具以白筠筠欲謀反有僧素為人所信嚮筠乃召見宻謂之曰吾軍府用不足欲借師之名以足之吾為師作維那教化錢糧各三十萬且寄我倉庫事畢之日中分之僧許諾乃令僧積薪坐其上剋日自焚筠為穿地道于其下令通府中曰至日走歸府中耳筠乃與夫人先往傾家財盡施之于是逺近争以錢糧饋之四方輻輳倉庫不能容旬日六十萬俱足筠乃塞地道焚僧殺之盡取其錢糧遂反引軍出澤州車駕自往征之山路險狹多石不可行上自於馬上抱數石羣臣六軍皆負石即日開成大道筠戰敗于境上走入澤州圍而克之斬筠案宋史李筠傳及𡊮文甕牗閒評並作赴火死遂屠澤州進至潞州其子開城降遂赦之閻士良云太祖初登極時杜太后尚康寧嘗與上議軍國事猶呼趙普為書記嘗撫勞之曰趙書記且為盡心吾兒未更事也太祖寵待趙韓王如左右手御史中丞雷徳驤劾奏趙普擅市人第宅聚斂財賄上怒叱曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎命左右曳于庭數匝徐使復冠召升殿曰今後不宜爾且赦汝勿令外人知也昭憲太后聰明有智度嘗與太祖參決大政及疾篤太祖侍藥餌不離左右太后曰汝自知所以得天下乎太祖曰此皆祖考與太后之餘慶也太后笑曰不然正由柴氏使幼兒主天下耳因戒敕太祖曰汝萬歳後當次傳之二弟則并汝之子亦獲安矣太祖頓首泣曰敢不如母教太后因詔趙普于榻前約為誓書普于紙尾自署名云臣普書蔵之金匱命謹宻宫人掌之太宗即位趙普為盧多遜所譖出為河陽日夕憂不測上一日發金匱得書大悟遂遣使急召之普惶恐為遺書與家人别而後行既至復為相趙普嘗欲除某人官不合太祖意不用明日普復奏之又不用明日又奏之太祖怒取其奏壊裂投地普顔色自若徐拾奏歸補綴明日復進之上乃悟用之其後果稱職得其力太祖時嘗有羣臣立功當遷官上素嫌其人不與趙普堅以為請上怒曰朕固不為遷官將若何普曰刑以懲惡賞以酬功古今之通道也刑與賞者天下之刑賞非陛下之刑賞也豈得以喜怒專之上怒甚起普亦隨之上入宫普立宫門久之不去上悟乃可其奏右皆趙興宗云太祖既得天下誅李筠李重進召普問曰天下自唐季以來數十年間帝王凡易十姓兵革不息蒼生塗地其故何也吾欲息天下之兵為國家建長久之計其道何如普曰陛下之言及此天地神人之福也唐季以來戰鬭不息國家不安者其故非他節鎮太重君弱臣强而已矣今所以治之無他竒巧也惟稍奪其權制其錢穀收其精兵天下自安矣語未畢上曰卿勿復言吾巳喻矣頃之上因晩朝與故人石守信王審琦等飲酒酒酣上屏左右謂曰我非爾曹之力不得至此念爾之徳無有窮已然為天子亦大艱難殊不若為郡節度使之樂吾今終夕未嘗敢安寢而臥也守信等皆曰何故上曰是不難知居此位者誰不欲為之守信等皆頓首曰陛下何為出此言今天命已定誰敢復有異心上曰然汝曹無心其如汝麾下之人欲富貴者何一旦以黄袍加汝之身汝雖欲不為不可得也皆頓首涕泣曰臣等愚不及此惟陛下哀憐指示以可生之途上曰人生如白駒之過隙所以好富貴者不過多積金銀厚自娱樂使子孫無貧乏耳汝曹何不釋去兵權擇便好田宅市之為子孫立永久之業多置歌兒舞女日飲酒相歡以終其天年君臣之間兩無猜嫌上下相安不亦善乎皆再拜謝曰陛下念臣及此所謂生死而肉骨也明日皆稱疾請解軍權上許之皆以散官就第所以慰撫賜賚之者甚厚與結婚姻更度易制使主親軍其後又置轉運使通判主諸道錢穀收𨕖天下精兵以備宿衛而諸功臣亦以善終子孫富貴迄今不絶向非趙韓王謀慮深長太祖果斷天下何以治平至今斑白之老不覩干戈聖賢之見何其逺哉普為人隂刻當時以睚眦中傷人甚多然其子孫至今享福國初大臣鮮能及者得非安天下之謀其功大耶始平公云太祖既納韓王之謀數遣使者分詣諸道𨕖擇精兵凡其才力技藝有過人者皆收補禁軍聚之京師以備宿衛厚其賜糧居常躬自按閲訓練皆一以當百諸鎮皆自知兵力精鋭非京師之敵莫敢有異心者由我太祖能强幹弱枝制治于未亂故也始平公云太祖征河東圍太原久之不拔宿衛之士皆奮自吿曰蕞爾小城而久不拔者士不致力故也臣等請自往力攻必取之固止之曰吾蒐簡訓練汝曹比至于成心力盡矣汝曹悉皆天下精兵之髓實吾之股肱爪牙吾寧不取太原豈可糜滅汝曹于此城之下哉遂引兵而還軍士聞之無不感激往往有出涕者初梁太祖因宣武府署修之為建昌宫晉改命曰大寧宫周世宗後加營繕猶未盡如王者之制太祖始命改營之一如洛陽宫之制既成太祖坐正殿令洞開諸門直望之謂左右曰此如我心小有邪曲人皆見之太祖征李筠河東遣其宰相衛融將兵助筠融兵敗生獲之上面責其助亂因謂朕今赦汝汝能為我用乎對曰臣家四十口皆受劉氏温衣飽食何忍負之陛下雖不殺臣臣終不為陛下用得間則走河東耳上怒命以鐵撾撾其首曳出融曰人誰不死死君事臣之福也上曰忠臣也召之于御座前傅以良藥賜襲衣金帶及鞌勒拜太府卿王師平江南徐鉉從李煜入太祖責之以其不早勸李煜降也鉉曰臣在江南備位大臣國亡不能止罪當死尚何所言上悦撫之曰卿誠忠臣事我當如事李氏也太祖聞國子監集諸生講書甚喜遣使賜之酒果曰今之武臣亦當使其讀經書欲其知為治之道也太祖聰明豁達知人善任使擢用英俊不問資級察内外官有一材一行可取者宻為記籍之每一官缺則披籍選用焉是以下無遺材人思自效右皆出三朝訓鑒圖太祖㣲時與董遵誨有隙及即位召而用之使守通逺軍通逺軍今環州是也其母因亂沒邊外上因契丹厚以金帛贖而與之遵誨涕泣憾無死所黨項羌掠回鶻貢物遵誨寄聲誚讓之羌懼即遣使謝歸其所掠太祖使郭進守西土每遣戍卒上輙戒曰有罪我尚能赦汝郭進殺汝矣不可犯也有部下軍校吿其謀反者上詰問其故軍校辭窮服曰進御下嚴臣不勝忿怨故誣之耳上命執以與進命自誅之進釋不問使禦河東寇曰汝有功則我奏遷汝官敗則降河東勿復來也軍校往死戰果立功而還張永徳周祖之壻也為鄧州節度使有軍士吿其謀反太祖械送之永徳笞之十下而已右皆始平公云張美為滄州節度使民有上書吿美强取其女為妾及受取民財四千緡太祖召上書者諭之曰汝滄州昔張美未來時民間安否對曰不安曰既來則何如對曰既來則無復兵寇帝曰然則張美全活滄州百姓之命其賜大矣雖娶汝女汝安得怨今汝欲貶此人殺此人吾何愛焉但愛汝滄州之人耳吾今戒勑美美宜不復敢汝女值錢㡬何對曰值錢五百緡帝即命官給美所取民錢并其女直而遣之乃召美母吿以美所為母叩頭謝罪曰妾在闕下不知也乃賜其母錢萬緡令遺美曰語汝兒汝欲錢當從我求無為取于民也善遇民女歳時贈遺其家數慰撫之美惶恐折節為廉謹頃之以政績聞美在滄州十年故世謂之滄州張氏龐安道云周渭連州人湖南與廣南戰渭為廣南所虜其妻莫氏并二子留在家渭在廣南有官禄矣太祖平廣南得渭喜以為平廣南得一人耳後以為侍御史廣南轉運渭久已改娶使人訪其故妻先與之别二十七年矣妻固不嫁育二子皆長渭欲復迎之妻曰君既有室我不可復往且吾有婦孫居此久不可去渭為具奏詔特爵為縣君并其二子渭皆為奏官張公錫云周渭為白馬縣主簿大吏有罪渭輒治之太祖竒其材擢為贊善大夫後通判興州事有外寨軍校縱其士卒暴犯居民渭往責而斬之衆莫敢動上聞益壯之詔褒稱焉出聖政録王明為鄢陵縣令公廉愛民是時天下新定法禁尚寛吏多受民賂遺歳時皆有常數民亦習之不知其非明為鄢陵令民以故事有所獻饋明曰令不用錢可人致數束薪芻水際令欲得之民不喻其意數日積薪芻至數十萬明取以築堤道明年無水患太祖聞之即擢明知廣州君倚曰太祖初晏駕時已四鼔孝章宋后使内侍都知王繼隆召秦王徳芳繼隆以太祖傳位晉王之志素定乃不召徳芳而以親事一人徑趨開封府召晉王見醫官賈徳𤣥坐于府門問其故徳𤣥曰去夜二鼓有呼我門者曰晉王召出視則無人如是者三吾恐晉王有疾故來繼隆異之乃吿以故叩門與之俱入見王且召之王大驚猶豫不敢行曰吾當與家人議之入久不出繼隆趣之曰事久將為他人有遂與王雪中步行至宫門呼而入繼隆使王且止其直廬曰王且待于此繼隆當先入言之徳𤣥曰便應直前何待之有遂與俱進至寢殿宋后聞繼隆至問曰徳芳來耶繼隆曰晉王至矣后見王愕然遽呼官家曰吾母子之命皆託官家王泣曰共保富貴無憂也徳𤣥後為班行性貪故官不甚達然太宗亦優容之太祖時宫人不滿三百人猶以為多因久雨不止故又出其數十人太祖嘗曰貴家子弟惟知飲酒彈琵琶耳安知民間疾苦由是詔凡以資䕃出身者皆先使之監當場務未得親民太祖嘗謂秦王侍講曰帝王之子當務讀經書知治亂之大體不必學做文章無所用也太祖性節儉寢殿設布緣幃簾常出麻屨布衫以示左右曰此吾故時所服也右出聖政録太祖欲使符彦卿典兵趙韓王屢諫以為彦卿名位已盛不可復委以兵柄上不聴宣敕已出韓王復懐之請見上迎謂之曰豈非以符彦卿事耶對曰非也因别奏事罷乃出彦卿宣進之上曰果然宣何以復在卿所韓王曰臣託以處分之語未備復留之惟陛下深思利害勿為後患上曰卿苦疑彦卿何也朕待彦卿至厚彦卿豈能負朕也韓王曰陛下何以負周世宗上黙然遂中止藍元震云太祖事世宗于檀州曹彬為世宗親掌茶酒太祖嘗從之求曰此官酒不敢相與自沽酒以飲太祖太祖即位常話及世宗舊吏曰不敢負其主者獨曹彬耳由是委以腹心使監征蜀之軍堯夫云太祖時宋白知舉疑為陶穀多受金銀取舍不公恐榜出羣議沸騰乃先具姓名以自上欲託上㫖以自重上怒曰吾委汝知舉取舍汝當自決何為白我我安能知其可否若榜出别致人言當斫汝頭以謝衆白大懼而悉改其榜使協公議而出之涑水記聞卷一
