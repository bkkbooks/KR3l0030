body:
  text: 涑水記聞卷十五宋司馬光撰元豐三年開封府界提㸃陳向建議令民資及三千緡者養戰馬一匹民甚苦之薛師正時為樞密副使初無異議及事已施行向詣樞密院白事師正欲厭衆議折難甚苦向怒以告諫官舒亶劾奏師正為大臣事有不可不面陳而背誹以盜名由是罷正議大夫知潁州諫官又言其罷黜之後不杜門省咎而賓客集其門日以百數對客有怨憤語改知隨州翰林學士御史中丞李定坐不糾彈落職知河陽富公為人溫良寬厚泛與人語若無所異同者及其臨大節正色慷慨莫之能屈智識深逺過人逺甚而事無巨細皆反覆熟慮必萬全無失然後行之宰相自唐以來謂之禮絶百僚見者無長幼皆拜宰相平立少垂手扶之送客未嘗下階坐稍久則吏從旁唱宰相尊重客踧踖起退及公為相雖微官及布衣謁見皆與之抗禮引坐語從容送之及門視其上馬乃還自是羣公稍稍效之自公始也自致仕歸西都十餘年常深居不出晚年賔客請見者亦多謝以疾所親問其故公曰凡待人無貴賤賢愚禮貌當如一吾纍世居洛親舊蓋以千百數若有見有不見是非均一之道若人人見之吾衰疾不能堪也士大夫亦知其心無怨也嘗欲往老子祠乘小轎過天津橋㑹府中徙市于橋側市人喜公之出隨觀之于是安上門市為之空其得民心也如此及違世士大夫無逺近識與不識相見則以言不相見則以書更相弔唁往往垂泣其得士大夫心也又如此嗚乎茍非事君盡忠愛民盡仁推惻怛至誠之心充于內而見于外能如是乎初選人李公義陳言請為鐵龍爪以濬河其法用鐵數斤為龍爪形沈之水底繫絙以船曳之而行宫官黃懷信以為鐵爪只列于木下如耙狀以石壓之兩旁繫大絙兩端釘大船相距八十步各用革車絞之去來撓蕩泥沙已又移船而濬之事下大名安撫司安撫司命金提司管勾官范子淵與通判知縣共試驗之皆言不可用㑹子淵官滿入京師王介甫問子淵濬川鐵耙龍爪法甚善何故不可用子淵因變言此誠善法但當時同官議不合耳介甫大喜即除子淵都水外監丞置濬川司使行其法聽其指使二十人給公使庫錢子淵乃于河上令指使分督役卒用二物疏濬各置厯書其課曰某日以掃疏若干步深若干尺其實水深則耙不能及底虛曳去來水淺則齒礙泥沙曳之不動卒乃反齒向上而曳之所書之課皆妄撰不可考驗也㑹都水監丞程昉建議于大名河曲開直河既成子淵屬昉稱直河淺牒濬川司使用耙濬之庶幾附以為功昉從之既而奏上狀昉子淵及督役指使各遷一官先是大名河每歲夏水漲則自許家港溢出及秋水落還復故道皆在大堤之內熙寧八年子淵復求功乃令指使諷諸掃申大名府云今歲七分入許家港三分行故道恐河勢遂移乞牒濬川司耙疏濬故道府司從之是歲旱港水所浸田不過萬頃子淵用耙不及一月而罷九年子淵上言去歲大河幾移賴濬川耙得復故道出民田數萬頃其督役官吏更乞酬奬事下都水監司保奏稱子淵等有竒功乞加優賞是時天下皆言濬川鐵耙龍爪如兒戲適足以資談笑王介甫亦頗聞之故不信都水監之言更下河北轉運安撫司令保奏㑹介甫罷相文潞公上言河水浩大非耙可濬秋涸故其常理雖河濱甚愚之人皆知濬川耙無益于事臣不敢雷同保奏共為欺罔奏上上不悅命知制誥熊本與都水轉運司按視濬川利害本乃與都水監主簿陳祐甫河北轉運司陳知儉共按問諸掃人言八年故河道水減三尺耙未至間已增二尺耙至又增二尺又從以前十年水皆夏溢秋復不惟此一年乃奏水落實非耙所致子淵在京師先聞之遽上殿言熊本陳知儉陳祐甫意謂王安石出文彥博必將入相附㑹其意以濬川耙為不便臣聞本奉使按事乃詣彥博納拜從彥博飲食祐甫知儉皆預焉及屏人私語今所奏必不公且觀彥博之意非止言濬川耙而已陛下一聽其言天下言新法不便者必蜂起陛下所立之法大壞矣上以為然于是知雜御史蔡確上言熊本奉使不謹議論不公乞更委官詳定濬川是非十年詔命確與知檢院黃履詳定有是非者取勘聞奏確于是置獄逮繫證佐二百餘人獄踰半年不決上又命內供奉官馮宗道試濬川耙于汴水宗道辭以疾上令俟宗道疾愈必往試之宗道乃請與子淵偕往每料測量有深于舊者有不增不減者大率三分各居其一宗道每日據實奏聞上意稍悟治獄微緩㑹滎澤河堤漲急詔判都水監俞充往治之河危將決賴用濬川耙疏導得免具圖以聞上嘉之于是治獄益急時郊赦將近詔濬川事不以赦原獄具子淵坐上言詐不實熊本陳祐甫坐附㑹違制陳知儉坐報制院不實元豐元年正月辛未敕熊本落知制誥奪一官以屯田員外郎分司范子淵陳祐甫奪二官職任如故陳知儉奪一官充替知儉云前判都水監李立之云介甫前作相嘗召立之問曰有建議欲決白馬河隄以淤東方之田者何如立之不敢直言其不可對曰此䇿雖善但恐河決所傷至多昔天聖初河決白馬東南泛濫十餘州與淮水相通徐州城上垂手可掬水且橫貫韋城斷北使往還之路無乃不可介甫沈吟良久曰聽使一淤何傷但恐妨北使怒耳乃止集賢校理劉貢父好滑稽嘗造介甫值一客在座獻䇿曰梁山泊決而涸之可得良田萬餘頃但未擇得便利之地貯其水耳介甫傾首沈思曰然安得處所貯許水乎貢父抗聲曰此甚不難介甫欣然以為有䇿遽問之貢父曰别穿一梁山泊則足以貯此水矣介甫大笑遂止介甫秉政鳳翔人獻䇿陜西南有澗水西流入河若疏導使深又鑿陜右山使通穀水因道大河東流入穀水自穀入洛至鞏復㑹于河以通漕運可以免砥柱之險介甫以為然敕下京西陜西轉運司差官相度京西差河南府户曹王泰王泰欲言不便則恐忤朝廷獲罪欲言便則恐為人笑乃申牒言今至穀水上流相度若疏引大河水得至澠縣境入穀水委實便利可行蓋出澠縣境則陜右大山屬陜西路故也陜西言不可行乃止祖宗以來汴口每歲隨河勢向背改易不常其處于春首發數州夫治之應舜臣上言汴口得便利處可歲歲常用何必屢易公私勞費蓋汴口官吏欲歲興夫役以為己利耳今訾家口在孤柏嶺下最當河流之衝水必不至乏絶自今請常用之勿復更易或水小則為輔渠于下流以益之大則置斗門以泄之介甫善其議而從之擢舜臣權三司判官後歲介甫出知江寧㑹汴水大漲京師憂懼朝廷命判都水監少卿宋昌言往視之昌言白政府請塞訾家口獨留輔渠韓子華吕吉甫皆許之時監丞侯叔獻適在外不預議昌言至汴口牒問提舉汴口官王珫等二口水勢珫等報訾家口水三分輔渠水七分昌言遂奏塞訾家口朝廷從之叔獻素與昌言不協及介甫再入相叔獻譖昌言附㑹韓吕塞訾家口故變易相公在政府所行事介甫怒昌言懼求出得知陜州㑹熙寧八年夏河背新口汴水絶叔獻屢上言由昌言塞訾家口所致朝廷命叔獻開之既通流于是昌言及王珫各降一官昌言乃徙都判監李立之仍出知陜以叔獻代之立之未離京師河背訾家口汴水復絶一如前日朝廷更命叔獻開之亦不罪叔獻也立之云元豐元年春塞汴河詔發民夫五十萬役兵二十萬云欲鑿故道以導河北行不行則決河北岸王莽河口任其所至恐其浸淫南及京城故也天章閣待制韓縝都水監丞劉璯河北運判汪輔之掌之邦彥云舊制河南河北曹濮以西秦鳳以東皆食解鹽益梓利䕫四路皆食井鹽河東食土鹽其餘皆食海鹽自仁宗時解鹽通商官不復𣙜熙寧中市易司始𣙜開封曹濮等州及利益二路官自運解鹽賣之其益利井鹽俟官無解鹽即聽自賣九年有殿中丞張景溫建議請𣙜河中等五州官自賣鹽增重其價民不肯買乃課民日買官鹽隨其貧富作業為多少之差有買賣私鹽聽人告訐重給賞錢以犯人家財充賞官鹽食之不盡留經宿者同私鹽法于是民間騷怨鹽折鈔舊法每席六緡至是才直二緡有餘商人不入粟邊儲失備朝廷疑之乃召陜西東路轉運使皮公弼入議其事公弼極陳其不便有旨令于三司議之三司使沈括以向附介甫意言景溫法可行今不可改盡言其非而更為别劄稱據景溫申官賣鹽歲獲利二十餘萬緡今通商則失此利再取旨上復令與公弼議之公弼條陳實無此利于是罷開封河中等州益州等路賣鹽獨曹濮等數州行景溫之法公弼云吳仲卿蔡中正等為樞密副使上言請廢河南北監牧司文潞公為樞密使以為不可元厚之為翰林學士與曽孝寬受詔詳定厚之計其吏兵之祿及牧田可耕種所以奏稱兩監歲費五十六萬緡所息之馬用三萬緡可買詔書廢天下馬監止留沙苑一監選其馬可充軍馬用者悉令送沙苑監其次給傳置其次斥賣之牧田聽民租佃仍令轉運司輸每歲所有五十三萬緡于市易務馬既給諸軍則常給芻粟及縑帛糧餉所省費甚廣諸監馬送沙苑者止四千餘匹在道羸死者殆半國馬盡于此矣時熙寧八年冬也馬士宣云熙寧初余罷中丞復歸翰林有成都進士李戒投書見訪云戒少學聖人之道自謂不在顔回孟軻之下其詞孟浪髙自稱譽大率如此又獻役法大要以為民苦重稅但聞有因役破産者不聞因稅破産也請增天下田稅錢穀各十分之一募人充役仍命役重輕分為二等上等月給錢千五百穀二斛中下等以是為差計雇役猶有羡餘可助經費明公倘為言之于朝幸而施行公私不日皆富貴矣余試舉一事難之曰衙前有何等戒曰上等余曰今夫衙前掌官物販夫者或破萬金之産彼肯顧千五百錢兩斛之穀來應募耶戒不能對余因謝遣之曰僕已去言職君宜詣當官獻之居無何復來投書曰三皇不聖五帝不聖自生民以來惟孔子為聖人耳孔子沒孟軻以降蓋不足言今日復有明公可繼孔子者也余駭懼遽還其書曰足下何得為此語固請留書余曰若留君書是當此而有之也死必不敢又欲投余左右余叱左右使勿接乃退余以其狂妄常語于同列以資戲笑時韓子華知成都戒亦嘗以此䇿獻之子華大以為然及入為三司使欲奏行之余與同列共笑且難子華意沮乃止及介甫為相同置制三司條例司為介甫言之介甫亦以為然雇役之議自此起時李戒已得心疾罷舉歸成都矣自見介甫之再入相也張諤建言往者衙前經厯重難皆得場務酬奬享利過厚其人見存者請依新法據分數應給錢緡外餘利追理入官謂之打抹專委諸州長吏檢括如有不盡以違制罪之不以赦降出官原免于是諸州競為刻剝或數十年前嘗經酬奬今已解役家資貧破所應輸錢有及二三千緡者往往不能償而自殺介甫申明按問欲舉之法曰雖經拷掠終是本人自道皆應減二等由是劫賊盜無死者劉鳴玉云先朝以來䕫州路減省賦上供無額官不𣙜酒不禁茶鹽務以安逺人為意熙寧八年五月內批張方平樞密使介甫即欲行文書吉甫留之曰當俟晚集更議之因私語介甫曰安道入必為吾屬不利眀日再進呈遂格不行君貺云三司使章惇嘗登對上譽張安道之美問識否惇退以告吉甫明旦吉甫與安道同行入朝因告以上語且曰行當大用矣安道縮鼻而已其暮安道方與客坐惇通刺入門謁見安道使謝曰素不相識不敢相見惇慚怍而退故蔡承禧彈惇曰朝登陛下之門暮入惠卿之室為此也由是上惡惇介甫惡安道未幾皆出介甫初參大政章辟光上言岐王嘉王不宜居禁中請使出居于外太后怒與上言辟光離間兄弟宜加誅竄辟光揚言王參政吕惠卿來教我上此書今朝廷若深罪我我終不置此二人惠卿懼以告介甫上欲竄辟光于嶺南介甫力營救止降監當而已吕獻可攻介甫引辟光之言以聞于上獻可坐罷中丞知鄧州蘇子容當草制曽魯公召諭之曰辟光治平四年上書當是時介甫猶在金陵惠卿監杭州酒安得而教之故其制詞云當小人交搆之言肆罔上無根之語制出士大夫頗以子容制詞為非子容以魯公之言告乃知治平四年辟光所上言他事非言岐嘉者子容深悔之嘗謂人曰介甫雖黜逐我我怨之不若魯公之深也王兖云韓魏公判相州有三人為劫為鄰里所逐而散既而為魁者謂其徒曰自今劫人有救者先殺之衆諾他日又劫一家執其老嫗搒捶求貨鄰人不忍共傳呼來語賊曰此嫗更無他貨可惜搒死其徒即刺殺之州司皆處三人死刑堂後官周清本江寧法司後為兵司大將王介甫引置中書且立法云若刑房能駁正大理寺及刑部斷獄違法得當者一事遷一官故刑房吏日取舊案吹毛以求其失清以此自大將四年遷至供備庫使行堂後官事清駁之曰新法凡殺之人雖已死其為從者被執雖經拷掠茍能先引服皆從按問欲舉律減四等今盜魁令其從云有救者先殺之則魁當為首其從用魁言殺救者則為從又至獄先引服當減等而相州殺之刑部不駁皆為失入死罪事下大理大理以為魁言有救者先殺之謂執兵杖來鬭者也今鄰人以好言勸之非救也其徒自出己意手殺人不可為從相州斷是詳斷官竇平周孝恭以此白檢正劉奉世奉世曰若為法官自圖何必相示二人曰然則不可為失入奉世曰君自當依法此豈必欲君為失入耶于是大理奏相州斷是清執前議再駁復下刑部新官定刑部以清駁為是大理不服方爭論未決㑹皇城司奏相開案相字疑誤僉書相州判官日斷此獄聞周清駁之懼得罪詣京師厯抵親識求救文潞公之子大理評事文及甫乃陳安民之姊子吳沖卿之壻也沖卿時為首相安民以書召開云爾宜自來照管法司竭其家資入京師欲貨大理吏求問息耗相州人髙在等在京師為司農吏利其貨詭托書吏數人共耗用其物實未嘗見大理吏也為皇城司所奏言齎三十餘緡行求大理事下開封府按鞫無行賂狀惟得安民與開書諫官蔡確知安民與沖卿有親乃密言事連大臣非開封可了乃移其獄下御史臺司旬有數日所按與開封無異㑹沖卿在告王圭奏令確共按之與寺丞劉仲弓推鞫收大理寺評斷官竇平周孝恭等枷縛暴于日中凡五十七日求其受賄事皆無狀中丞鄧潤甫夜聞掠囚聲以為平孝恭等其實他囚也潤甫心非確所為慘刻而力不能制確引陳安民置枷于前而問之安民懼具道嘗請求文及甫及甫已白丞相丞相甚垂意確得其辭甚喜遽欲與潤甫登對奏之言丞相受請枉法潤甫止之明日潤甫在經筵獨奏相州獄事甚微大理實無受賂事而蔡確深探其獄滋蔓不已竇平等皆朝士搒掠身無完膚皆銜寃自誣乞早結正上甚駭異明日確欲登對上使人止之不得前命諫官黃履監察御史黃亷御藥李舜舉同詣臺按驗三人與潤甫確坐廡下約都不得語引囚于前讀示以所承之詞令實則書實虛則自陳寃囚畏獄吏之酷皆書款引實驗拷掠之痕則無之履等還奏確又上書陳安民請求文及甫事連宰相鄧潤甫黨附執政不欲推究故早求結正上遂大怒以潤甫為面謾確為忠直元豐元年四月丙辰潤甫落翰林學士中丞以右諫議大夫知撫州告詞曰奏事不實奉憲失中言涉詆欺內懷顧避中允監察裏上官均亦嘗上言確按獄深刻降授光祿寺丞知邵武軍光澤縣告詞曰不務審克茍為朋附俾加閲實不如所言確自右正言除右諫議權中丞確遂收文及甫繫獄及甫懼亦云嘗白丞相言固是又云嘗屬沖卿子郡牧判官太常博士安持確又收刑房檢正劉奉世奉世先為樞府檢詳沖卿自樞府入相奏為檢正雅信重之確令大理稱受奉世風旨出相州獄奉世懼亦云于起居日嘗受安持屬請又欲收安持上不許令即訊安持恐被收亦言嘗以屬奉世時三司使李承之副使韓忠彥皆上所厚承之嘗為都檢正忠彥韓公之子也確皆令囚引之承之知之數為上言確險詖之情上意亦解趣使結正六月己丑劉奉世落直史館監吳安持奪一官降監當文及甫衝替陳安民追停韓忠彥贖銅十斤自餘連坐者十餘人周清遷一官沖卿上表請退及閣門待罪者三四日上輒遣中使召出令視事確屢帥臺諫官登對言罪吳安持太輕上曰子弟為親戚所屬請不得已而應之此亦常事何足深罪卿輩但欲共攻吳充出之此何意耶以確所彈奏劄還之言者乃止公廉李舉之王得臣伯淳馮如晦云涑水記聞卷十五
