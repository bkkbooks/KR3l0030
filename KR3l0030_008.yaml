body:
  text: 涑水記聞卷八宋司馬光撰王化基為人寬厚嘗知槀州案宋史地理志無槀州王化基傳亦無知槀州事與僚佐同坐有卒過庭下為化基􅀢而不及幕職僚佐退召其卒笞之化基聞之笑曰我不知欲得一􅀢如此之重也嚮或知之化基無用此􅀢當以與之人皆服其雅量官至參知政事禮部尚書諡曰惠獻子舉正有父風官亦至參知政事禮部尚書諡曰安簡馮廣淵云李文定公迪罷陜西都運使還朝是時真宗方議東封西祀修太平事業知秦州曹瑋奏羌人潛謀入寇請大益兵為備上怒瑋虛張賊勢恐喝朝廷以迪新自陜西還召見示以瑋奏問其虛實欲斬瑋以戒妄言者文定從容奏曰瑋武人逺在邊鄙不知朝廷事體輒有奏陳不足深罪臣前任陜西觀邊將才略無能出瑋之右者他日必能為國家建功立事若以此加罪臣為陛下惜之上意稍解迪因奏曰瑋良將必不妄言所請之兵亦不可不少副其請臣觀陛下意但不欲從都門出兵耳秦之旁郡兵甚多可發以戍秦臣在陜西籍諸州兵數為小冊嘗置鞶囊中以自隨今未敢以進上趣取閲之曰以某州兵若干戍秦州卿即傳詔樞密遣之既而羌衆果入寇瑋迎擊大破之遂開山外之地奏到上喜謂迪曰山外之捷卿之功也及上將立章獻后迪為學士屢上疏諫以章獻起于寒微不可母天下由是章獻深銜之周懷政之誅上怒甚欲責及太子羣臣不敢言迪為參知政事候上怒稍解從容奏曰陛下有幾子乃欲為此計上大悟由是獨誅懷政等而東宫不動搖迪之力也及為相真宗已不豫丁謂與迪同奏事退既下殿謂矯書聖語欲為林特遷官迪不勝忿與謂爭辨引手板欲擊謂謂走獲免因更相論奏詔二人俱罷相迪知鄆州明日謂復留為相迪至鄆且半歲真宗晏駕迪貶衡州團練副使謂使侍禁王仲宣押迪知衡州仲宣至鄆州見通判以下而不見迪迪惶恐以刃自剄人救得免仲宣淩侮迫脅無所不至人往見迪輒籍其名或饋之食留至潰腐棄捐不與迪客鄧餘怒曰豎子欲殺我公以媚丁謂耶鄧餘不畏死汝殺我公我必殺汝從迪至衡州不離左右仲宣頗憚之迪由是得全至衡州歲餘遷祕書知舒州章獻太后崩迪時以尚書右丞知河陽今上即位召詣京師加資政殿大學士數日復為相迪自以為受不世之遇盡心輔佐知無不為吕夷簡忌之潛短之于上歲餘罷相出知某州迪謂人曰迪不自量恃聖主知之自以為宋璟而以吕為姚崇而不知其待我乃如是也文定子及之云真宗乳母劉氏號秦國延壽保聖夫人言惟寬宗族近有幸求內批者上咸不違康定元年十月戊子謂宰相曰自今內批與官及差遣者竝具舊條復奏取㫖案此條言惟寬宗族句上似有脫落錯訛慶厯三年五月旱丁亥夜雨戊子宰相章得𧰼等入賀上曰昨夜朕忽聞微雷因起露立于庭仰天百拜以禱須臾雨至朕及嬪御衣皆沾濕不敢避去移時雨霽再拜而謝方敢升階得𧰼對曰非陛下至誠何以感動天地上曰比欲下詔罪已避寢撤膳又恐近于崇飾虛名不若夙夜精心密禱為佳耳慶厯三年九月知諫院王素余靖歐陽修蔡襄以言事不避並改章服十月王素除淮南轉運使將之官入辭上謂曰卿今便去諫院事有未言者可盡言之右正言余靖奉使契丹入辭書所奏事于笏各用一字為目上顧見之問其所書者何靖以實對上指其字一一問之盡而後已上之聽納不倦如此溫成皇后張氏其先吳人從錢氏歸國為供奉官祖穎進士及第終于縣令子堯封尚幼二女入宫事真宗名位甚微堯封亦進士及第早終妻惟有一女即后也庶子化基幼堯封從父弟堯佐亦進士及第時已為員外郎不收恤諸孤后母賣后于齊國大長公主家為歌舞者而適蹇氏生男守和大長公主納后于禁中仙韶部宫人賈氏母養之上嘗宫中宴飲后為俳優上見而悅遂有寵后性慧善迎人主意初為修媛後冊為貴妃飲膳供給皆踰于曹后幾奪其位數矣以曹后素謹上亦重其事故不果上以其所出微欲使之依士族以自重乃稍進用堯佐數年間為三司副使天章閣待制三司使淮海軍節度使宣徽使追封堯封為清河郡王后母為齊國夫人后兄化基子守和皆拜官宗族赫然俱貴至和元年正月暴疾薨上哀恤之甚追冊為溫成皇后禮數資送甚極豐厚后方寵幸賈氏尤用事謂之賈夫人受納貨賄為人屬請無不行者賈安公以姑禮事之遂被大用然亦以此獲譏于世齊國夫人柔弱故官爵賞賜多入堯佐而化基等反不及焉化基終于閣門祗候后薨齊國夫人相繼物故後數年堯佐亦卒張氏遂衰子淵曰溫成立忌日禮官列言不可執政患之有禮官謂執政曰禮官張芻獨主此議他人皆不得已從之耳執政乃追引前歲芻乞落職代父牧入蜀及乞廣安軍進退失據奏落檢校職監潭州酒禮官議者稍稍息慶厯元年十二月才人張氏進封修媛慶厯四年三月以修媛張氏之世父職方員外郎堯佐提㸃開封府縣鎮公事右正言余靖上言堯佐不當得此差遣一堯佐不足為輕重但鑒郭后之禍興于楊尚上曰朕不以女謁用人自有臣僚奏舉物議不允當與一郡至和元年張氏妃薨初諡廣明皇后又諡元明又諡溫成京師禁樂一月正月二十日自皇儀殿殯于奉先寺儀衛甚盛又詔與孝惠淑德章懷章惠俱立忌正月二十日殯成上前五日不視朝兩府不入前一日之夕上宿于皇儀殿設警場于右掖門之外是日旦發引陳鹵簿鼓吹太常樂僧道威儀甚盛皇親兩府諸司緣道設祭自右掖門至奉先院絡繹不絶百官班辭于御史臺前陳祭又赴奉先院已殯百官復詣西上閣門奉慰寶元二年十一月丁酉旬休上御延和殿決御史臺所奏馮士元獄謂宰相曰此獄事連大臣近者臺司進奏禁止鄭戩龐籍起居自餘盛度程琳殊無論奏度琳乃儒臣耳脫有權勢更重者當如之何于是開封府判官李宗簡特追一官勒停天章閣待制龐籍贖銅四斤知汝州自餘與士元交關者皆以罪輕重責降有差其知開封府鄭戩等按鞫士元不罪特放知樞密院事盛度除尚書右丞知揚州參知政事程琳降授光祿卿知潁州皆以交關士元使幹治私務故也御史中丞孔道輔降授給事中知鄆州以不按劾二人之罪故也十二月庚申賜京西鄜延馬遞步特支錢詔審刑刑部大理寺不得通賔客有受情曲法者開相告之科鄜延路奏邊事警急差强壯丁防守諸寨換禁兵鬭敵從之辛酉賜鄜延特支錢上問宰相唐世入閣之儀參知政事宋庠退而講求以進曰唐有大內有大明宫大內謂之西內大明宫謂之東內高宗以後多居東西其正南門曰丹鳯丹鳯之內曰含光殿每至大朝㑹則御之次曰宣政殿謂之正衙朔望大冊拜則御之次曰紫宸殿謂之上閣亦曰內衙竒日視朝則御之唐制天子日視朝則必立仗于正衙或乘輿止于紫宸則呼仗自東西閣門入故唐世謂竒日視朝為入閣李端願曰章獻之志非也暴得疾耳鑿垣而出瘞于洪福寺章獻之過也案此論章獻后之于李宸妃其事在明道元年又曰上幼沖即位章獻性嚴動以禮法禁約之未嘗假以顔色章惠以恩撫之上多苦風痰章獻禁蝦蟹海物不得進御章惠嘗藏弆以食之曰太后何苦虐吾兒如此上由是怨章獻而親章惠謂章獻為大娘章惠為小娘及章獻崩尊章惠為太后所以奉事曲盡恩意景祐中薨神主祔于奉慈廟弟景宗少為役兵以章惠故得官性凶悍使酒好以滑槌毆人世謂之楊滑槌數犯法上以章惠故優容之官至觀察使初丁謂治第于城南景宗為兵負土焉及謂敗第沒上以賜景宗居之十一日賜兩府兩制宴于中書喜雪也十九日賜兩府兩制宴于都庭驛曾相主之冬至故也果有八列近百種凡酒一獻從以四殽堂厨也曾氏也使者也大官也案此上二條僅繫日當原有某年某月一條冠前而傳寫佚去至和元年春張貴妃薨上哀悼之甚欲極禮數以寵秩之乃追諡溫成皇后殯于皇儀殿命參知政事劉沆監議喪事是時陳執中梁適為宰相王拱辰王洙判太常寺兼禮儀事皆惶恐不愛名器以承順上意又詔為溫成皇后立忌日同知禮院馮浩張芻吳充鞠真卿皆爭之執政患之因芻向時奏以父牧嘗任蜀官自乞代父入蜀既而又奏得父書自願入蜀更不代行無何牧至京師復上奏乞免蜀官以是執政以芻奏事更不代行前後異同落史館檢校監潭州酒欲以警策其餘禮院故事常豫為印署衆銜或非時中㫖有所訪問不暇遍白禮官則白判寺一人書填印狀通進施行是時溫成喪事日有中㫖訪問禮典判寺王洙兼判少府監廨舍最近故吏多以事白洙洙常希望上㫖以意裁定填印狀進內事既施行而論者皆責禮官無以自明乃召禮直官戒曰自今凡朝廷訪問禮典稍重應商議者皆須遍白衆官議定奏聞是非常行熟事不得輒以印狀申發仍責狀申委後數日有詔問溫成皇后廟應如他廟用樂舞否禮直官李亶以事白洙洙即填狀奏云當有樂舞事下禮院充真卿怒即牒送禮直官李亶于開封府使按其罪是時蔡襄權知開封府洙抱案卷以示襄曰印狀行之久矣禮直官何罪襄患之乃復牒送亶于禮院云請任自施行充真卿復牒送府如是再三先是真卿好遊臺諫之門㑹溫成后神主祔新廟皆以兩制攝獻官端明殿學士楊察攝太尉殿中侍御史趙忭監察吳充監禮上又遣內臣臨視察臨視內出圭瓚以盥鬯充言于察曰禮上親享太廟則用圭瓚若有司攝事則用璋瓚今有司祭溫成廟而用圭瓚薄于太廟而厚于姬妾也其于聖德虧損不細請奏易之察有難色曰日已暮矣明日行事言之何及內臣侍祭者已聞之密以上聞詔即改用璋瓚祭之明日趙忭上言劾蔡襄知開封府不崇治禮直官罪畏懦觀望于是執政以為充因初祭教忭上言又禮直官日在溫成墳所訴于內臣云欲送禮直官于開封府者充與真卿二人而已由是怒充與真卿明日詔禮直官及繫檢禮生各贖銅八斤充及真卿皆補外官充知高郵軍真卿知淮揚軍于是臺諫爭言充等不當補外最後右正言修起居注馮京言最切直以為今百職隳廢獨充能舉其職而陛下責胥吏太輕責充等太重將何以振飭紀綱于是朝廷落京修注即日趣充等行開封府推官集賢校理刁約掌修墳頓遞亦嘗對中貴人言溫成禮數太重詔以約為京西路提㸃刑獄亦即日行元規受詔讀冊辭曰故事正后翰林學士讀冊今召臣承乏臣實恥之奏報聞至日集賢官僚謂之曰公今日何為復來元規曰共傳誤本耳又諫追冊曰皆由佞臣贊成兹事二相甚銜之將行追冊言官力諌上意稍解明日以問執政執政順成之夢得及母湜俞希孟皆求外補郭申錫請長告皆以言不用故也楊樂道曰初章獻為上娶郭后后恃章獻驕妒章獻崩后與尚美人爭寵批傷今上頸上召都知閻文應示之文應勸上廢后上問吕夷簡亦曰古有之遂降敕廢為金庭教主文應懷敕并道衣以授之后恚有悖語文應即驅出以車送瑶華宫既而上悔之作慶金枝曲遣使賜后后和而獻之又使詔入宫文應懼以疾聞上命賜之酒及藥文應遂鴆之丁正臣曰范諷問上傷上以后語之及疾文應使醫置毒上終不知慶厯三年九月知諫院蔡襄上言自今中書樞密院執政官非休暇日私第不得見客欲詢訪天下之事采拔竒異之材許臨時延召詔從之至和二年七月翰林學士歐陽修上言兩制以上毋得詣兩府之第詔從之嘉祐四年五月上手詔賜兩府曰朕觀在昔君臣惟同心同德故知天下之務享無疆之休倘設猜防之端是乖信任之道因納言屢述御臣之規頗立科條用制邪慝方今圖任賢哲倚為股肱論道是咨推誠無間而有禁未解斯豈稱朕意耶先至兩制臣寮不許至執政私第兩府大臣奏薦人不得充臺諫官凡此條約其悉除之庶使君臣之際了無疑間之迹卿等謀謨舉措義宜如何嘉祐七年二月癸卯以駙馬都尉李瑋知衛州事兗國公主入居禁中瑋所生母楊氏歸瑋之宅公主乳母韓氏出居于外公主宅勾當內臣梁懷吉案宋史作懷一勒歸私省公主宅諸色祗應人始皆隨遣入案此句有訛誤瑋貌陋性朴上以章懿太后故命之尚公主自始出降常以庸奴視之乳母韓氏等復離間梁懷吉等給事公主閣內公主愛之公主嘗與懷吉等閒飲楊氏窺之公主怒毆傷楊氏由是外人喧譁咸有異議朝廷貶逐懷吉等于外州公主恚懟或欲自經或欲赴井或縱火或焚他舍以邀上意必令召懷吉等還上不得已亦為召之然主意終惡瑋至是不復肯入中門居于㕔事晝夜不眠或欲自盡或欲突走出外狀若顛狂左右以聞故有是命三月戊申朔壬子制曰陳車服之等所以見王姬之尊啓脂澤之封所以昭帝女之寵兹雖親愛之攸屬時乃風化之所關茍不能安諧于厥家則何以觀示于流俗兗國公主生而甚慧朕所鍾憐故于外家之近親以求副車之善配而保傅無狀閨門失歡歷年于茲生事不順逹于聽聞深所驚駭雖然恩義之常人所難斷至于賞罰之際朕安敢私宜告大庭降從下國於戲惟肅雍以成美德惟柔順以輯令名及兹恪恭庶幾永福可降封沂國公主觀察使駙馬都尉李瑋改建州觀察使依舊知衛州公主既還禁中上數使人慰勞李氏賜瑋金二百兩且謂曰凡人富貴亦不必為主壻也于是瑋兄璋上言家門薄祚弟瑋愚騃不足以承天姻乞賜指揮上許之離絶又以不睦之咎皆由公主故不加責降焉嘉祐元年夏詔自今舉選人充京官者已舉不得復首又被舉者亦不得納舉主人詔文武官宗室嬪御內官應奏薦親戚補官舊制過乾元節奏一人者今過三年親郊乃得之其餘減損各有差京師雨兩月餘不止水壞城西南隅漂沒軍營民居甚衆宰相以下親護役救水河北京東西江淮䕫陜皆大水九月辛卯上以疾瘳恭謝天地于大慶禮畢御宣德門大赦改元恩賜皆如南郊二年夏五月庚辰管勾麟府路軍馬公事郭恩遇夏賊于屈野河西與戰敗績恩及走馬承受公事黃元道皆為賊所擒秋賊復遣元道歸詔文武官應磨勘轉官者皆令審官院以時舉行毋得自投牒又詔自今間歲一設科場復置明經科三年五月甲申榜朝堂敕鹽鐵副使郭申錫屬與李參訟失實黜知濠州李參鄆州人為定州通判夏守恩為真定路部署貪濫不法轉運使楊偕張存欲發其事使參按之得其斂戍軍家口錢十萬為之遣放者權知定州取富民金叉四十二枚為之移卒於外縣守恩坐除名連州編管弟殿前指揮使守贇亦解兵權由是知名范文正公于景祐三年言吕相之短坐落職知饒州康定元年復天章閣待制知永興軍尋改陜西都轉運使㑹吕公自大名復入相言于仁宗曰范仲淹賢者朝廷將用之豈可但除舊職耶除龍圖閣直學士陜西經略安撫使上以許公為長者天下皆以許公為不念舊惡文正面謝曰向以公事忤犯相公不意相公乃爾奬拔許公曰夷簡豈敢復以舊事為念耶及文正知延州移書諭趙元昊以利害元昊復書語極悖慢文正具奏其狀焚其書不以聞時宋相庠為參知政事先是許公執政諸公唯諾書紙尾而已不敢有所預宋公多與之論辨許公不悅一日二人獨在中書許公從容言曰人臣無外交希文乃擅與元昊書得其書又焚去不奏他人敢爾耶宋公以為許公誠深罪范也時朝廷命文正分析文正奏臣始聞賊有悔過之意故以書誘諭之㑹在福敗賊勢益振故復書悖慢臣以為朝廷見之而不能討則辱在朝廷乃對官屬焚之使若朝廷初不知者則辱在臣矣故不敢以聞也奏上兩府共進宋公遽曰范仲淹可斬杜祁公時為樞密副使曰仲淹之志出于忠果欲為朝廷招叛耳何可深罪爭之甚切宋公謂許公必有言相助也而許公默然終無一語上顧問許公如何許公曰杜衍之言是止可薄責而已乃降一官知耀州于是論者喧然而宋公不知為許公所賣也宋公亦尋出知揚州陜西轉運使孫沔上書言自夷簡當國黜忠言廢直道以姑息為安以避謗為智柔而易制者升為心腹姦而可使者保為羽翼是張禹不獨生于漢而李林甫復見于今也夷簡見書謂人曰元規藥石之言但恨聞此遲十年耳丁正臣曰皇姪宗實既堅辭宗正之命諸中貴人乃薦燕王元儼之子允初上召入宫命坐賜茶允初顧左右曰不用茶得熟水可也左右皆笑既罷上曰允初癡騃豈足任大事乎濮王薨任守忠王世寧護葬事凌蔑諸子所饋遺近萬緡而心猶未厭故奏宗懿不孝坐奪俸黜官癸未皇子猶堅卧不肯入肩輿宗諤責之曰汝為人臣子豈得堅拒君父之命而終不受耶我非不能與衆執汝强置于肩輿恐使汝遂失臣子之義陷于惡名耳皇子乃就濮王影堂慟哭而就肩輿楊樂道云令教授周孟陽作讓知宗正表每一表餉之金十兩孟陽辭皇子曰此不足為謝俟得請方當厚酬耳凡十八表孟陽獲千餘緡亦樂道云丁正臣曰皇子堅辭新命孟陽使人謂之曰君已有此迹若使中人别有所奏君獨能無恙乎涑水記聞卷八
