body:
  text: 涑水記聞卷十三宋司馬光撰皇祐中儂智髙自邕州乗流東下時承平歳久緣江諸州城柵隳敝又無兵甲長吏以下皆望風逃潰贊善大夫知康州趙師道謂僚屬曰賊鋒甚盛吾州衆寡不敵必不能拒賊然吾與兵馬監押為國家守城賊至死之職也若君等先賊未至宜與家屬避山中師道亦置其家属山中師道妻方産棄子于草間而去師道在城上妻遣奴與師道相聞師道怒曰吾已與汝為死訣尚寄聲何為引弓射奴殺之時賊已在近師道與監押閉門守城賊攻陷之師道坐正廰事射殺賊數人然後死賊以城人拒已悉焚其官府民舎殘滅之進至于封州太子中舎知封州曹覲微服懐州印匿于民間賊捜得之延坐與食謂曰爾能事我我以爾為龍圖閣學士覲罵曰死蠻汝安知龍圖閣學士為何物乃欲汚我賊怒斬之及事平朝廷贈覲諫議大夫師道太常少卿妻子皆受官邑賜賚甚厚棄城者皆除名編管康衛云儂智髙世為廣源州酋長後屬交趾稱廣源州節度使有金坑交趾賦斂無厭州人苦之智髙桀黠難制交趾惡之以兵掩獲其父留交趾以為質智髙不得已歳輸金貨甚多久之父死智髙怨交趾且恐終為所滅乃叛交趾過江徙居安徳州遣使詣邕州求朝命為補刺史朝廷以智髙叛交趾而來恐疆埸生事卻而不受智髙由是怨數入為盜先是禮賓使幵贇坐事坐為洪州都指揮使㑹赦有薦其材勇前所坐簿可收使詔除御前忠佐將兵戍邕州贇欲邀竒功深入其境兵敗為智髙所擒恐智髙殺之紿言我來非戰也朝廷遣我招安汝耳不期部下人不相知誤相與鬭遂至于此因諭以禍福智髙喜以為然遣其黨數十人隨贇至邕州不敢復求刺史但乞通貢朝廷邕州言狀朝廷以贇妄入其境取敗為賊所擒又欲脱死妄許其朝貢為國生事罷之黜為全州都指揮使智髙之人皆卻還智髙大恨且以朝廷及交趾皆不納窮無所歸遂謀作亂有黄師宓者廣州人以販金常往來智髙所因為之畫取廣州之計智髙悅之以為謀主是時武臣陳珙知邕州智髙隂結珙左右珙不之知皇祐四年四月智髙悉發所部之人及老弱盡室沿江而下凡戰兵七千餘人五月乙巳朔奄至邕珙閉城拒之城中之人為内應賊遂陷邕州執珙等官吏皆殺之司户參軍孔宗旦罵賊而死智髙自稱仁惠皇帝改元啟厯沿江東下横貴潯龔藤梧康封端諸州無城柵皆望風奔潰不二旬至廣州知廣州仲簡性愚且狠賊未至時僚佐請為之備皆不聴至遣兵出戰賊使勇士數十人以青黛塗面跳躍上岸廣州兵皆奔潰先是廣州地皆蜆殻不可築城前知州魏瓘以壁為之其中甚隘小僅可容府署倉庫而已百姓驚走輦金寶入城簡閉門拒之曰我城中無物猶恐賊來況聚金寶于城中耶城外人皆號哭金寶悉為賊所掠簡遂閉門拒守轉運使王罕時巡按至梅州聞之亟還番禺鄉村無賴少年乗賊勢互相剽掠州縣不能制民遮馬自訴者甚衆罕乃下馬召諸老人坐而問之曰汝曹嘗經此變乎對曰昔陳進之亂民間亦如是時有縣令籍民間强壯者悉令自衛鄉里無得他適于是鄰村亦不能侵暴鄰村一境獨安罕即遍移牒州縣用其䇿且斬為暴者數人民間始安罕既入城鈐轄侍其淵等共修守備賊掠得海船崑崙奴使登樓車以瞰城中又琢石令圓以為礟每發輒殺數人晝夜攻城五十餘日不克而去時提㸃刑獄鮑軻欲遷其家置嶺北至南雄州知州責而留之軻乃詗廣州聞日有所奏罕在圍城中無奏章賊退朝廷賞軻而責罕罕坐左遷五月乙巳朔丙寅儂智髙攻廣州壬辰詔知桂州陳曙將兵救之直史館楊畋繼業之族人也嘗為湖南提㸃刑獄討叛蠻與士卒同甘苦士卒愛之時居父喪六月乙亥詔起畋為廣南西路體量安撫使畋儒者迂闊無威諸將不服尋罷之七月丙午以余靖經制廣南東西路賊盜壬戌智髙解廣州圍西還攻賀州不克廣南東路鈐轄張忠初到官所將皆烏合之兵智髙遇戰于白田忠敗死西路鈐轄蔣偕性輕率舉措如狂人軍于太平場初不設備九月戊申智髙悉擊殺之丙辰又敗官軍于龍岫洞丁巳以余靖提舉廣南東西路兵甲尋為經略使又命樞密直學士孫沔入内押班石全彬與靖同討智高西路鈐轄王正倫敗于館門驛遂陷昭州樞密副使狄青請自出戰擊賊庚午以青為宣徽使荆湖南北路宣撫都大提舉經制廣南東西路盜賊事諫官韓絳上言狄青武人不足專任固請以侍從文人為之副上以訪執政時龐籍獨為相對云屬者王師所以屢敗皆由大將權輕偏裨人人自用遇賊或進或退力不制勝故也今青起于行伍若以侍從之臣副之彼視青如無青之號令不得行是循覆車之軌也青素名善將今以二府將大兵討賊若又不勝不惟嶺南非陛下之有則荆湖江南皆可憂矣禍難之興未見其涯不可不慎青昔在鄜延居臣麾下沈勇有智略若專以智髙之事委之使先以威齊衆然後用之必能辦賊幸陛下勿以為憂也上曰善以是嶺南用兵皆受青節度并處置民事則與孫沔等議之時余靖軍于賓州聞智髙將至棄城及芻糧走保邕丁丑智高陷賓州靖引兵揚言邀賊留監押守邕州監押亦走甲申智髙復入邕州十一月狄青至湖南諸道兵皆㑹諸將聞宣撫使將至争先立功余靖遣廣南西路鈐轄陳曙將萬人擊智高為七寨逗遛不進十二月壬申朔智高與曙戰于金城驛曙敗遁歸死者二千餘人棄捐器械輜重甚衆交趾王徳政請出兵二萬助收智高狄青奏官軍自足辦賊無用交趾兵丁未詔交趾毋出兵青又請西邊番落廣銳近二千騎與俱五年正月青至賓州余靖陳曙皆來迎謁時饋運未至青初令備五日糧既又備十日糧智髙聞之由是懈惰不為備上元張燈高㑹先是諸將視元帥如寮寀無所嚴憚每議事各執所見喧争不已不用其命己酉狄青悉集將佐于幕府立陳曙于庭下數其敗軍之罪并軍校數十人皆斬之諸將股慄莫敢仰視余靖起拜曰曙之失律亦靖節制之罪也青曰舎人文臣軍旅之責非所任也于是勒兵而進步騎二萬人或說儂智高曰騎兵利平地宜遣人守崑崙闗勿使度險使其兵疲食盡擊之無不勝者智髙驟勝輕官軍不用其言青倍道兼行出崑崙闗直趨其城智高聞之狼狽遽發兵出戰戊午相遇于歸仁鋪青使步卒居前匿騎兵于後蠻使饒勇者執長槍居前羸弱悉在其後前鋒孫節戰不利而死將卒畏青令嚴力戰莫敢退者青登高丘執五色旗麾騎兵為左右翼出長槍之後斷蠻兵為二旋而擊之槍立為束蠻軍敗殺獲三千餘人獲其侍郎黄師宓等智髙走還城官軍追之營城下營中夜驚呼蠻聞之以為官軍且進攻棄城走明日青入城遣裨將于振追之過田州不及而還智髙奔大理捷書至上喜謂龐籍曰嶺南非卿執義之堅不能平今日皆卿功也狄青還上欲以為樞密使同平章事籍曰昔曹彬平江南太祖謂之曰朕欲用卿為使相然今外敵尚多卿為使相安肯復為朕盡死力耶賜錢二十萬緡而已今青雖有功未若彬之大若賞以此官則富貴極矣異日復有寇盜青更立功將以何官賞之且青起軍中致位二府衆論紛然謂國朝未有此比今幸而立功論者方息若又賞之太過是復使青得罪于衆人也臣所言非徒便國體亦為青謀也昔衛青已為大將軍封侯立功漢武帝更封其子為侯陛下若謂賞功未盡宜更官其諸子争之累日上廼許之二月癸未加青䕶國軍節度使樞密副使如故仍遷諸子官既而議者多謂青賞薄石全彬復為青訟功于中五月乙巳竟以青為樞密使先時所司奏余安道案安道余靖字募人能獲智高者有孔目官楊元卿進士石鑑等十人皆獻䇿請行安道一一問之以元卿䇿為善元卿曰西山諸蠻凡六十族皆附智高其中元卿知其一族請往以順逆諭之順從使之轉諭他族無不聴矣若皆聴命則智高將誰與處此必成擒矣安道悅使齎黄牛鹽等物往說之二族隨元卿出見安道安道皆鋪紋綵裝飾譜牒如吿身狀慰勞燕犒厚賜遣之于是轉相說與稍稍請降先是智高築宫于特磨寨及敗攜其母弟妻子往居之聞諸族俱叛惶懼留其母及弟智光子繼封于特磨寨使押衙一人將兵衛之智高自將兵五百及其六妻六子奔大理國欲借兵以攻諸族安道使元卿等十人發諸族陳充等六州兵襲特磨寨殺押衙獲其母弟子以歸安道欲烹之廣南西路轉運司奏所獲非智高母子蠻人妄執之以干賞耳于是安道奏送京師請囚之以俟得智高辨其虚實詔許之緣道皆不執縻供待甚嚴至京師館于故府司朝夕給飲膳惟所欲如養驕子月費錢三百餘貫病則國醫臨視後數月智光發狂毆防衛者欲突走伯庸上言案伯庸王堯臣字智髙母致病不誅無以懲蠻夷又徒費國財養之無用請戮之上怒曰余靖欲存此以招智高而卿等專欲殺之耶自是羣臣不敢言智髙母年高六十餘隆準方口智光年二十八神識不慧智高使之所部州不能治黜之其妻美色智高奪之繼封年十四智高長子智髙僭立為太子繼明八歳安道以獲智髙母召其所親黄汾于韶州使部送至京師汾自幕職遷大理寺丞元卿除三班奉職鑑除齋郎其餘皆除齋郎殿侍以元卿鑑曉蠻語皆留侍儂母元卿等憤歎曰昔我初獲智高母余侍郎謂我等勿入京師留此待官賞耳我等皆曰智高殺我等親戚近數十口我願至京師分此嫗一臠食之豈知今日朝夕事之若孝子之事親執政者仍戒我云汝勿得以私憤逼殺此嫗設有不幸我等當償其死耶數見執政涕泣求歸不許儂智高將至廣州天章閣待制知廣州仲簡尚未之信殊不設備榜于衢路令民敢有相扇動欲逃竄者斬及賊至簡閉其城拒守郊野之民欲入城者閉門不納悉為賊所殺掠簡隂具舟欲與家屬逃去僚屬以為不可㑹轉運使王罕巡行他州聞賊至亟還入廣州城悉力拒守㡬陷者數四僅而得免提㸃刑獄鮑軻止于南雄城詗賊動静相繼以聞及賊退朝廷責罕奏章稀少黜監信州税仲簡落職知筠州以鮑軻為勤職欲以為本路轉運使臺諫有言而止蔣偕將千餘人晝夜兼行追儂智高至黄富場蠻人詗知官軍飢疲夜以酒設寨飲之即帳中斬偕首因縱擊其衆大破之梟偕及偏裨首于戰場而去李章云儂智高圍廣州既久城中窘急而賊亦疲乏又不習水戰常懼海賊來抄其寶貨東莞縣主簿兼令黄固素為吏民所愛信偵知賊情乃募海上無賴少年得數千人船百餘艘沿流而下夜趨廣州城鼓譟而進賊大驚即時遁去廣州命固率所募之衆泝流追之而賊棄船自他路去追之不及㑹通判孟造素不悦固乃按固所率舟中之民私載鹽鮝于上流販賣及縣中官錢有出入不明者攝固下獄治之誣以贓罪固竟坐停仕既而上官數為辨雪治平中乃得廣州幕職蔡子直云石鑑邕州人嘗舉進士不中第儂智髙陷邕州鑑親屬多為賊所殺鑑逃奔桂州智髙攻廣州不下還據邕州秘書監余靖受朝命討賊鑑以書干靖言邕州三十六洞蠻素受朝廷官爵恩賜必不附智髙曏者從智髙東下皆廣源州蠻及中國亡命者不過數千人其餘皆驅掠二廣之民也今智髙據邕州財力富强必誘脅諸蠻再圖進取若使智高盡得三十六洞之兵其為中國患未可量也鑑素知諸洞山川人情請以朝廷威徳説諭諸蠻酋長使之不附智高智高孤立不足破矣靖乃假鑑昭州軍事推官間道説諸洞酋長皆聴命惟結洞酋長黄守陵最强智高深與相結洞中有良田甚廣饒粳糯及魚四面阻絶惟一道可入智高遺守陵書曰吾曏者長驅至廣州所向皆捷所以復還邕州者欲撫存汝諸洞耳中國名將如張忠蔣偕輩皆望風授首步兵易與不足憂所未知者騎兵耳今聞狄青以騎兵來吾當試與之戰若其克捷吾當長驅以取荆湖江南以邕州授汝不捷則吾寓汝洞耳休息士卒從特磨洞借馬敎習騎戰候其可用更圖後舉必無敵矣并厚以金珠遺守陵守陵喜運糯米以餉智高鑑使人說守陵曰智髙乗州縣無備横行嶺南今力盡勢窮復還邕州朝廷興大兵以討之敗在朝夕汝世受國恩何為無事隨之以取族滅且智髙父存勗本居廣源州弟存禄為武勒州刺史存朂襲殺存禄而奪其地此皆汝耳目親見也智高父子貪詐無恩譬如虎狼不可親也今汝乃欲延之洞中吾見汝且為虜矣不可不為之備守陵由是狐疑稍疎智髙智髙怒遣兵襲之守陵先為之備逆戰大破之㑹智髙亦為狄青所敗遂不敢入結洞而逃奔特磨西接大理地多善馬智髙悉以所得二廣金帛子女遺特磨蠻酋儂夏誠又以其母妻夏誠弟夏卿相結納夏誠許以兵馬借之智髙留其母及一弟一子并其將居于夏誠所居之東十五里絲葦寨而身詣大理欲借兵共寇四川使其母以特磨之兵自邕州寇廣南鑑請詣特磨寨說夏誠使圖智髙智高以兵守二絃水鑑㡬為所獲不得進而還鑑言于靖曰特磨距邕州四十日程智髙恃其險逺必不設備鑑請不用中國尺兵斗糧募諸洞壯丁往襲之仍以重賂說特磨使為内應取之必矣靖許之仍許蕭繼將大兵為鑑後繼常與鑑相距十程鑑募洞丁得五六千人率之以前進案原本此下連接知邕州蕭注曰二百十三字為一條據文義絶不相屬今分為二知邕州蕭注曰廣源州本属田州儂智高父本山獠殺廣源州酋豪而據之田州酋長請往襲之知邕州者恐其生事禁不許廣源州地産金一兩直一縑智髙父由是富强招誘中國及諸洞民其徒甚衆交趾惡之遣兵襲虜之智髙時年十四與其母逃竄得免收其餘衆臣事交趾既長因朝于交趾隂結李徳正左右欲奪其國事覺逃歸因求内附朝廷恐失交趾之心不納智髙謂其徒曰今吾既得罪于交趾中國又不我納無所容止有反耳乃自左江轉掠諸洞徙居右江文村隂察官軍形勢與邕州姦人相結使為内應在文村五年遂襲邕州陷之儂智髙圍廣州轉運使王罕嬰城拒守都監侍其淵晝夜未嘗眠久之將士疲極有裨將誘士卒下城欲與之開門降賊淵遇之諭士卒曰汝曹降賊必驅汝為奴隸負擔歸其巢穴朝廷欲誅汝曹父母妻子不若併力完城豈惟保汝家亦將有功受賞矣士卒乃復還登城罕乃寢于城上淵忽來徐撼而覺之曰公勿驚公隨身有弓弩手否罕曰有乃與罕率弩手二十餘人銜枚至一處俯見賊已踰壕蟻附登城將及堞矣城上人皆不覺淵指示弩手使射之賊急走出壕外及賊退淵終不言裨將謀反之事熙寧中致仕介甫知其為人特除一子官給全俸淵年八十餘氣志安壯范堯夫以為隂徳之報堯夫云熙寧中朝廷遣劉起劉彝相繼知桂州以圖交趾起彞作戰船團結洞丁以為保甲結陣圖使依此敎戰諸洞騷然使人執交趾圖以言攻取之䇿不可勝數嶺南進士徐百祥屢舉不中第隂遺交趾書曰大王先世本閩人聞今交趾公卿貴人多閩人也百祥才略不在人後而不用于中國願得佐大王下風今中國欲大舉以滅交趾兵法有先聲奪人之心不若先舉兵入寇百祥請為内應于是交趾大發兵入寇陷欽廉雍三州百祥未得間往歸之㑹石鑑與百祥有親奏稱百祥有戰功除侍禁充欽廉巡檢朝廷命宣徽使郭逵討交趾交趾請降曰我本不入寇中國人呼我耳因以百祥書與逵逵檄廣西轉運使按鞫百祥逃去自縊而死郭帥云交趾賊熙寧八年十一月二十一日二十五日連破欽廉二州又破邕州管下太平永平二寨二十七日圍邕州知州皇城使蘇緘晝夜築城力戰所殺傷蠻人甚多城因以固九年正月四日廣西鈐轄張守節等過崑崙闗赴援兵少輕進三千餘人悉為蠻衆所掩殺傷殆盡劉執中與廣西提刑遁回後更無援兵王師自京師數千里赴援孤城抗賊晝夜不得休息正月二十一日矢石且盡城遂潰破蘇緘猶誓士卒殊死戰兵民死者十萬餘口擄婦女小弱者七八萬口二十二日賊焚邕州城二十三日遂回本洞今王師前軍三將已達桂林一將暫戍長沙中軍旦夕過府亦長沙置局後軍三將分屯荆鼎澧三郡一將襄州案今王師前軍三將句至此句四十三字與上下文不相屬當是錯簡湖北饑斗米計百五十鈔餒死者無數任公格云初榜下交趾管内州峒官吏軍民等云已差吏員外郎天章閣待制趙卨充安南道行營都總管經略安撫招討使兼廣西南路安撫使昭宣使嘉州防禦使内侍押班李憲充副使龍神衛四廂都指揮使忠州刺史燕達充副都總領應興師水陸兼進天示助順已兆布新之祥人知悔亡咸懐敵愾之氣咨爾士庶久淪塗炭如能諭王内附率衆自歸執賊獻功拔身助順爵賞賜予當倍常科舊惡宿負一皆原滌乾徳幼穉罪非已出造庭之日待遇如初朕言不渝衆聴無惑比聞編户極困誅求已戒使人具宣恩㫖暴征横斂到即蠲除冀我一方永為樂土時交趾為露布榜之衢路言所部之民叛如中國者官吏容受庇匿我遣使訴于桂管不服又遣使泛海訴于廣州亦不服我故率兵追捕亡者而鈐轄張守節等輒相邀遮士衆奮擊應時授首又言桂管㸃閱峒兵明言又見討伐又言中國作青苗助役之法窮困生民我今出師欲相拯濟故介甫自作此榜以報覆之王正甫云提㸃刑獄楊畋自將擊破叛蠻癸酉詔特支荆湖擊蠻諸軍錢有差仍命中使齎詔察視其功狀以聞王罕知潭州州素號多事知州多以威嚴取辦罕獨以仁恕為之州事亦治有老嫗病狂數邀知州訴事言無倫理知州卻之則悖罵先後知州以其狂但命邀者屏逐之罕至嫗復出左右欲逐之罕命引歸廰事召使前徐問嫗雖言雜亂無次亦有可曉者乃本為人嫡妻無子其妾有子夫死為妾所逐家貲為妾盡據之嫗屢訴于官不得直因憤恚發狂罕為直其事以家貲還之吏民服其能察寃李南公云舊制試院門禁嚴密家人日遣報報平安傳數人口訛謬皆不可曉常苦之皇祐中王罕為監門始置平安厯使吏隔門問來者詳錄其語于厯傳入院中試官復批所欲吿家人之語及所取之物于厯罕遣吏呼其人讀示之往來無一差失自知舉至彌封謄録巡捕共一厯人皆見之不容有私人甚便之自後遵以為法自見熙寧中王紹開熙河諸將皆以功遷官皇城使知原州桑湜獨辭不受曰羌人畏國威靈不戰而降臣何功而遷官執政曰衆人皆受獨君不受何也對曰衆人皆受必有功也湜自知無功故不受竟辭之時人重其知恥元豐五年韓持國知潁昌府官滿有旨許令持國再仕中書舎人曽鞏草誥詞稱其純明直亮既進呈上覽批其後曰按維天資忿戾素無事國之意朋姦罔上老不革心朕以東宫之舊姑委使郡非所望于承流宣化者也而草詞乖僻可令曽鞏贖銅十斤别草詞以進元豐中文潞公自北都召對上問以至和繼嗣事潞公對曰臣等備位兩府當此之際議繼嗣乃職分耳然亦幸直時無李輔國王守澄之徒用事于中故臣等得效其忠勤耳上憮然有間而美之仁宗宦官雖有蒙寵信任者臺諫言其罪輒斥之不庇也由是不能弄權涑水記聞卷十三
